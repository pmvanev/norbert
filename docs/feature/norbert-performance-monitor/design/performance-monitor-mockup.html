<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Norbert — Performance Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  :root {
    --font-ui: 'Rajdhani', sans-serif;
    --font-mono: 'Share Tech Mono', monospace;
    --brand: #00e5cc;
    --amber: #f0920a;
    --blue: #4a9eff;
    --teal: #7aa89e;
    --error: #ff4560;
    --bg-app: #060d0b;
    --bg-inset: rgba(0, 8, 6, 0.85);
    --border: rgba(0, 229, 204, 0.09);
    --border-card: rgba(0, 229, 204, 0.1);
    --text-p: #c8f0e8;
    --text-s: rgba(0, 229, 204, 0.55);
    --text-m: rgba(0, 229, 204, 0.22);
    --card-r: 3px;
    --scanlines: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
  }
  body { font-family:var(--font-ui); color:var(--text-p); background:var(--bg-app); background-image:var(--scanlines); display:flex; flex-direction:column; }
  .pm-container { display:flex; flex:1; overflow:hidden; border-top:1px solid var(--border); }

  .pm-topbar {
    height:30px; display:flex; align-items:center; padding:0 12px;
    background:rgba(3,7,6,0.98); border-bottom:1px solid rgba(180,140,60,0.14);
    font-size:11px; font-weight:600; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-s); gap:8px; flex-shrink:0;
  }
  .pm-topbar .norbert-logo { color:var(--brand); font-weight:700; }

  /* SIDEBAR */
  .pm-sidebar { width:180px; min-width:180px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:rgba(3,8,6,0.4); overflow-y:auto; }
  .pm-sidebar-item { padding:10px 12px 8px; cursor:pointer; border-left:3px solid transparent; border-bottom:1px solid rgba(0,229,204,0.04); transition:background 0.15s; }
  .pm-sidebar-item:hover { background:rgba(0,229,204,0.04); }
  .pm-sidebar-item.active { background:rgba(0,229,204,0.06); }
  .pm-sidebar-label { font-size:10px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-m); margin-bottom:2px; }
  .pm-sidebar-item.active .pm-sidebar-label { color:var(--text-s); }
  .pm-sidebar-value { font-family:var(--font-mono); font-size:15px; margin-bottom:4px; }
  .pm-sparkline-wrap { height:22px; border-radius:2px; overflow:hidden; background:var(--bg-inset); }
  .pm-sparkline-wrap canvas { display:block; width:100%; height:100%; }

  /* DETAIL */
  .pm-detail { flex:1; display:flex; flex-direction:column; padding:14px 16px 10px; gap:8px; overflow-y:auto; }
  .pm-detail-header { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
  .pm-detail-title { font-size:15px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; }
  .pm-detail-subtitle { font-family:var(--font-mono); font-size:10px; color:var(--text-m); }
  .pm-controls { display:flex; gap:6px; align-items:center; }
  .pm-pill { font-family:var(--font-mono); font-size:10px; padding:2px 8px; border:1px solid rgba(0,229,204,0.15); border-radius:2px; background:rgba(0,229,204,0.04); color:var(--text-s); cursor:pointer; transition:all 0.15s; }
  .pm-pill:hover { background:rgba(0,229,204,0.08); border-color:rgba(0,229,204,0.3); }
  .pm-pill.active { background:rgba(0,229,204,0.12); border-color:var(--brand); color:var(--brand); }

  /* GRAPHS */
  .pm-graph-wrap { min-height:130px; background:var(--bg-inset); border:1px solid var(--border-card); border-radius:var(--card-r); position:relative; overflow:hidden; }
  .pm-graph-wrap canvas { display:block; width:100%; height:100%; }
  .pm-graph-agg { flex:2; }
  .pm-section-label { font-family:var(--font-ui); font-size:9px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-m); flex-shrink:0; }
  .pm-split-grid { display:grid; gap:4px; flex:1; min-height:90px; }
  .pm-split-cell { background:var(--bg-inset); border:1px solid var(--border-card); border-radius:var(--card-r); position:relative; overflow:hidden; display:flex; flex-direction:column; }
  .pm-split-label { position:absolute; top:3px; left:7px; z-index:1; font-family:var(--font-mono); font-size:8px; color:var(--text-m); display:flex; gap:5px; align-items:baseline; pointer-events:none; }
  .pm-split-label .pm-split-val { font-size:11px; font-weight:bold; }
  .pm-split-cell canvas { display:block; width:100%; height:100%; flex:1; }
  .pm-graph-duration { font-family:var(--font-mono); font-size:9px; color:var(--text-m); text-align:right; margin-top:1px; flex-shrink:0; }

  /* TOOLTIP */
  .pm-tooltip {
    position:fixed; pointer-events:none; z-index:100;
    background:rgba(0,8,6,0.95); border:1px solid var(--brand);
    border-radius:3px; padding:4px 8px;
    font-family:var(--font-mono); font-size:10px; color:var(--text-p);
    white-space:nowrap; display:none;
  }
  .pm-tooltip-value { font-weight:bold; }
  .pm-tooltip-time { color:var(--text-m); margin-left:4px; }

  /* STATS */
  .pm-stats { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border-card); border-radius:var(--card-r); overflow:hidden; flex-shrink:0; }
  .pm-stat-cell { padding:7px 12px; border-bottom:1px solid rgba(0,229,204,0.04); }
  .pm-stat-cell:nth-child(odd) { border-right:1px solid rgba(0,229,204,0.04); }
  .pm-stat-cell:nth-last-child(-n+2) { border-bottom:none; }
  .pm-stat-label { font-size:8px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-m); margin-bottom:1px; }
  .pm-stat-value { font-family:var(--font-mono); font-size:14px; color:var(--text-p); }

  /* SESSION TABLE */
  .pm-sessions { border:1px solid var(--border-card); border-radius:var(--card-r); overflow:hidden; flex-shrink:0; font-family:var(--font-mono); font-size:10px; }
  .pm-sessions-hdr { display:grid; grid-template-columns:2.5fr 1fr 1fr 1fr; padding:4px 10px; font-family:var(--font-ui); font-size:8px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; color:var(--text-m); border-bottom:1px solid rgba(0,229,204,0.06); }
  .pm-session-row { display:grid; grid-template-columns:2.5fr 1fr 1fr 1fr; padding:3px 10px; color:var(--text-s); }
  .pm-session-row:nth-child(even) { background:rgba(0,229,204,0.015); }
  .pm-session-id { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--text-p); }
  .urgency-amber { color:var(--amber) !important; }
  .urgency-red { color:var(--error) !important; }
</style>
</head>
<body>
<div class="pm-topbar"><span class="norbert-logo">NORBERT</span><span>Performance Monitor</span></div>
<div class="pm-container">
  <div class="pm-sidebar" id="sidebar"></div>
  <div class="pm-detail" id="detail"></div>
</div>
<div class="pm-tooltip" id="tooltip"><span class="pm-tooltip-value" id="tt-val"></span><span class="pm-tooltip-time" id="tt-time"></span></div>
<script>
const H = 60;
const CATS = [
  { id:'tokens', label:'Tokens/s', color:'#00e5cc', yMax:2000, yLabels:['0','500','1k','1.5k','2k'],
    fmt:v=>v>=1000?(v/1000).toFixed(1)+'k tok/s':Math.round(v)+' tok/s',
    stats:[{l:'Peak',k:'peak',f:v=>v>=1000?(v/1000).toFixed(1)+'k tok/s':Math.round(v)+' tok/s'},{l:'Sessions',k:'sessions',f:v=>String(v)},{l:'Average',k:'avg',f:v=>v>=1000?(v/1000).toFixed(1)+'k tok/s':Math.round(v)+' tok/s'},{l:'Total Tokens',k:'totalTokens',f:v=>v>=1e6?(v/1e6).toFixed(1)+'M':v>=1000?(v/1000).toFixed(1)+'k':String(v)},{l:'Cost Rate',k:'costRate',f:v=>'$'+v.toFixed(4)+'/min'},{l:'Tool Calls',k:'toolCalls',f:v=>v.toLocaleString()}],
    sCols:['Session','Tokens/s','Agents','Cost'], sData:s=>[s.name,s.fmtTokens,String(s.agents),'$'+s.cost.toFixed(4)] },
  { id:'cost', label:'Cost', color:'#f0920a', yMax:0.12, yLabels:['$0','$0.03','$0.06','$0.09','$0.12'],
    fmt:v=>'$'+v.toFixed(4)+'/min',
    stats:[{l:'Current',k:'current',f:v=>'$'+v.toFixed(4)+'/min'},{l:'Sessions',k:'sessions',f:v=>String(v)},{l:'Session Total',k:'sessionTotal',f:v=>'$'+v.toFixed(4)},{l:'Total Cost',k:'totalCost',f:v=>'$'+v.toFixed(4)},{l:'Avg $/Token',k:'avgCostPerToken',f:v=>'$'+v.toFixed(6)},{l:'Model',k:'model',f:v=>v}],
    sCols:['Session','$/min','Total','Model'], sData:s=>[s.name,'$'+s.costRate.toFixed(4),'$'+s.cost.toFixed(4),s.model] },
  { id:'agents', label:'Agents', color:'#4a9eff', yMax:8, yLabels:['0','2','4','6','8'],
    fmt:v=>Math.round(v)+' agent'+(Math.round(v)!==1?'s':''),
    stats:[{l:'Active',k:'active',f:v=>String(v)},{l:'Sessions',k:'sessions',f:v=>String(v)},{l:'Peak',k:'peak',f:v=>String(v)},{l:'Total Spawned',k:'totalSpawned',f:v=>String(v)},{l:'Agents/Session',k:'avgPerSession',f:v=>v.toFixed(1)},{l:'Tool Calls',k:'toolCalls',f:v=>v.toLocaleString()}],
    sCols:['Session','Agents','Tokens/s','Status'], sData:s=>[s.name,String(s.agents),s.fmtTokens,s.status] },
  { id:'context', label:'Context', color:'#7aa89e', yMax:100, yLabels:['0%','25%','50%','75%','100%'],
    fmt:v=>Math.round(v)+'%',
    stats:[{l:'Current',k:'current',f:v=>Math.round(v)+'%'},{l:'Remaining',k:'remaining',f:v=>v>=1000?(v/1000).toFixed(1)+'k tokens':v+' tokens'},{l:'Max Tokens',k:'maxTokens',f:v=>v>=1000?(v/1000).toFixed(0)+'k':String(v)},{l:'Model',k:'model',f:v=>v},{l:'Urgency',k:'urgency',f:v=>v},{l:'Compressions',k:'compressions',f:v=>String(v)}],
    sCols:['Session','Context %','Urgency','Remaining'], sData:s=>[s.name,Math.round(s.contextPct)+'%',s.urgency,(s.remaining/1000).toFixed(1)+'k'] },
];
const SESSIONS = [
  { name:'f8a2c1d3-e947...', agents:2, cost:0.0342, costRate:0.0087, model:'claude-sonnet-4-6', status:'active', contextPct:47, remaining:53000, urgency:'normal', fmtTokens:'440' },
  { name:'b91e04f7-3a56...', agents:1, cost:0.0156, costRate:0.0031, model:'claude-sonnet-4-6', status:'active', contextPct:72, remaining:28000, urgency:'amber', fmtTokens:'160' },
  { name:'c4d88e21-7fc0...', agents:3, cost:0.0891, costRate:0.0214, model:'claude-opus-4-6', status:'active', contextPct:34, remaining:66000, urgency:'normal', fmtTokens:'200' },
];
const aggBufs={}, sessionBufs={};
CATS.forEach(c => { aggBufs[c.id]=new Float32Array(H); sessionBufs[c.id]=SESSIONS.map(()=>new Float32Array(H)); });
const sW = SESSIONS.map((_,i) => ({
  tokens:{value:[440,160,200][i],target:[440,160,200][i],speed:0.08},
  cost:{value:[0.012,0.004,0.024][i],target:[0.012,0.004,0.024][i],speed:0.06},
  agents:{value:[2,1,3][i],target:[2,1,3][i],speed:0.03},
  context:{value:[47,72,34][i],target:[47,72,34][i],speed:0.02},
}));
function step(w,mn,mx){if(Math.random()<0.05)w.target=mn+Math.random()*(mx-mn);w.value+=(w.target-w.value)*w.speed;w.value+=(Math.random()-0.5)*(mx-mn)*0.04;w.value=Math.max(mn,Math.min(mx,w.value));return w.value;}
function pushSample(){
  for(const c of CATS){let agg=0;SESSIONS.forEach((s,si)=>{const w=sW[si][c.id];let v;
    switch(c.id){case'tokens':v=step(w,20,[900,400,500][si]);break;case'cost':v=step(w,0,[0.04,0.015,0.06][si]);break;case'agents':v=Math.max(0,Math.round(step(w,0,[4,2,5][si])));break;case'context':v=step(w,10,[65,90,50][si]);break;}
    sessionBufs[c.id][si].copyWithin(0,1);sessionBufs[c.id][si][H-1]=v;agg+=v;
    if(c.id==='tokens')s.fmtTokens=v>=1000?(v/1000).toFixed(1)+'k':Math.round(v)+'';
    if(c.id==='cost')s.costRate=v;if(c.id==='agents')s.agents=Math.round(v);
    if(c.id==='context'){s.contextPct=Math.round(v);s.remaining=Math.round((100-v)/100*100000);s.urgency=v>=90?'red':v>=70?'amber':'normal';}
  });if(c.id==='context')agg=Math.max(...SESSIONS.map(s=>s.contextPct));
  aggBufs[c.id].copyWithin(0,1);aggBufs[c.id][H-1]=agg;}
}
for(let i=0;i<H;i++)pushSample();

let selected='tokens', timeWindow='1m';
const sparkC={};

// ═══ TOOLTIP STATE ═══
const ttEl=document.getElementById('tooltip'), ttVal=document.getElementById('tt-val'), ttTime=document.getElementById('tt-time');

function showTooltip(e, buf, color, yMax, formatFn, canvas) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const frac = mx / rect.width;
  const idx = Math.round(frac * (H - 1));
  if (idx < 0 || idx >= H) { ttEl.style.display='none'; return; }
  const val = buf[idx];
  const secsAgo = H - 1 - idx;
  ttVal.textContent = formatFn(val);
  ttVal.style.color = color;
  ttTime.textContent = secsAgo === 0 ? 'now' : secsAgo + 's ago';
  ttEl.style.borderColor = color;
  // Position tooltip
  let tx = e.clientX + 12, ty = e.clientY - 30;
  if (tx + 140 > window.innerWidth) tx = e.clientX - 140;
  if (ty < 4) ty = e.clientY + 16;
  ttEl.style.left = tx + 'px';
  ttEl.style.top = ty + 'px';
  ttEl.style.display = 'block';
}

// ═══ CHART DRAWING WITH CROSSHAIR ═══
let hoverState = { canvas: null, mx: -1 }; // track which canvas is hovered and mouse x

function drawChart(canvas, buf, color, yMax, yLabels, showOverlay, formatFn) {
  const dpr = devicePixelRatio||1;
  const r = canvas.getBoundingClientRect();
  const w = r.width*dpr, h = r.height*dpr;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const showLbl = showOverlay && yLabels;
  const pad = {top:(showOverlay?28:14)*dpr, bottom:8*dpr, left:6*dpr, right:showLbl?48*dpr:6*dpr};
  const gw = w-pad.left-pad.right, gh = h-pad.top-pad.bottom;
  ctx.clearRect(0,0,w,h);

  // Grid
  const gridN = showLbl ? yLabels.length : 4;
  ctx.strokeStyle='rgba(0,229,204,0.06)'; ctx.lineWidth=1;
  if(showLbl){ctx.font=`${8*dpr}px 'Share Tech Mono',monospace`;ctx.fillStyle='rgba(0,229,204,0.2)';ctx.textAlign='right';}
  for(let i=0;i<gridN;i++){const f=i/(gridN-1),y=pad.top+gh-f*gh;ctx.beginPath();ctx.moveTo(pad.left,y);ctx.lineTo(pad.left+gw,y);ctx.stroke();if(showLbl)ctx.fillText(yLabels[i],w-4*dpr,y+3*dpr);}

  // Points
  const pts=[];
  for(let i=0;i<H;i++){const x=pad.left+(i/(H-1))*gw,y=pad.top+gh-(buf[i]/yMax)*gh;pts.push({x,y});}

  // Fill
  if(pts.length>1){const gr=ctx.createLinearGradient(0,pad.top,0,pad.top+gh);const rgb=hexRgb(color);gr.addColorStop(0,`rgba(${rgb},0.18)`);gr.addColorStop(1,`rgba(${rgb},0.02)`);ctx.fillStyle=gr;ctx.beginPath();ctx.moveTo(pts[0].x,pad.top+gh);for(const p of pts)ctx.lineTo(p.x,p.y);ctx.lineTo(pts[pts.length-1].x,pad.top+gh);ctx.closePath();ctx.fill();}

  // Line
  if(pts.length>1){ctx.strokeStyle=color;ctx.lineWidth=1.5*dpr;ctx.lineJoin='round';ctx.lineCap='round';ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();}

  // Crosshair on hover
  if (hoverState.canvas === canvas && hoverState.mx >= 0) {
    const mx = hoverState.mx * dpr;
    const frac = (mx - pad.left) / gw;
    const idx = Math.round(frac * (H - 1));
    if (idx >= 0 && idx < H) {
      const cx = pts[idx].x, cy = pts[idx].y;
      // Vertical line
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(cx, pad.top); ctx.lineTo(cx, pad.top + gh); ctx.stroke();
      // Dot
      ctx.fillStyle = color;
      ctx.beginPath(); ctx.arc(cx, cy, 3 * dpr, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Value overlay
  if(showOverlay&&formatFn){ctx.font=`bold ${16*dpr}px 'Share Tech Mono',monospace`;ctx.fillStyle=color;ctx.textAlign='left';ctx.fillText(formatFn(buf[H-1]),pad.left+6*dpr,pad.top-8*dpr);}
}

function hexRgb(h){return`${parseInt(h.slice(1,3),16)},${parseInt(h.slice(3,5),16)},${parseInt(h.slice(5,7),16)}`;}

// ═══ SIDEBAR ═══
function buildSidebar(){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  for(const c of CATS){const el=document.createElement('div');el.className='pm-sidebar-item'+(c.id===selected?' active':'');el.style.borderLeftColor=c.id===selected?c.color:'transparent';
  el.innerHTML=`<div class="pm-sidebar-label">${c.label}</div><div class="pm-sidebar-value" style="color:${c.color}" id="sv-${c.id}"></div><div class="pm-sparkline-wrap"><canvas id="spark-${c.id}"></canvas></div>`;
  el.addEventListener('click',()=>{selected=c.id;buildSidebar();buildDetail();});sb.appendChild(el);sparkC[c.id]=document.getElementById('spark-'+c.id);}
}
function drawSparkline(cv,buf,color,yMax){const dpr=devicePixelRatio||1;const r=cv.getBoundingClientRect();const w=r.width*dpr,h=r.height*dpr;cv.width=w;cv.height=h;const ctx=cv.getContext('2d');ctx.clearRect(0,0,w,h);ctx.strokeStyle=color;ctx.lineWidth=dpr;ctx.lineJoin='round';ctx.beginPath();for(let i=0;i<H;i++){const x=(i/(H-1))*w,y=h-(buf[i]/yMax)*h;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.stroke();}
function updateSidebar(){for(const c of CATS){const el=document.getElementById('sv-'+c.id);if(el)el.textContent=c.fmt(aggBufs[c.id][H-1]);const cv=sparkC[c.id];if(cv)drawSparkline(cv,aggBufs[c.id],c.color,c.yMax);}}

// ═══ DETAIL ═══
function buildDetail(){
  const cat=CATS.find(c=>c.id===selected);
  const d=document.getElementById('detail');
  const showSplit = SESSIONS.length > 1;
  const cols = SESSIONS.length<=2?SESSIONS.length:SESSIONS.length<=4?2:3;
  d.innerHTML=`
    <div class="pm-detail-header">
      <div><div class="pm-detail-title" style="color:${cat.color}">${cat.label}</div>
      <div class="pm-detail-subtitle">claude-sonnet-4-20250514 · ${SESSIONS.length} sessions</div></div>
      <div class="pm-controls">${['1m','5m','15m','Session'].map(t=>`<div class="pm-pill${timeWindow===t?' active':''}" data-tw="${t}">${t}</div>`).join('')}</div>
    </div>
    <div class="pm-graph-wrap pm-graph-agg"><canvas id="main-graph"></canvas></div>
    ${showSplit ? `
      <div class="pm-section-label">Per Session</div>
      <div class="pm-split-grid" style="grid-template-columns:repeat(${cols},1fr)">
        ${SESSIONS.map((_,i)=>`<div class="pm-split-cell"><div class="pm-split-label"><span>${SESSIONS[i].name}</span><span class="pm-split-val" id="split-val-${i}" style="color:${cat.color}"></span></div><canvas id="split-canvas-${i}"></canvas></div>`).join('')}
      </div>` : ''}
    <div class="pm-graph-duration">60 seconds</div>
    <div class="pm-stats" id="stats-grid"></div>
    <div class="pm-sessions" id="session-table"></div>`;

  d.querySelectorAll('.pm-pill').forEach(p=>{p.addEventListener('click',()=>{timeWindow=p.dataset.tw;d.querySelectorAll('.pm-pill').forEach(pp=>pp.classList.toggle('active',pp.dataset.tw===timeWindow));});});

  // Wire hover on main graph
  const mc = document.getElementById('main-graph');
  if (mc) {
    mc.addEventListener('mousemove', e => { hoverState = { canvas: mc, mx: e.clientX - mc.getBoundingClientRect().left }; showTooltip(e, aggBufs[cat.id], cat.color, cat.yMax, cat.fmt, mc); });
    mc.addEventListener('mouseleave', () => { hoverState = { canvas: null, mx: -1 }; ttEl.style.display = 'none'; });
  }

  // Wire hover on split canvases
  SESSIONS.forEach((_, i) => {
    const sc = document.getElementById('split-canvas-' + i);
    if (sc) {
      sc.addEventListener('mousemove', e => { hoverState = { canvas: sc, mx: e.clientX - sc.getBoundingClientRect().left }; showTooltip(e, sessionBufs[cat.id][i], cat.color, cat.yMax, cat.fmt, sc); });
      sc.addEventListener('mouseleave', () => { hoverState = { canvas: null, mx: -1 }; ttEl.style.display = 'none'; });
    }
  });

  updateDetail();
}

function getStats(catId){const buf=aggBufs[catId];const cur=buf[H-1];const peak=Math.max(...buf);const avg=buf.reduce((s,v)=>s+v,0)/H;
  switch(catId){case'tokens':return{peak,sessions:3,avg,totalTokens:1247832,costRate:aggBufs.cost[H-1],toolCalls:4218};case'cost':return{current:cur,sessions:3,sessionTotal:0.0342,totalCost:0.1389,avgCostPerToken:0.000011,model:'claude-sonnet-4-6'};case'agents':return{active:Math.round(cur),sessions:3,peak:Math.round(peak),totalSpawned:47,avgPerSession:cur/3,toolCalls:4218};case'context':return{current:cur,remaining:Math.round((100-cur)/100*100000),maxTokens:100000,model:'claude-sonnet-4-6',urgency:cur>=90?'RED':cur>=70?'AMBER':'NORMAL',compressions:2};}}

function updateDetail(){
  const cat=CATS.find(c=>c.id===selected);
  const se=document.getElementById('stats-grid');
  if(se){const st=getStats(cat.id);se.innerHTML=cat.stats.map(s=>`<div class="pm-stat-cell"><div class="pm-stat-label">${s.l}</div><div class="pm-stat-value">${s.f(st[s.k])}</div></div>`).join('');}
  const te=document.getElementById('session-table');
  if(te){te.innerHTML=`<div class="pm-sessions-hdr">${cat.sCols.map(c=>`<span>${c}</span>`).join('')}</div>${SESSIONS.map(s=>{const v=cat.sData(s);return`<div class="pm-session-row"><span class="pm-session-id">${v[0]}</span><span>${v[1]}</span><span>${v[2]}</span><span class="${s.urgency==='red'?'urgency-red':s.urgency==='amber'?'urgency-amber':''}">${v[3]}</span></div>`;}).join('')}`;}
  SESSIONS.forEach((_,i)=>{const el=document.getElementById('split-val-'+i);if(el){el.textContent=cat.fmt(sessionBufs[cat.id][i][H-1]);}});
}

function renderGraphs(){
  const cat=CATS.find(c=>c.id===selected);
  const mc=document.getElementById('main-graph');
  if(mc)drawChart(mc,aggBufs[cat.id],cat.color,cat.yMax,cat.yLabels,true,cat.fmt);
  SESSIONS.forEach((_,i)=>{const cv=document.getElementById('split-canvas-'+i);if(cv)drawChart(cv,sessionBufs[cat.id][i],cat.color,cat.yMax,null,false,null);});
}

buildSidebar();buildDetail();updateSidebar();renderGraphs();
setInterval(()=>{pushSample();updateSidebar();updateDetail();},1000);
setInterval(renderGraphs,100);
</script>
</body>
