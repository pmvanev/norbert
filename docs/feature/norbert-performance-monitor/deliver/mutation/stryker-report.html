reset after any setup-time notification\n\n    store.appendRateSample(\"session-1\", \"events\", NOW, 5);\n    expect(notifications).toBe(1);\n\n    unsubscribe();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S10: Subscribers are notified after appendPulse\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S10: Subscribers are notified after appendPulse\", () => {\n  it(\"subscriber callback is invoked exactly once\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n\n    let notifications = 0;\n    const unsubscribe = store.subscribe(() => {\n      notifications += 1;\n    });\n    notifications = 0;\n\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n    expect(notifications).toBe(1);\n\n    unsubscribe();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S10b: Subscribers are notified after addSession and removeSession\n// Tag: @driving_port @US-PM-001\n// ADR-049 Contract A: lifecycle notifies via the same pub/sub.\n// NOTE: No counter reset between the two lifecycle calls — the exactly-once\n// invariant per call is what we are contracting. A reset would hide double\n// notifies on the second call.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S10b: Subscribers are notified after addSession and removeSession\", () => {\n  it(\"addSession notifies once and removeSession notifies once — two total\", () => {\n    const store = createMultiSessionStore();\n\n    let notifications = 0;\n    const unsubscribe = store.subscribe(() => {\n      notifications += 1;\n    });\n\n    store.addSession(\"session-1\");\n    expect(notifications).toBe(1);\n\n    store.removeSession(\"session-1\");\n    expect(notifications).toBe(2);\n\n    unsubscribe();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S11: @property Frame values never invent sub-interval spikes beyond\n//         bracketing arrived values\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - arrived-samples: a non-empty array of (ageMsFromNow, v) pairs strictly\n//     inside the 60s window, monotonically increasing in timestamp (i.e.\n//     decreasing ageMs). Values are positive finite doubles.\n//   - nowOffset: integer offset around a fixed logical NOW for variety\n//\n// Invariant: for every projected trace sample, locate its two bracketing\n// arrived samples (the arrived pair (left, right) with left.t <"+"= sample.t\n// <"+"= right.t; or a single arrived sample when the projected sample lies at\n// an endpoint). The projected sample.v must fall within\n// [min(left.v, right.v), max(left.v, right.v)] — i.e. no invented\n// sub-interval spike above the higher or below the lower bracketing value.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S11 @property: Frame values never invent sub-interval spikes beyond bracketing arrived values\", () => {\n  it(\"every projected trace value is bounded by its two bracketing arrived samples\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n\n    // A non-empty, timestamp-sorted sequence of arrived samples inside the\n    // 60s window. We generate unique `ageMs` in [0, WINDOW_MS - 1] then sort\n    // descending so the resulting `t = now - ageMs` sequence is ascending.\n    const arrivedArb = fc\n      .uniqueArray(fc.integer({ min: 0, max: WINDOW_MS - 1 }), {\n        minLength: 1,\n        maxLength: 12,\n      })\n      .chain((ages) => {\n        const sortedAgesDesc = [...ages].sort((a, b) => b - a);\n        return fc\n          .array(fc.double({ min: 0, max: 1000, noNaN: true, noDefaultInfinity: true }), {\n            minLength: sortedAgesDesc.length,\n            maxLength: sortedAgesDesc.length,\n          })\n          .map((values) =>\n            sortedAgesDesc.map((ageMs, i) => ({ ageMs, v: values[i] })),\n          );\n      });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        arrivedArb,\n        fc.integer({ min: -1000, max: 1000 }),\n        (sessionId, metric, arrived, nowOffset) => {\n          const now = NOW + nowOffset;\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n          for (const s of arrived) {\n            store.appendRateSample(sessionId, metric, now - s.ageMs, s.v);\n          }\n\n          const frame = buildFrame(store, metric, now);\n          const trace = frame.traces.find((t) => t.sessionId === sessionId);\n          expect(trace).toBeDefined();\n\n          // Bracketing lookup over arrived samples (ascending timestamp).\n          const sortedArrived = arrived\n            .map((s) => ({ t: now - s.ageMs, v: s.v }))\n            .sort((a, b) => a.t - b.t);\n\n          for (const sample of trace!.samples) {\n            let left = sortedArrived[0];\n            let right = sortedArrived[sortedArrived.length - 1];\n            if (sample.t <"+"= sortedArrived[0].t) {\n              left = sortedArrived[0];\n              right = sortedArrived[0];\n            } else if (sample.t >= sortedArrived[sortedArrived.length - 1].t) {\n              left = sortedArrived[sortedArrived.length - 1];\n              right = sortedArrived[sortedArrived.length - 1];\n            } else {\n              for (let i = 0; i <"+" sortedArrived.length - 1; i++) {\n                if (\n                  sortedArrived[i].t <"+"= sample.t &&\n                  sample.t <"+"= sortedArrived[i + 1].t\n                ) {\n                  left = sortedArrived[i];\n                  right = sortedArrived[i + 1];\n                  break;\n                }\n              }\n            }\n            const hi = Math.max(left.v, right.v);\n            const lo = Math.min(left.v, right.v);\n            expect(sample.v).toBeLessThanOrEqual(hi + 1e-9);\n            expect(sample.v).toBeGreaterThanOrEqual(lo - 1e-9);\n          }\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S12: @property Frame values never zero-fill between arrivals when the\n//         last arrived value is non-zero\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - arrived-samples: a non-empty, ascending-timestamp sequence inside the\n//     60s window; every value is STRICTLY POSITIVE (min 0.01). The last\n//     arrived sample is the most recent, and no further samples arrive\n//     after it (silence up to `now`).\n//   - nowOffset: integer offset around a fixed logical NOW\n//\n// Invariants:\n//   1. edge-value: the projected trace's current-time-edge sample value\n//      equals the last arrived value (the scope does not zero-fill during\n//      silence).\n//   2. no-zero-fill: no projected sample value equals 0 purely because time\n//      has elapsed without arrivals.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S12 @property: Frame values never zero-fill between arrivals\", () => {\n  it(\"edge value equals last arrived value and no sample zero-fills while the last arrival is non-zero\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n\n    const arrivedNonZeroArb = fc\n      .uniqueArray(fc.integer({ min: 0, max: WINDOW_MS - 1 }), {\n        minLength: 1,\n        maxLength: 12,\n      })\n      .chain((ages) => {\n        const sortedAgesDesc = [...ages].sort((a, b) => b - a);\n        return fc\n          .array(\n            fc.double({\n              min: 0.01,\n              max: 1000,\n              noNaN: true,\n              noDefaultInfinity: true,\n            }),\n            {\n              minLength: sortedAgesDesc.length,\n              maxLength: sortedAgesDesc.length,\n            },\n          )\n          .map((values) =>\n            sortedAgesDesc.map((ageMs, i) => ({ ageMs, v: values[i] })),\n          );\n      });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        arrivedNonZeroArb,\n        fc.integer({ min: -1000, max: 1000 }),\n        (sessionId, metric, arrived, nowOffset) => {\n          const now = NOW + nowOffset;\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n          for (const s of arrived) {\n            store.appendRateSample(sessionId, metric, now - s.ageMs, s.v);\n          }\n\n          const frame = buildFrame(store, metric, now);\n          const trace = frame.traces.find((t) => t.sessionId === sessionId);\n          expect(trace).toBeDefined();\n\n          // The last arrived sample (smallest ageMs -> largest t).\n          const sortedByT = arrived\n            .map((s) => ({ t: now - s.ageMs, v: s.v }))\n            .sort((a, b) => a.t - b.t);\n          const lastArrived = sortedByT[sortedByT.length - 1];\n\n          // Edge-value invariant: the projected edge sample equals the last\n          // arrived value. (When samples is empty something upstream\n          // silently zero-filled / dropped the last arrival — a violation.)\n          expect(trace!.samples.length).toBeGreaterThan(0);\n          const edge = trace!.samples[trace!.samples.length - 1];\n          expect(edge.v).toBeCloseTo(lastArrived.v, 5);\n\n          // No-zero-fill invariant: since every arrival is strictly\n          // positive, no projected sample may read as zero.\n          for (const sample of trace!.samples) {\n            expect(sample.v).not.toBe(0);\n          }\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S13: @property Rate-sample append then read preserves timestamp order\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - rate samples: a non-empty, strictly-ascending-timestamp sequence built\n//     from unique `ageMs` offsets inside the 60s window, each paired with a\n//     finite positive double value. Samples are appended oldest-to-newest.\n//   - nowOffset: integer offset around a fixed logical NOW for variety\n//\n// Invariant: getRateHistory returns samples in the exact append order, which\n// is ascending by timestamp (strict monotonicity — unique ageMs guarantees no\n// ties) and preserves both `t` and `v` values at each index.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S13 @property: Rate-sample append then read preserves timestamp order\", () => {\n  it(\"any in-order append sequence reads back in the same order with identical values\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n\n    // A non-empty, strictly-ascending-timestamp sequence inside the 60s\n    // window. Unique `ageMs` sorted descending yields a strictly ascending\n    // `t = now - ageMs` append sequence.\n    const appendSequenceArb = fc\n      .uniqueArray(fc.integer({ min: 0, max: WINDOW_MS - 1 }), {\n        minLength: 1,\n        maxLength: 16,\n      })\n      .chain((ages) => {\n        const sortedAgesDesc = [...ages].sort((a, b) => b - a);\n        return fc\n          .array(\n            fc.double({ min: 0, max: 1000, noNaN: true, noDefaultInfinity: true }),\n            {\n              minLength: sortedAgesDesc.length,\n              maxLength: sortedAgesDesc.length,\n            },\n          )\n          .map((values) =>\n            sortedAgesDesc.map((ageMs, i) => ({ ageMs, v: values[i] })),\n          );\n      });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        appendSequenceArb,\n        fc.integer({ min: -1000, max: 1000 }),\n        (sessionId, metric, samples, nowOffset) => {\n          const now = NOW + nowOffset;\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n\n          // Append in ascending-t order (samples already sorted oldest-first).\n          const appended: ReadonlyArray<"+"{ t: number; v: number }> = samples.map(\n            (s) => ({ t: now - s.ageMs, v: s.v }),\n          );\n          for (const s of appended) {\n            store.appendRateSample(sessionId, metric, s.t, s.v);\n          }\n\n          const history = store.getRateHistory(sessionId, metric);\n\n          // Same length and identical (t, v) sequence as appended.\n          expect(history).toHaveLength(appended.length);\n          for (let i = 0; i <"+" appended.length; i++) {\n            expect(history[i].t).toBe(appended[i].t);\n            expect(history[i].v).toBe(appended[i].v);\n          }\n\n          // Strict monotonicity in `t` — append order is timestamp order.\n          for (let i = 1; i <"+" history.length; i++) {\n            expect(history[i].t).toBeGreaterThan(history[i - 1].t);\n          }\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S14: @property Window trim is consistent across reads (idempotent)\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - rate samples: a non-empty, strictly-ascending-timestamp sequence built\n//     from unique `ageMs` offsets inside the 60s window, each paired with a\n//     finite double value.\n//   - queryCount: number of consecutive reads to perform (2..5)\n//   - nowOffset: integer offset around a fixed logical NOW for variety\n//\n// Invariant: consecutive getRateHistory calls return arrays with identical\n// contents (same length, same (t, v) pairs at each index). Reads must not\n// mutate store state — the window-trim semantics (today: identity; later:\n// window-bounded) are consistent across any sequence of reads.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S14 @property: Window trim is consistent across reads\", () => {\n  it(\"consecutive getRateHistory calls return arrays with identical contents\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n\n    const appendSequenceArb = fc\n      .uniqueArray(fc.integer({ min: 0, max: WINDOW_MS - 1 }), {\n        minLength: 1,\n        maxLength: 16,\n      })\n      .chain((ages) => {\n        const sortedAgesDesc = [...ages].sort((a, b) => b - a);\n        return fc\n          .array(\n            fc.double({ min: 0, max: 1000, noNaN: true, noDefaultInfinity: true }),\n            {\n              minLength: sortedAgesDesc.length,\n              maxLength: sortedAgesDesc.length,\n            },\n          )\n          .map((values) =>\n            sortedAgesDesc.map((ageMs, i) => ({ ageMs, v: values[i] })),\n          );\n      });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        appendSequenceArb,\n        fc.integer({ min: 2, max: 5 }),\n        fc.integer({ min: -1000, max: 1000 }),\n        (sessionId, metric, samples, queryCount, nowOffset) => {\n          const now = NOW + nowOffset;\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n\n          for (const s of samples) {\n            store.appendRateSample(sessionId, metric, now - s.ageMs, s.v);\n          }\n\n          // Perform `queryCount` consecutive reads; each must return the\n          // same (t, v) sequence as the first.\n          const reads: Array<"+"ReadonlyArray<"+"{ t: number; v: number }>> = [];\n          for (let i = 0; i <"+" queryCount; i++) {\n            reads.push(store.getRateHistory(sessionId, metric));\n          }\n\n          const first = reads[0];\n          for (let i = 1; i <"+" reads.length; i++) {\n            const other = reads[i];\n            expect(other).toHaveLength(first.length);\n            expect(other.map((s) => s.t)).toEqual(first.map((s) => s.t));\n            expect(other.map((s) => s.v)).toEqual(first.map((s) => s.v));\n          }\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S15: @property Hit-test consistency between trace value and returned value\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - arrived-samples: a non-empty, ascending-timestamp sequence inside the\n//     60s window. Values are STRICTLY POSITIVE (min 0.01) so on-canvas\n//     samples always have a meaningful displayY (not clipped to the top edge\n//     where the off-canvas zero-distance rule in scopeHitTest would short-\n//     circuit the match we want to assert).\n//   - width/height: positive canvas dimensions (pointer space)\n//   - pointerX/pointerY: pointer inside the canvas rectangle\n//   - nowOffset: integer offset around a fixed logical NOW for variety\n//\n// Invariant (business language): whenever the hit-test returns a hover\n// selection, the selected trace's value AT the selection's reported time —\n// computed by the same honest-signal lookup used by scopeProjection (last\n// sample at-or-before `selection.time`; earliest sample when the cursor\n// precedes all arrivals) — equals `selection.value` within a small epsilon.\n// The scope never reports a hover value that disagrees with the underlying\n// trace signal at that time.\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S15 @property: Hit-test consistency between trace value and returned value\", () => {\n  it(\"selection value equals the selected trace's sampled value at selection.time within epsilon\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n\n    // Non-empty, strictly-positive arrived samples at unique ages inside the\n    // 60s window. A higher max value (up to 3x yMax) deliberately exercises\n    // the off-canvas clipping path inside scopeHitTest, but the honest-signal\n    // invariant under test is value-equality, not on/off-canvas behavior.\n    const arrivedArb = fc\n      .uniqueArray(fc.integer({ min: 0, max: WINDOW_MS - 1 }), {\n        minLength: 1,\n        maxLength: 12,\n      })\n      .chain((ages) => {\n        const sortedAgesDesc = [...ages].sort((a, b) => b - a);\n        return fc\n          .array(\n            fc.double({\n              min: 0.01,\n              max: 300,\n              noNaN: true,\n              noDefaultInfinity: true,\n            }),\n            {\n              minLength: sortedAgesDesc.length,\n              maxLength: sortedAgesDesc.length,\n            },\n          )\n          .map((values) =>\n            sortedAgesDesc.map((ageMs, i) => ({ ageMs, v: values[i] })),\n          );\n      });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        arrivedArb,\n        fc.integer({ min: 100, max: 2000 }), // width px\n        fc.integer({ min: 100, max: 800 }), // height px\n        fc.double({ min: 0, max: 1, noNaN: true, noDefaultInfinity: true }), // fractional x\n        fc.double({ min: 0, max: 1, noNaN: true, noDefaultInfinity: true }), // fractional y\n        fc.integer({ min: -1000, max: 1000 }),\n        (\n          sessionId,\n          metric,\n          arrived,\n          width,\n          height,\n          xFrac,\n          yFrac,\n          nowOffset,\n        ) => {\n          const now = NOW + nowOffset;\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n          for (const s of arrived) {\n            store.appendRateSample(sessionId, metric, now - s.ageMs, s.v);\n          }\n\n          const frame = buildFrame(store, metric, now);\n          const trace = frame.traces.find((t) => t.sessionId === sessionId);\n          expect(trace).toBeDefined();\n\n          const pointer = {\n            x: xFrac * width,\n            y: yFrac * height,\n            width,\n            height,\n          };\n          const selection = scopeHitTest(pointer, frame);\n\n          // The property is conditional: whenever a selection is returned,\n          // its value must match the trace's sampled value at selection.time.\n          if (selection === null) return;\n\n          expect(selection.sessionId).toBe(sessionId);\n\n          // Honest-signal lookup: last sample at-or-before selection.time;\n          // when the cursor precedes all arrivals, the earliest sample.\n          const samples = trace!.samples;\n          let sampledValue: number | null = null;\n          let latestTime = Number.NEGATIVE_INFINITY;\n          for (const s of samples) {\n            if (s.t <"+"= selection.time && s.t >= latestTime) {\n              latestTime = s.t;\n              sampledValue = s.v;\n            }\n          }\n          if (sampledValue === null) {\n            let earliest = samples[0];\n            for (const s of samples) {\n              if (s.t <"+" earliest.t) earliest = s;\n            }\n            sampledValue = earliest.v;\n          }\n\n          expect(selection.value).toBeCloseTo(sampledValue, 5);\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// IC-S16: @property Pulse decay factor monotonically decreases with age\n// Tag: @driving_port @property @US-PM-001\n//\n// Generators:\n//   - earlierAge / laterAge: integers inside [0, PULSE_LIFETIME_MS] with\n//     earlierAge <"+"= laterAge (built via chain to guarantee the ordering)\n//   - beyondLifetimeAgeMs: integer strictly greater than PULSE_LIFETIME_MS\n//     but within the pulse-retention window so the store keeps it alive\n//   - kind: PulseKind (tool | subagent | lifecycle)\n//   - sessionId: non-empty string\n//   - metric: one of the three MetricIds\n//   - nowOffset: integer offset around a fixed logical NOW for variety\n//\n// Invariants (business language):\n//   1. decay-monotonicity: for any two ages inside the 2.5s lifetime,\n//      decay at the later age is less-than-or-equal-to decay at the earlier\n//      age (the flare only dims over time, never brightens).\n//   2. beyond-lifetime-absent: a pulse whose age exceeds PULSE_LIFETIME_MS\n//      is absent from the projected frame's `pulses` list, regardless of\n//      session kind or metric (the store may retain it for a longer\n//      retention window, but the frame only exposes visible pulses).\n// ---------------------------------------------------------------------------\n\ndescribe(\"IC-S16 @property: Pulse decay factor monotonically decreases with age\", () => {\n  it(\"decay at later age <"+"= decay at earlier age, and pulses beyond lifetime are absent from the frame\", () => {\n    const metricArb: fc.Arbitrary<"+"MetricId> = fc.constantFrom<"+"MetricId>(\n      \"events\",\n      \"tokens\",\n      \"toolcalls\",\n    );\n    const kindArb: fc.Arbitrary<"+"PulseKind> = fc.constantFrom<"+"PulseKind>(\n      \"tool\",\n      \"subagent\",\n      \"lifecycle\",\n    );\n\n    // Two ages inside [0, PULSE_LIFETIME_MS], ordered earlier <"+"= later.\n    const agePairArb = fc\n      .tuple(\n        fc.integer({ min: 0, max: PULSE_LIFETIME_MS }),\n        fc.integer({ min: 0, max: PULSE_LIFETIME_MS }),\n      )\n      .map(([a, b]) => ({\n        earlierAge: Math.min(a, b),\n        laterAge: Math.max(a, b),\n      }));\n\n    // A pulse age strictly past lifetime but within the store's retention\n    // window so the store keeps the pulse and the frame can prove absence.\n    const beyondLifetimeAgeArb = fc.integer({\n      min: PULSE_LIFETIME_MS + 1,\n      max: PULSE_LIFETIME_MS + 2_000,\n    });\n\n    fc.assert(\n      fc.property(\n        fc.string({ minLength: 1, maxLength: 12 }),\n        metricArb,\n        kindArb,\n        agePairArb,\n        beyondLifetimeAgeArb,\n        fc.integer({ min: -1000, max: 1000 }),\n        (sessionId, metric, kind, agePair, beyondLifetimeAgeMs, nowOffset) => {\n          const now = NOW + nowOffset;\n\n          // Invariant 1: decay monotonicity across arbitrary in-lifetime ages.\n          const decayEarlier = decayFactor(agePair.earlierAge, PULSE_LIFETIME_MS);\n          const decayLater = decayFactor(agePair.laterAge, PULSE_LIFETIME_MS);\n          expect(decayLater).toBeLessThanOrEqual(decayEarlier + 1e-12);\n          // And decay stays within [0, 1] regardless of age ordering.\n          expect(decayEarlier).toBeGreaterThanOrEqual(0);\n          expect(decayEarlier).toBeLessThanOrEqual(1);\n          expect(decayLater).toBeGreaterThanOrEqual(0);\n          expect(decayLater).toBeLessThanOrEqual(1);\n\n          // Invariant 2: a beyond-lifetime pulse is absent from the frame.\n          const store = createMultiSessionStore();\n          store.addSession(sessionId);\n          store.appendPulse(sessionId, {\n            t: now - beyondLifetimeAgeMs,\n            kind,\n            strength: PULSE_STRENGTHS[kind],\n          });\n\n          const frame = buildFrame(store, metric, now);\n          const sessionPulses = frame.pulses.filter(\n            (p) => p.sessionId === sessionId,\n          );\n          expect(sessionPulses).toHaveLength(0);\n        },\n      ),\n    );\n  });\n});\n"},"src/plugins/norbert-usage/domain/phosphor/scopeHitTest.test.ts":{"tests":[{"id":"38","name":"scopeHitTest — within snap distance returns a HoverSelection when pointer is exactly on the sample"},{"id":"39","name":"scopeHitTest — within snap distance returns a HoverSelection when pointer is vertically within HOVER_SNAP_DISTANCE_PX"},{"id":"40","name":"scopeHitTest — within snap distance includes off-canvas (above yMax) traces — they clip to the top edge and remain hoverable"},{"id":"41","name":"scopeHitTest — beyond snap distance returns null when the pointer is vertically farther than HOVER_SNAP_DISTANCE_PX from the trace"},{"id":"42","name":"scopeHitTest — beyond snap distance property: pointer vertically farther than HOVER_SNAP_DISTANCE_PX from an on-scale trace returns null"},{"id":"43","name":"scopeHitTest — pointer outside canvas bounds returns null when pointer x is negative"},{"id":"44","name":"scopeHitTest — pointer outside canvas bounds returns null when pointer x exceeds width"},{"id":"45","name":"scopeHitTest — pointer outside canvas bounds returns null when pointer y is negative"},{"id":"46","name":"scopeHitTest — pointer outside canvas bounds returns null when pointer y exceeds height"},{"id":"47","name":"scopeHitTest — empty frame returns null when frame has zero traces"},{"id":"48","name":"scopeHitTest — empty frame returns null when all traces have zero samples"},{"id":"49","name":"scopeHitTest — nearest of two candidates selects the trace whose sample is vertically closer to the pointer"},{"id":"50","name":"scopeHitTest — nearest of two candidates does not select a trace whose sample is beyond snap when a closer trace is within snap"},{"id":"51","name":"scopeHitTest — exported constants exports HOVER_SNAP_DISTANCE_PX = 28"}],"source":"/**\n * Unit tests: scopeHitTest — pure hit-test over a projected Frame.\n *\n * Behaviors (drives later M4-S2/4/5/6):\n *   1. within-snap:   pointer within HOVER_SNAP_DISTANCE_PX vertical of the\n *                     trace sample at the cursor-time returns a HoverSelection\n *                     identifying that trace.\n *   2. beyond-snap:   pointer outside HOVER_SNAP_DISTANCE_PX vertically\n *                     from every on-canvas trace sample returns null.\n *   3. outside-bounds: pointer x/y outside [0,width]/[0,height] returns null.\n *   4. empty-frame:   frame with no traces returns null regardless of pointer.\n *   5. nearest-of-two: when two traces' samples are within snap, selection\n *                      picks the vertically-closer one.\n *\n * Geometry contract (match the canvas coordinate system used by the scope):\n *   - timeToX(t, width, now) = width * (1 - (now - t) / WINDOW_MS)\n *     (older-left, newer-right; the newest sample sits at x = width)\n *   - valueToY(v, height, yMax) = height * (1 - v / yMax)\n *     (low-value-bottom, high-value-top; canvas origin is top-left)\n *\n * Snap semantics: vertical distance only. The cursor-time is derived from\n * pointer.x and each trace's sample-at-cursor-time determines the trace's\n * y at the pointer's column. Off-canvas sample y positions clip to the\n * nearest canvas edge for distance measurement (off-scale signals remain\n * hoverable — a design choice mirroring the scope's visual clipping).\n *\n * Pure: no imports from `react`, `adapters`, `views`, `window`, `document`,\n * or `domain/oscilloscope`. The function only inspects the Frame structure.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport fc from \"fast-check\";\n\nimport { HOVER_SNAP_DISTANCE_PX, scopeHitTest } from \"./scopeHitTest\";\nimport type { Frame } from \"./scopeProjection\";\nimport {\n  METRICS,\n  SESSION_COLORS,\n  WINDOW_MS,\n  type RateSample,\n} from \"./phosphorMetricConfig\";\n\nconst NOW = 1_000_000_000;\n\n// ---------------------------------------------------------------------------\n// Frame construction helpers — avoid depending on buildFrame so hit-test\n// unit tests remain narrow and decoupled from projection behavior.\n// ---------------------------------------------------------------------------\n\nconst timeToX = (t: number, width: number, now: number): number =>\n  width * (1 - (now - t) / WINDOW_MS);\n\nconst valueToY = (v: number, height: number, yMax: number): number =>\n  height * (1 - v / yMax);\n\nconst buildTestFrame = (\n  traceSpecs: ReadonlyArray<"+"{\n    readonly sessionId: string;\n    readonly color: string;\n    readonly samples: ReadonlyArray<"+"RateSample>;\n  }>,\n): Frame => {\n  const traces = traceSpecs.map((spec) => ({\n    sessionId: spec.sessionId,\n    color: spec.color,\n    samples: spec.samples,\n    latestValue:\n      spec.samples.length === 0 ? null : spec.samples[spec.samples.length - 1].v,\n  }));\n  return {\n    now: NOW,\n    metric: \"events\",\n    yMax: METRICS.events.yMax,\n    unit: METRICS.events.unit,\n    traces,\n    pulses: [],\n    legend: traces.map((t) => ({\n      sessionId: t.sessionId,\n      color: t.color,\n      latestValue: t.latestValue,\n    })),\n  };\n};\n\n// ---------------------------------------------------------------------------\n// Case 1: within-snap — pointer near a trace sample returns a HoverSelection\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — within snap distance\", () => {\n  it(\"returns a HoverSelection when pointer is exactly on the sample\", () => {\n    const width = 1000;\n    const height = 400;\n    const sampleTime = NOW - 1500; // 1.5 seconds ago\n    const sampleValue = 10;\n    const frame = buildTestFrame([\n      {\n        sessionId: \"session-1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: sampleTime, v: sampleValue }],\n      },\n    ]);\n\n    const x = timeToX(sampleTime, width, NOW);\n    const y = valueToY(sampleValue, height, METRICS.events.yMax);\n\n    const selection = scopeHitTest({ x, y, width, height }, frame);\n\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"session-1\");\n    expect(selection?.color).toBe(SESSION_COLORS[0]);\n    expect(selection?.value).toBe(sampleValue);\n    expect(selection?.time).toBe(sampleTime);\n    expect(selection?.ageMs).toBeCloseTo(1500, 3);\n    expect(selection?.displayX).toBeCloseTo(x, 3);\n    expect(selection?.displayY).toBeCloseTo(y, 3);\n  });\n\n  it(\"returns a HoverSelection when pointer is vertically within HOVER_SNAP_DISTANCE_PX\", () => {\n    const width = 1000;\n    const height = 400;\n    const sampleTime = NOW - 2000;\n    const sampleValue = 8;\n    const frame = buildTestFrame([\n      {\n        sessionId: \"session-a\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: sampleTime, v: sampleValue }],\n      },\n    ]);\n\n    const sampleX = timeToX(sampleTime, width, NOW);\n    const sampleY = valueToY(sampleValue, height, METRICS.events.yMax);\n    // Pointer vertically 20px below the sample — within the 28px snap radius.\n    const selection = scopeHitTest(\n      { x: sampleX, y: sampleY + 20, width, height },\n      frame,\n    );\n\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"session-a\");\n    expect(selection?.value).toBe(sampleValue);\n  });\n\n  it(\"includes off-canvas (above yMax) traces — they clip to the top edge and remain hoverable\", () => {\n    // WS-4 shape: value > yMax → displayY <"+" 0. The trace clips to the top\n    // edge (y=0) and a pointer inside the canvas at that x-time is within\n    // snap vertically only if it is within HOVER_SNAP_DISTANCE_PX of y=0.\n    const width = 1000;\n    const height = 400;\n    const sampleTime = NOW - 1500;\n    const offScaleValue = 47; // > events yMax of 15\n    const frame = buildTestFrame([\n      {\n        sessionId: \"focused\",\n        color: SESSION_COLORS[1],\n        samples: [{ t: sampleTime, v: offScaleValue }],\n      },\n    ]);\n\n    // Pointer near the top edge — clipped trace is at y=0, snap holds.\n    const x = timeToX(sampleTime, width, NOW);\n    const selection = scopeHitTest({ x, y: 10, width, height }, frame);\n\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"focused\");\n    expect(selection?.value).toBe(offScaleValue);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Case 2: beyond-snap — pointer too far from every trace returns null\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — beyond snap distance\", () => {\n  it(\"returns null when the pointer is vertically farther than HOVER_SNAP_DISTANCE_PX from the trace\", () => {\n    const width = 1000;\n    const height = 400;\n    const sampleTime = NOW - 1000;\n    const sampleValue = 2;\n    const frame = buildTestFrame([\n      {\n        sessionId: \"session-1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: sampleTime, v: sampleValue }],\n      },\n    ]);\n\n    const sampleY = valueToY(sampleValue, height, METRICS.events.yMax);\n    const sampleX = timeToX(sampleTime, width, NOW);\n    // 100px vertical offset — well outside the 28px snap radius.\n    const selection = scopeHitTest(\n      { x: sampleX, y: sampleY - 100, width, height },\n      frame,\n    );\n\n    expect(selection).toBeNull();\n  });\n\n  it(\"property: pointer vertically farther than HOVER_SNAP_DISTANCE_PX from an on-scale trace returns null\", () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 200, max: 2000 }), // width\n        fc.integer({ min: 200, max: 800 }), // height\n        fc.integer({ min: 40, max: 500 }), // vertical offset beyond snap\n        (width, height, offsetPx) => {\n          // On-scale sample: value well within [0, yMax].\n          const yMax = METRICS.events.yMax;\n          const midValue = yMax / 2;\n          const frame = buildTestFrame([\n            {\n              sessionId: \"s1\",\n              color: SESSION_COLORS[0],\n              samples: [{ t: NOW - 5000, v: midValue }],\n            },\n          ]);\n          const sampleX = timeToX(NOW - 5000, width, NOW);\n          const sampleY = valueToY(midValue, height, yMax);\n          // Place pointer vertically offset — choose direction that keeps it\n          // inside the canvas.\n          const directions = [sampleY - offsetPx, sampleY + offsetPx].filter(\n            (py) => py >= 0 && py <"+"= height,\n          );\n          for (const py of directions) {\n            const selection = scopeHitTest(\n              { x: sampleX, y: py, width, height },\n              frame,\n            );\n            expect(selection).toBeNull();\n          }\n        },\n      ),\n      { numRuns: 100 },\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Case 3: outside-bounds — pointer outside the canvas returns null\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — pointer outside canvas bounds\", () => {\n  it(\"returns null when pointer x is negative\", () => {\n    const frame = buildTestFrame([\n      {\n        sessionId: \"s1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: NOW - 1000, v: 5 }],\n      },\n    ]);\n    const selection = scopeHitTest(\n      { x: -5, y: 100, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n\n  it(\"returns null when pointer x exceeds width\", () => {\n    const frame = buildTestFrame([\n      {\n        sessionId: \"s1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: NOW - 1000, v: 5 }],\n      },\n    ]);\n    const selection = scopeHitTest(\n      { x: 1001, y: 100, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n\n  it(\"returns null when pointer y is negative\", () => {\n    const frame = buildTestFrame([\n      {\n        sessionId: \"s1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: NOW - 1000, v: 5 }],\n      },\n    ]);\n    const selection = scopeHitTest(\n      { x: 500, y: -1, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n\n  it(\"returns null when pointer y exceeds height\", () => {\n    const frame = buildTestFrame([\n      {\n        sessionId: \"s1\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: NOW - 1000, v: 5 }],\n      },\n    ]);\n    const selection = scopeHitTest(\n      { x: 500, y: 401, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Case 4: empty-frame — no traces means no hover selection ever\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — empty frame\", () => {\n  it(\"returns null when frame has zero traces\", () => {\n    const frame = buildTestFrame([]);\n    const selection = scopeHitTest(\n      { x: 500, y: 200, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n\n  it(\"returns null when all traces have zero samples\", () => {\n    const frame = buildTestFrame([\n      { sessionId: \"s1\", color: SESSION_COLORS[0], samples: [] },\n      { sessionId: \"s2\", color: SESSION_COLORS[1], samples: [] },\n    ]);\n    const selection = scopeHitTest(\n      { x: 500, y: 200, width: 1000, height: 400 },\n      frame,\n    );\n    expect(selection).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Case 5: nearest-of-two — when multiple traces are within snap, pick nearest\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — nearest of two candidates\", () => {\n  it(\"selects the trace whose sample is vertically closer to the pointer\", () => {\n    const width = 1000;\n    const height = 400;\n    const yMax = METRICS.events.yMax;\n    const sampleTime = NOW - 10000;\n\n    // Two on-scale traces at the same x but different values.\n    const valueA = 2;\n    const valueB = 10;\n    const frame = buildTestFrame([\n      {\n        sessionId: \"session-A\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: sampleTime, v: valueA }],\n      },\n      {\n        sessionId: \"session-B\",\n        color: SESSION_COLORS[1],\n        samples: [{ t: sampleTime, v: valueB }],\n      },\n    ]);\n\n    const x = timeToX(sampleTime, width, NOW);\n    const yB = valueToY(valueB, height, yMax);\n    // Pointer very close to trace-B's sample — should select session-B.\n    const selection = scopeHitTest({ x, y: yB + 3, width, height }, frame);\n\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"session-B\");\n    expect(selection?.value).toBe(valueB);\n  });\n\n  it(\"does not select a trace whose sample is beyond snap when a closer trace is within snap\", () => {\n    const width = 1000;\n    const height = 400;\n    const yMax = METRICS.events.yMax;\n    const sampleTime = NOW - 10000;\n\n    // Trace A sits at pointer y; trace B sits 200px below — beyond snap.\n    const pointerY = valueToY(5, height, yMax);\n    const frame = buildTestFrame([\n      {\n        sessionId: \"close\",\n        color: SESSION_COLORS[0],\n        samples: [{ t: sampleTime, v: 5 }],\n      },\n      {\n        sessionId: \"far\",\n        color: SESSION_COLORS[1],\n        samples: [{ t: sampleTime, v: 5 - (200 * yMax) / height }],\n      },\n    ]);\n\n    const x = timeToX(sampleTime, width, NOW);\n    const selection = scopeHitTest({ x, y: pointerY, width, height }, frame);\n\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"close\");\n  });\n});\n\n// ---------------------------------------------------------------------------\n// HOVER_SNAP_DISTANCE_PX export — constant exposed for downstream config\n// ---------------------------------------------------------------------------\n\ndescribe(\"scopeHitTest — exported constants\", () => {\n  it(\"exports HOVER_SNAP_DISTANCE_PX = 28\", () => {\n    expect(HOVER_SNAP_DISTANCE_PX).toBe(28);\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/milestone-2-pulses.test.ts":{"tests":[{"id":"52","name":"M2-S1: A fresh tool call pulse flares brightest at arrival fresh pulse has decay factor at maximum value"},{"id":"53","name":"M2-S2: A mid-life pulse carries a decay factor proportional to its age 1.25s-old pulse has decay factor of approximately 0.5"},{"id":"54","name":"M2-S3: Pulse strength varies with event kind tool call pulse strength exceeds lifecycle pulse strength"},{"id":"55","name":"M2-S3b: Three pulse kinds exhibit the full strength ordering tool > subagent > lifecycle — pulses sort by strength descending"},{"id":"56","name":"M2-S4: Multiple pulses coexist on a single session's trace three pulses keep their own arrival times and decay factors"},{"id":"57","name":"M2-S5: A pulse older than 2.5 seconds is absent from the frame 3s-old pulse is not projected into the frame"},{"id":"58","name":"M2-S6: The store trims pulses older than the retention cutoff pulses older than 5s are absent from the store; younger pulses remain"},{"id":"59","name":"M2-S7: A pulse references a session value from the same arrived history pulse's vertical value matches the arrived rate sample at its time"},{"id":"60","name":"M2-S8: A session with pulses but no arrived rate history produces pulses at baseline pulse sits at zero baseline and no fabricated rate sample appears on the trace"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Milestone 2\n * Hook Event Pulses.\n *\n * Pulses flare on the originating session's trace at the event's arrival\n * timestamp and decay linearly over a 2.5-second visual lifetime. Pulses\n * beyond their lifetime are absent from the frame. The store trims pulses\n * older than retention (5s).\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame\n *   - multiSessionStore.addSession / appendRateSample / appendPulse / getPulses\n *\n * Feature file: milestone-2-pulses.feature\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md §4 Q1,\n * ADR-049 (pulse log retention).\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  NOW,\n  PULSE_LIFETIME_MS,\n  PULSE_RETENTION_MS,\n  PULSE_STRENGTHS,\n  SESSION_COLORS,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports.\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\n// ---------------------------------------------------------------------------\n// M2-S1: A fresh tool call pulse flares brightest at arrival\n// Tag: @driving_port @US-PM-001\n// First scenario of this file — must fail for a BUSINESS-logic reason.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S1: A fresh tool call pulse flares brightest at arrival\", () => {\n  it(\"fresh pulse has decay factor at maximum value\", () => {\n    // Given session-1 has a steady envelope and a tool call arrives now\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then there is a pulse on session-1 at the current time with max decay\n    const pulses = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulses).toHaveLength(1);\n    expect(pulses[0].t).toBe(NOW);\n    // decay is 1 at age=0 (fresh)\n    expect(pulses[0].decay).toBeCloseTo(1, 5);\n    expect(pulses[0].color).toBe(SESSION_COLORS[0]);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S2: A mid-life pulse carries a decay factor proportional to its age\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S2: A mid-life pulse carries a decay factor proportional to its age\", () => {\n  it(\"1.25s-old pulse has decay factor of approximately 0.5\", () => {\n    // Given session-1 has a steady envelope and a tool call arrived 1.25s ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const ageMs = 1250;\n    store.appendPulse(\"session-1\", {\n      t: NOW - ageMs,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the pulse is positioned at 1.25s ago with expected decay\n    const pulses = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulses).toHaveLength(1);\n    expect(pulses[0].t).toBe(NOW - ageMs);\n\n    const expectedDecay = 1 - ageMs / PULSE_LIFETIME_MS;\n    expect(pulses[0].decay).toBeCloseTo(expectedDecay, 3);\n    expect(pulses[0].decay).toBeCloseTo(0.5, 2);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S3: Pulse strength varies with event kind\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S3: Pulse strength varies with event kind\", () => {\n  it(\"tool call pulse strength exceeds lifecycle pulse strength\", () => {\n    // Given session-1 has a steady envelope and two kinds of event arrive now\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"lifecycle\",\n      strength: PULSE_STRENGTHS.lifecycle,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then two pulses are present with tool > lifecycle strength\n    const pulses = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulses).toHaveLength(2);\n    const tool = pulses.find((p) => p.kind === \"tool\");\n    const lifecycle = pulses.find((p) => p.kind === \"lifecycle\");\n    expect(tool).toBeDefined();\n    expect(lifecycle).toBeDefined();\n    expect(tool!.strength).toBeGreaterThan(lifecycle!.strength);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S3b (PA finding 3): Three pulse kinds exhibit the full\n// tool-subagent-lifecycle strength ordering.\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S3b: Three pulse kinds exhibit the full strength ordering\", () => {\n  it(\"tool > subagent > lifecycle — pulses sort by strength descending\", () => {\n    // Given session-1 has a steady envelope and three kinds of event arrive now\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    // Append in a non-strength order so the test exercises ordering by strength,\n    // not insertion order.\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"lifecycle\",\n      strength: PULSE_STRENGTHS.lifecycle,\n    });\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"subagent\",\n      strength: PULSE_STRENGTHS.subagent,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then three pulses appear on session-1, ordered by strength descending\n    const pulses = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulses).toHaveLength(3);\n    expect(pulses.map((p) => p.kind)).toEqual([\"tool\", \"subagent\", \"lifecycle\"]);\n    // Strengths must strictly decrease\n    expect(pulses[0].strength).toBeGreaterThan(pulses[1].strength);\n    expect(pulses[1].strength).toBeGreaterThan(pulses[2].strength);\n    // And match the canonical PULSE_STRENGTHS values\n    expect(pulses[0].strength).toBe(PULSE_STRENGTHS.tool);\n    expect(pulses[1].strength).toBe(PULSE_STRENGTHS.subagent);\n    expect(pulses[2].strength).toBe(PULSE_STRENGTHS.lifecycle);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S4: Multiple pulses coexist on a single session's trace\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S4: Multiple pulses coexist on a single session's trace\", () => {\n  it(\"three pulses keep their own arrival times and decay factors\", () => {\n    // Given session-1 has a steady envelope and three tool calls at 0.5s, 1.0s, 2.0s ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const ages = [500, 1000, 2000];\n    for (const ageMs of ages) {\n      store.appendPulse(\"session-1\", {\n        t: NOW - ageMs,\n        kind: \"tool\",\n        strength: PULSE_STRENGTHS.tool,\n      });\n    }\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then three pulses are present, each at its own time with its own decay\n    const pulses = frame.pulses\n      .filter((p) => p.sessionId === \"session-1\")\n      .sort((a, b) => b.t - a.t); // newest first\n    expect(pulses).toHaveLength(3);\n\n    for (let i = 0; i <"+" ages.length; i++) {\n      const ageMs = ages[i];\n      const matching = pulses.find((p) => p.t === NOW - ageMs);\n      expect(matching).toBeDefined();\n      const expectedDecay = 1 - ageMs / PULSE_LIFETIME_MS;\n      expect(matching!.decay).toBeCloseTo(expectedDecay, 3);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S5: A pulse older than 2.5 seconds is absent from the frame\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S5: A pulse older than 2.5 seconds is absent from the frame\", () => {\n  it(\"3s-old pulse is not projected into the frame\", () => {\n    // Given session-1 has a steady envelope and a tool call arrived 3s ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    store.appendPulse(\"session-1\", {\n      t: NOW - 3000,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then no pulses appear for session-1 in the frame\n    const pulses = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulses).toHaveLength(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S6: The store trims pulses older than the retention cutoff\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S6: The store trims pulses older than the retention cutoff\", () => {\n  it(\"pulses older than 5s are absent from the store; younger pulses remain\", () => {\n    // Given session-1 has pulses at various ages including some beyond retention\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const ages = [1_000, 2_000, 4_500, 5_500, 10_000];\n    for (const ageMs of ages) {\n      store.appendPulse(\"session-1\", {\n        t: NOW - ageMs,\n        kind: \"tool\",\n        strength: PULSE_STRENGTHS.tool,\n      });\n    }\n\n    // When the store is queried (trimming is internal to the store)\n    const retained = store.getPulses(\"session-1\");\n\n    // Then only pulses within the retention window remain\n    for (const pulse of retained) {\n      expect(NOW - pulse.t).toBeLessThanOrEqual(PULSE_RETENTION_MS);\n    }\n\n    // And no retained pulse is older than the retention cutoff\n    const retainedAges = retained.map((p) => NOW - p.t);\n    for (const ageMs of retainedAges) {\n      expect(ageMs).toBeLessThanOrEqual(PULSE_RETENTION_MS);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S7: A pulse references a session value from the same arrived history\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S7: A pulse references a session value from the same arrived history\", () => {\n  it(\"pulse's vertical value matches the arrived rate sample at its time\", () => {\n    // Given session-1 has an arrived rate of 10 at 1s ago and a pulse also at 1s ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    // Build a history whose sample at (NOW - 1000) equals 10.\n    store.appendRateSample(\"session-1\", \"events\", NOW - 5000, 10);\n    store.appendRateSample(\"session-1\", \"events\", NOW - 1000, 10);\n\n    store.appendPulse(\"session-1\", {\n      t: NOW - 1000,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the pulse's vertical position value is 10 (the arrived rate at t)\n    const pulse = frame.pulses.find((p) => p.sessionId === \"session-1\");\n    expect(pulse).toBeDefined();\n    expect(pulse!.v).toBeCloseTo(10, 5);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M2-S8: A session with pulses but no arrived rate history produces pulses at baseline\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M2-S8: A session with pulses but no arrived rate history produces pulses at baseline\", () => {\n  it(\"pulse sits at zero baseline and no fabricated rate sample appears on the trace\", () => {\n    // Given session-1 has been added but has no rate samples\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n\n    // And a lifecycle hook event arrives now\n    store.appendPulse(\"session-1\", {\n      t: NOW,\n      kind: \"lifecycle\",\n      strength: PULSE_STRENGTHS.lifecycle,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then session-1 has a pulse, positioned at the baseline (v = 0)\n    const pulse = frame.pulses.find((p) => p.sessionId === \"session-1\");\n    expect(pulse).toBeDefined();\n    expect(pulse!.v).toBe(0);\n\n    // And no fabricated sample appears on session-1's trace\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.samples).toHaveLength(0);\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/milestone-4-hover-tooltip.test.ts":{"tests":[{"id":"61","name":"M4-S1: Hover near a trace snaps to that session's nearest value selects session-1 at 12 evt/s with an age near 2 seconds"},{"id":"62","name":"M4-S2: Hover snaps to the nearest of two overlapping traces selects the trace whose vertical position is closer to the pointer"},{"id":"63","name":"M4-S3: Hover value comes from sampling the arrived history at the pointer's time value is the bracketing arrived sample at the pointer's time (no interpolation) and matches the trace's projected value"},{"id":"64","name":"M4-S4: Hover beyond the snap threshold produces no selection returns null when vertical distance exceeds the snap threshold"},{"id":"65","name":"M4-S5: Hover outside the scope area produces no selection returns null for pointer coordinates outside the scope rectangle"},{"id":"66","name":"M4-S6: Hover with no active sessions produces no selection returns null when the frame has no traces"},{"id":"67","name":"M4-S7: Hover at the right edge reports an age near zero age is less than 0.5 seconds at the current-time edge of the scope"},{"id":"68","name":"M4-S8: Hover at the left edge reports an age near the window length age is approximately 60 seconds at the left edge of the scope"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Milestone 4\n * Hover Tooltip.\n *\n * Hovering over the scope snaps to the nearest trace within a vertical\n * distance threshold and produces a selection identifying the session, its\n * arrived value at the pointer's time, and the age of that value. Minimal\n * content, no drill-down.\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame\n *   - scopeHitTest(pointer, frame) -> HoverSelection | null\n *   - multiSessionStore.addSession / appendRateSample\n *\n * Feature file: milestone-4-hover-tooltip.feature\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md §4 Q3 (hover\n * contract), amended ADR-010 (pure hit-test + React tooltip).\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  HOVER_SNAP_DISTANCE_PX,\n  NOW,\n  WINDOW_MS,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports (resolved as DELIVER wave lands modules).\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { scopeHitTest } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeHitTest\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\nconst WIDTH = 1000;\nconst HEIGHT = 400;\n\nfunction xForAgeMs(ageMs: number): number {\n  return WIDTH * (1 - ageMs / WINDOW_MS);\n}\n\n// ---------------------------------------------------------------------------\n// M4-S1: Hover near a trace snaps to that session's nearest value\n// Tag: @driving_port @US-PM-001\n// First scenario of this file — must fail for a BUSINESS-logic reason.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S1: Hover near a trace snaps to that session's nearest value\", () => {\n  it(\"selects session-1 at 12 evt/s with an age near 2 seconds\", () => {\n    // Given two sessions: session-1 carries 12 evt/s at 2s ago; session-2 is quiet\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n    const quiet = synthesizeArrivedHistory(12, () => 0.5);\n    for (const s of quiet) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    const s1History = synthesizeArrivedHistory(12, () => 12);\n    for (const s of s1History) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    // Explicit sample at exactly 2s ago — the scenario's anchor point.\n    store.appendRateSample(\"session-1\", \"events\", NOW - 2000, 12);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is at the trace's (x, y) for session-1 at 2s ago\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    const x = xForAgeMs(2000);\n    // Target y on session-1's trace: yMax=15, value=12 -> near top of scope\n    const yMax = frame.yMax;\n    const y = HEIGHT - (12 / yMax) * HEIGHT;\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the selection identifies session-1 at value 12 with age near 2s\n    expect(selection).not.toBeNull();\n    expect(selection!.sessionId).toBe(\"session-1\");\n    expect(selection!.value).toBeCloseTo(12, 1);\n    expect(selection!.ageMs).toBeGreaterThan(1500);\n    expect(selection!.ageMs).toBeLessThan(2500);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S2: Hover snaps to the nearest of two overlapping traces\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S2: Hover snaps to the nearest of two overlapping traces\", () => {\n  it(\"selects the trace whose vertical position is closer to the pointer\", () => {\n    // Given session-1 at 10 evt/s and session-2 at 8 evt/s at current time\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n    const h1 = synthesizeArrivedHistory(12, () => 10);\n    const h2 = synthesizeArrivedHistory(12, () => 8);\n    for (const s of h1) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    for (const s of h2) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is slightly closer to session-1's trace y-position\n    const yMax = frame.yMax; // 15 for events\n    const y1 = HEIGHT - (10 / yMax) * HEIGHT;\n    const y2 = HEIGHT - (8 / yMax) * HEIGHT;\n    const y = y1 + (y2 - y1) * 0.3; // 30% of the way from y1 to y2 -- closer to y1\n    const x = xForAgeMs(0); // current-time edge\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the selection identifies session-1, not session-2\n    expect(selection).not.toBeNull();\n    expect(selection!.sessionId).toBe(\"session-1\");\n    expect(selection!.sessionId).not.toBe(\"session-2\");\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S3: Hover value comes from sampling the arrived history at the pointer's time\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S3: Hover value comes from sampling the arrived history at the pointer's time\", () => {\n  it(\"value is the bracketing arrived sample at the pointer's time (no interpolation) and matches the trace's projected value\", () => {\n    // Given session-1 has arrived samples at 5s intervals with distinct values\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    // Arrived: (NOW - 15_000, 4), (NOW - 10_000, 8), (NOW - 5_000, 12)\n    store.appendRateSample(\"session-1\", \"events\", NOW - 15_000, 4);\n    store.appendRateSample(\"session-1\", \"events\", NOW - 10_000, 8);\n    store.appendRateSample(\"session-1\", \"events\", NOW - 5_000, 12);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is between (NOW-10s, 8) and (NOW-5s, 12), at midpoint (NOW-7.5s)\n    // Expected value at pointerTime under the scope's bracketing rule (last sample\n    // at-or-before pointerTime) = 8. No interpolation — the trace is a step/line\n    // over the arrived samples and the hover value must sit on the same\n    // bracketed sample that projection uses.\n    const pointerTime = NOW - 7500;\n    const ageMs = NOW - pointerTime;\n    const x = xForAgeMs(ageMs);\n    const yMax = frame.yMax;\n    // Place the pointer vertically near the bracketed value (8) so the hit-test\n    // snaps to session-1; the exact y does not affect the reported value (the\n    // reported value is a property of pointer's x-time, not y).\n    const y = HEIGHT - (8 / yMax) * HEIGHT;\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the selection's value is the bracketed arrived value (not an interpolation)\n    expect(selection).not.toBeNull();\n    expect(selection!.sessionId).toBe(\"session-1\");\n    expect(selection!.value).toBeCloseTo(8, 5);\n\n    // And the value matches the trace's bracketed value at the pointer's time —\n    // the value of the latest sample at-or-before pointerTime from the trace the\n    // projection emits. scopeHitTest and scopeProjection must agree.\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\")!;\n    const bracketed = trace.samples.reduce<"+"{ t: number; v: number } | null>(\n      (best, s) => {\n        if (s.t > pointerTime) return best;\n        if (best === null || s.t > best.t) return s;\n        return best;\n      },\n      null,\n    );\n    expect(bracketed).not.toBeNull();\n    expect(selection!.value).toBeCloseTo(bracketed!.v, 5);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S4: Hover beyond the snap threshold produces no selection\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S4: Hover beyond the snap threshold produces no selection\", () => {\n  it(\"returns null when vertical distance exceeds the snap threshold\", () => {\n    // Given session-1's trace sits near the bottom (value 1 on yMax=15)\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 1);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is near the top of the scope (far above the trace)\n    const x = xForAgeMs(0);\n    const y = 5; // well above the trace; distance > HOVER_SNAP_DISTANCE_PX\n\n    // Sanity: the trace y is much lower on screen\n    const yMax = frame.yMax;\n    const traceY = HEIGHT - (1 / yMax) * HEIGHT;\n    expect(Math.abs(y - traceY)).toBeGreaterThan(HOVER_SNAP_DISTANCE_PX);\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the hover is absent\n    expect(selection).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S5: Hover outside the scope area produces no selection\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S5: Hover outside the scope area produces no selection\", () => {\n  it(\"returns null for pointer coordinates outside the scope rectangle\", () => {\n    // Given session-1 has history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 5);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is outside the scope rectangle (negative x, or past right edge)\n    const outsideLeft = scopeHitTest(\n      { x: -10, y: HEIGHT / 2, width: WIDTH, height: HEIGHT },\n      frame,\n    );\n    const outsideRight = scopeHitTest(\n      { x: WIDTH + 10, y: HEIGHT / 2, width: WIDTH, height: HEIGHT },\n      frame,\n    );\n    const outsideTop = scopeHitTest(\n      { x: WIDTH / 2, y: -10, width: WIDTH, height: HEIGHT },\n      frame,\n    );\n    const outsideBottom = scopeHitTest(\n      { x: WIDTH / 2, y: HEIGHT + 10, width: WIDTH, height: HEIGHT },\n      frame,\n    );\n\n    // Then the hover is absent in every case\n    expect(outsideLeft).toBeNull();\n    expect(outsideRight).toBeNull();\n    expect(outsideTop).toBeNull();\n    expect(outsideBottom).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S6: Hover with no active sessions produces no selection\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S6: Hover with no active sessions produces no selection\", () => {\n  it(\"returns null when the frame has no traces\", () => {\n    // Given no sessions are active\n    const store = createMultiSessionStore();\n    const frame = buildFrame(store, \"events\", NOW);\n    expect(frame.traces).toHaveLength(0);\n\n    // When the pointer is inside the scope area\n    const selection = scopeHitTest(\n      { x: WIDTH / 2, y: HEIGHT / 2, width: WIDTH, height: HEIGHT },\n      frame,\n    );\n\n    // Then the hover is absent\n    expect(selection).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S7: Hover at the right edge reports an age near zero\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S7: Hover at the right edge reports an age near zero\", () => {\n  it(\"age is less than 0.5 seconds at the current-time edge of the scope\", () => {\n    // Given session-1 has a recent arrived sample at the current moment\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.appendRateSample(\"session-1\", \"events\", NOW, 10);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is at the right edge of the scope over session-1's trace\n    const x = WIDTH - 1;\n    const yMax = frame.yMax;\n    const y = HEIGHT - (10 / yMax) * HEIGHT;\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the selection's age is less than 0.5 seconds\n    expect(selection).not.toBeNull();\n    expect(selection!.sessionId).toBe(\"session-1\");\n    expect(selection!.ageMs).toBeLessThan(500);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M4-S8: Hover at the left edge reports an age near the window length\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M4-S8: Hover at the left edge reports an age near the window length\", () => {\n  it(\"age is approximately 60 seconds at the left edge of the scope\", () => {\n    // Given session-1 has arrived samples spanning the full 60s window\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    for (let ageS = 60; ageS >= 0; ageS -= 5) {\n      store.appendRateSample(\"session-1\", \"events\", NOW - ageS * 1000, 6);\n    }\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // When the pointer is at the left edge\n    const x = 0;\n    const yMax = frame.yMax;\n    const y = HEIGHT - (6 / yMax) * HEIGHT;\n\n    const selection = scopeHitTest({ x, y, width: WIDTH, height: HEIGHT }, frame);\n\n    // Then the selection's age is approximately 60 seconds\n    expect(selection).not.toBeNull();\n    expect(selection!.ageMs).toBeGreaterThan(WINDOW_MS - 2000);\n    expect(selection!.ageMs).toBeLessThanOrEqual(WINDOW_MS);\n  });\n});\n"},"src/plugins/norbert-usage/domain/phosphor/rateDerivation.test.ts":{"tests":[{"id":"69","name":"deriveEventsRate — reference example from IC-S1 15 events over a 5-second window yields 3 evt/s at the tick boundary"},{"id":"70","name":"deriveEventsRate — zero events a count of zero yields a rate of zero"},{"id":"71","name":"deriveEventsRate — fractional rate 12 events over a 5-second window yields a fractional 2.4 evt/s"},{"id":"72","name":"deriveEventsRate — 1-second window boundary N events over a 1-second window yields N evt/s"},{"id":"73","name":"deriveEventsRate — timestamp preservation (property) the returned t equals the input tickBoundaryT for any valid triplet"},{"id":"74","name":"deriveEventsRate — linear scaling with count (property) doubling the count doubles the rate for a fixed window"},{"id":"75","name":"deriveTokensRate — reference example from IC-S2 500 tokens over a 2-second duration yields 250 tok/s at the tick boundary"},{"id":"76","name":"deriveTokensRate — zero-duration defensive lock a durationMs of zero yields a rate of zero (no throw)"},{"id":"77","name":"deriveTokensRate — zero tokens a totalTokens of zero yields a rate of zero regardless of duration"},{"id":"78","name":"deriveTokensRate — very-large totals 10 million tokens over a 1-second duration yields 10 million tok/s without overflow"},{"id":"79","name":"deriveTokensRate — timestamp preservation (property) the returned t equals the input tickBoundaryT for any valid triplet"},{"id":"80","name":"deriveToolCallsRate — reference example from IC-S3 10 tool calls over a 5-second window yields 2 calls/s at the tick boundary"},{"id":"81","name":"deriveToolCallsRate — zero tool calls a count of zero yields a rate of zero"},{"id":"82","name":"deriveToolCallsRate — fractional rate 3 tool calls over a 5-second window yields a fractional 0.6 calls/s"},{"id":"83","name":"deriveToolCallsRate — timestamp preservation (property) the returned t equals the input tickBoundaryT for any valid triplet"},{"id":"84","name":"deriveToolCallsRate — linear scaling with count (property) doubling the count doubles the rate for a fixed window"}],"source":"/**\n * Unit tests: rate-derivation helpers.\n *\n * Semantics (v2-phosphor-architecture §5 Q1):\n *   deriveEventsRate(count, windowMs, tickBoundaryT)\n *     = { t: tickBoundaryT, v: count / (windowMs / 1000) }\n *   deriveTokensRate(totalTokens, durationMs, tickBoundaryT)\n *     = { t: tickBoundaryT, v: totalTokens / (durationMs / 1000) }\n *   deriveToolCallsRate(toolCallCount, windowMs, tickBoundaryT)\n *     = { t: tickBoundaryT, v: toolCallCount / (windowMs / 1000) }\n *   Zero-duration lock: deriveTokensRate(_, 0, t) = { t, v: 0 }\n *     (defensive — prefer a safe sample over throwing, so pipelines do not\n *      crash on malformed OTel api-request events).\n *\n * Behaviors (one-test-per-behavior — property/example mix):\n *   deriveEventsRate:\n *     1. Reference example — 15 events over 5s yields 3 evt/s at the tick boundary.\n *     2. Zero events — count=0 yields v=0 regardless of window size.\n *     3. Fractional rate — counts not divisible by (windowMs/1000) yield fractional v.\n *     4. Boundary window — windowMs=1000 yields v=count (1-second window).\n *     5. Property: timestamp round-trip — the returned t always equals the input tickBoundaryT.\n *     6. Property: rate scales linearly with count for a fixed window.\n *\n *   deriveTokensRate:\n *     1. Reference example — 500 tokens over 2s yields 250 tok/s at t.\n *     2. Zero-duration defensive lock — durationMs=0 yields v=0 (no throw).\n *     3. Zero tokens — totalTokens=0 yields v=0 regardless of duration.\n *     4. Very-large totals — 10M tokens over 1s yields 10M tok/s (no overflow).\n *     5. Property: timestamp round-trip — returned t always equals input tickBoundaryT.\n *\n *   deriveToolCallsRate (mirrors deriveEventsRate — same windowed-counter shape):\n *     1. Reference example — 10 tool calls over 5s yields 2 calls/s at the tick boundary.\n *     2. Zero tool calls — toolCallCount=0 yields v=0 regardless of window size.\n *     3. Fractional rate — counts not divisible by (windowMs/1000) yield fractional v.\n *     4. Property: timestamp round-trip — returned t always equals input tickBoundaryT.\n *     5. Property: rate scales linearly with count for a fixed window.\n *\n * Pure: no effects. Each function under test is a total pure function of three\n * finite numbers. Port-to-port at domain scope: the public function signature\n * IS the port.\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport fc from \"fast-check\";\n\nimport {\n  deriveEventsRate,\n  deriveTokensRate,\n  deriveToolCallsRate,\n} from \"./rateDerivation\";\n\ndescribe(\"deriveEventsRate — reference example from IC-S1\", () => {\n  it(\"15 events over a 5-second window yields 3 evt/s at the tick boundary\", () => {\n    const sample = deriveEventsRate(15, 5000, 1_000_000_000);\n\n    expect(sample.v).toBeCloseTo(3, 5);\n    expect(sample.t).toBe(1_000_000_000);\n  });\n});\n\ndescribe(\"deriveEventsRate — zero events\", () => {\n  it(\"a count of zero yields a rate of zero\", () => {\n    const sample = deriveEventsRate(0, 5000, 42);\n\n    expect(sample.v).toBe(0);\n    expect(sample.t).toBe(42);\n  });\n});\n\ndescribe(\"deriveEventsRate — fractional rate\", () => {\n  it(\"12 events over a 5-second window yields a fractional 2.4 evt/s\", () => {\n    const sample = deriveEventsRate(12, 5000, 0);\n\n    expect(sample.v).toBeCloseTo(2.4, 5);\n    expect(sample.t).toBe(0);\n  });\n});\n\ndescribe(\"deriveEventsRate — 1-second window boundary\", () => {\n  it(\"N events over a 1-second window yields N evt/s\", () => {\n    const sample = deriveEventsRate(7, 1000, 123_456);\n\n    expect(sample.v).toBeCloseTo(7, 5);\n    expect(sample.t).toBe(123_456);\n  });\n});\n\ndescribe(\"deriveEventsRate — timestamp preservation (property)\", () => {\n  it(\"the returned t equals the input tickBoundaryT for any valid triplet\", () => {\n
