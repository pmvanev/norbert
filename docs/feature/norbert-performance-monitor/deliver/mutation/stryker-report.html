   fc.assert(\n      fc.property(\n        fc.integer({ min: 0, max: 10_000 }),\n        fc.integer({ min: 1, max: 60_000 }),\n        fc.integer({ min: 0, max: 2_000_000_000 }),\n        (count, windowMs, tickBoundary) => {\n          const sample = deriveEventsRate(count, windowMs, tickBoundary);\n          expect(sample.t).toBe(tickBoundary);\n        },\n      ),\n    );\n  });\n});\n\ndescribe(\"deriveEventsRate — linear scaling with count (property)\", () => {\n  it(\"doubling the count doubles the rate for a fixed window\", () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 0, max: 1_000 }),\n        fc.integer({ min: 1_000, max: 60_000 }),\n        fc.integer({ min: 0, max: 2_000_000_000 }),\n        (count, windowMs, tickBoundary) => {\n          const single = deriveEventsRate(count, windowMs, tickBoundary);\n          const doubled = deriveEventsRate(count * 2, windowMs, tickBoundary);\n          expect(doubled.v).toBeCloseTo(single.v * 2, 5);\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// deriveTokensRate — delta-over-duration semantics (IC-S2)\n// ---------------------------------------------------------------------------\n\ndescribe(\"deriveTokensRate — reference example from IC-S2\", () => {\n  it(\"500 tokens over a 2-second duration yields 250 tok/s at the tick boundary\", () => {\n    const sample = deriveTokensRate(500, 2000, 1_000_000_000);\n\n    expect(sample.v).toBeCloseTo(250, 5);\n    expect(sample.t).toBe(1_000_000_000);\n  });\n});\n\ndescribe(\"deriveTokensRate — zero-duration defensive lock\", () => {\n  it(\"a durationMs of zero yields a rate of zero (no throw)\", () => {\n    const sample = deriveTokensRate(500, 0, 42);\n\n    expect(sample.v).toBe(0);\n    expect(sample.t).toBe(42);\n  });\n});\n\ndescribe(\"deriveTokensRate — zero tokens\", () => {\n  it(\"a totalTokens of zero yields a rate of zero regardless of duration\", () => {\n    const sample = deriveTokensRate(0, 2000, 99);\n\n    expect(sample.v).toBe(0);\n    expect(sample.t).toBe(99);\n  });\n});\n\ndescribe(\"deriveTokensRate — very-large totals\", () => {\n  it(\"10 million tokens over a 1-second duration yields 10 million tok/s without overflow\", () => {\n    const sample = deriveTokensRate(10_000_000, 1000, 7);\n\n    expect(sample.v).toBeCloseTo(10_000_000, 0);\n    expect(Number.isFinite(sample.v)).toBe(true);\n    expect(sample.t).toBe(7);\n  });\n});\n\ndescribe(\"deriveTokensRate — timestamp preservation (property)\", () => {\n  it(\"the returned t equals the input tickBoundaryT for any valid triplet\", () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 0, max: 100_000_000 }),\n        fc.integer({ min: 0, max: 60_000 }),\n        fc.integer({ min: 0, max: 2_000_000_000 }),\n        (totalTokens, durationMs, tickBoundary) => {\n          const sample = deriveTokensRate(totalTokens, durationMs, tickBoundary);\n          expect(sample.t).toBe(tickBoundary);\n          expect(Number.isFinite(sample.v)).toBe(true);\n          expect(sample.v).toBeGreaterThanOrEqual(0);\n        },\n      ),\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// deriveToolCallsRate — windowed-counter semantics (IC-S3)\n//\n// Mirrors deriveEventsRate: a windowed count divided by the window length in\n// seconds. Shares the same purity and permissiveness contract — callers\n// upstream guarantee windowMs > 0 and toolCallCount >= 0.\n// ---------------------------------------------------------------------------\n\ndescribe(\"deriveToolCallsRate — reference example from IC-S3\", () => {\n  it(\"10 tool calls over a 5-second window yields 2 calls/s at the tick boundary\", () => {\n    const sample = deriveToolCallsRate(10, 5000, 1_000_000_000);\n\n    expect(sample.v).toBeCloseTo(2, 5);\n    expect(sample.t).toBe(1_000_000_000);\n  });\n});\n\ndescribe(\"deriveToolCallsRate — zero tool calls\", () => {\n  it(\"a count of zero yields a rate of zero\", () => {\n    const sample = deriveToolCallsRate(0, 5000, 42);\n\n    expect(sample.v).toBe(0);\n    expect(sample.t).toBe(42);\n  });\n});\n\ndescribe(\"deriveToolCallsRate — fractional rate\", () => {\n  it(\"3 tool calls over a 5-second window yields a fractional 0.6 calls/s\", () => {\n    const sample = deriveToolCallsRate(3, 5000, 0);\n\n    expect(sample.v).toBeCloseTo(0.6, 5);\n    expect(sample.t).toBe(0);\n  });\n});\n\ndescribe(\"deriveToolCallsRate — timestamp preservation (property)\", () => {\n  it(\"the returned t equals the input tickBoundaryT for any valid triplet\", () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 0, max: 10_000 }),\n        fc.integer({ min: 1, max: 60_000 }),\n        fc.integer({ min: 0, max: 2_000_000_000 }),\n        (toolCallCount, windowMs, tickBoundary) => {\n          const sample = deriveToolCallsRate(toolCallCount, windowMs, tickBoundary);\n          expect(sample.t).toBe(tickBoundary);\n        },\n      ),\n    );\n  });\n});\n\ndescribe(\"deriveToolCallsRate — linear scaling with count (property)\", () => {\n  it(\"doubling the count doubles the rate for a fixed window\", () => {\n    fc.assert(\n      fc.property(\n        fc.integer({ min: 0, max: 1_000 }),\n        fc.integer({ min: 1_000, max: 60_000 }),\n        fc.integer({ min: 0, max: 2_000_000_000 }),\n        (toolCallCount, windowMs, tickBoundary) => {\n          const single = deriveToolCallsRate(toolCallCount, windowMs, tickBoundary);\n          const doubled = deriveToolCallsRate(toolCallCount * 2, windowMs, tickBoundary);\n          expect(doubled.v).toBeCloseTo(single.v * 2, 5);\n        },\n      ),\n    );\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/milestone-3-metric-toggle.test.ts":{"tests":[{"id":"85","name":"M3-S1: Default metric at first launch is Events per second first frame's metric is events and yMax is 15"},{"id":"86","name":"M3-S2: Switching to Tokens per second re-projects with the tokens scale next frame uses tokens history with yMax 100 and tokens unit"},{"id":"87","name":"M3-S3: Switching to Tool-calls per second re-projects with the tool-calls scale next frame uses tool-calls history with yMax 3 and tool-calls unit"},{"id":"88","name":"M3-S4: Persistence buffer is reset at the metric-change boundary post-toggle frame uses the new metric's scale and carries no prior-metric sample values"},{"id":"89","name":"M3-S5: Toggling back to the original metric re-projects from its own history events history is restored untouched after a round-trip through tokens"},{"id":"90","name":"M3-S6: A session with history for one metric but not another projects an empty trace after toggle session appears but with empty samples and placeholder legend value"},{"id":"91","name":"M3-S7: Hover is cleared when the metric changes the same pointer position yields a hover under the events scale but no hover under the tokens scale"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Milestone 3\n * Metric Toggle.\n *\n * The user toggles the Y-axis metric between Events/s, Tokens/s, Tool-calls/s.\n * Each metric has its own Y-axis scale, unit, and per-session arrived history.\n * At the toggle boundary the persistence buffer is reset so afterglow from the\n * prior metric cannot mislead at the new scale.\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame  (pure re-projection per metric)\n *   - scopeHitTest(pointer, frame) -> HoverSelection | null  (pure hover hit-test)\n *   - multiSessionStore.appendRateSample (per-metric)\n *\n * Feature file: milestone-3-metric-toggle.feature\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md §4 Q3\n * (persistence-buffer reset invariant), ADR-048, ADR-049.\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  METRICS,\n  NOW,\n  WINDOW_MS,\n  type Frame,\n  type HoverSelection,\n  type MetricId,\n  type MultiSessionStoreSurface,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports (resolved as DELIVER wave lands modules).\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { DEFAULT_METRIC } from \"../../../../src/plugins/norbert-usage/domain/phosphor/phosphorMetricConfig\";\nimport { scopeHitTest } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeHitTest\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\n// ---------------------------------------------------------------------------\n// M3-S1: Default metric at first launch is Events per second\n// Tag: @driving_port @US-PM-001\n// First scenario of this file — must fail for a BUSINESS-logic reason.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S1: Default metric at first launch is Events per second\", () => {\n  it(\"first frame's metric is events and yMax is 15\", () => {\n    // Given the view opens for the first time (empty store, default metric)\n    const store = createMultiSessionStore();\n\n    // When the scope projects its first frame with the default metric — the\n    // view initializes its selectedMetric from DEFAULT_METRIC, so the test\n    // reaches through that same constant rather than hard-coding \"events\".\n    const frame = buildFrame(store, DEFAULT_METRIC, NOW);\n\n    // Then the frame metric is events and its yMax is 15\n    expect(DEFAULT_METRIC).toBe(\"events\");\n    expect(frame.metric).toBe(\"events\");\n    expect(frame.yMax).toBe(METRICS.events.yMax);\n    expect(frame.yMax).toBe(15);\n    expect(frame.unit).toBe(METRICS.events.unit);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S2: Switching to Tokens per second re-projects with the tokens scale\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S2: Switching to Tokens per second re-projects with the tokens scale\", () => {\n  it(\"next frame uses tokens history with yMax 100 and tokens unit\", () => {\n    // Given session-1 has arrived tokens-per-second history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const tokenHistory = synthesizeArrivedHistory(12, (i) => 20 + i * 3);\n    for (const s of tokenHistory) store.appendRateSample(\"session-1\", \"tokens\", s.t, s.v);\n\n    // When the user selects Tokens per second (view re-projects)\n    const frame = buildFrame(store, \"tokens\", NOW);\n\n    // Then the frame's metric, yMax, and unit reflect tokens\n    expect(frame.metric).toBe(\"tokens\");\n    expect(frame.yMax).toBe(METRICS.tokens.yMax);\n    expect(frame.yMax).toBe(100);\n    expect(frame.unit).toBe(METRICS.tokens.unit);\n\n    // And session-1's trace contains tokens values\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.samples.length).toBeGreaterThan(0);\n    expect(trace!.latestValue).toBeCloseTo(\n      tokenHistory[tokenHistory.length - 1].v,\n      5,\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S3: Switching to Tool-calls per second re-projects with the tool-calls scale\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S3: Switching to Tool-calls per second re-projects with the tool-calls scale\", () => {\n  it(\"next frame uses tool-calls history with yMax 3 and tool-calls unit\", () => {\n    // Given session-1 has arrived tool-calls-per-second history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const toolHistory = synthesizeArrivedHistory(12, (i) => 0.4 + i * 0.1);\n    for (const s of toolHistory) store.appendRateSample(\"session-1\", \"toolcalls\", s.t, s.v);\n\n    // When the user selects Tool-calls per second\n    const frame = buildFrame(store, \"toolcalls\", NOW);\n\n    // Then the frame metric, yMax, and unit reflect tool-calls\n    expect(frame.metric).toBe(\"toolcalls\");\n    expect(frame.yMax).toBe(METRICS.toolcalls.yMax);\n    expect(frame.yMax).toBe(3);\n    expect(frame.unit).toBe(METRICS.toolcalls.unit);\n\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.latestValue).toBeCloseTo(\n      toolHistory[toolHistory.length - 1].v,\n      5,\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S4: Persistence buffer is reset at the metric-change boundary\n// Tag: @driving_port @US-PM-001\n//\n// The persistence-buffer reset is a view-internal effect. Acceptance tests\n// observe its user-visible consequence: the post-toggle frame carries no\n// sample values from the prior metric's history, and its Y-axis scale is the\n// new metric's scale — never the prior metric's. We therefore observe the\n// contract through buildFrame alone, the driving port listed in D7 / §Q7.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S4: Persistence buffer is reset at the metric-change boundary\", () => {\n  it(\"post-toggle frame uses the new metric's scale and carries no prior-metric sample values\", () => {\n    // Given session-1 has non-trivial Events per second arrived history and no\n    // tokens history (so any value carried over would be unambiguously from the\n    // events history).\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const eventsHistory = synthesizeArrivedHistory(12, (i) => 4 + i * 0.5);\n    for (const s of eventsHistory) {\n      store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    }\n\n    // And the scope has projected a frame under the Events per second metric\n    const frameEvents = buildFrame(store, \"events\", NOW);\n    const eventsTrace = frameEvents.traces.find(\n      (t) => t.sessionId === \"session-1\",\n    );\n    expect(eventsTrace).toBeDefined();\n    expect(eventsTrace!.samples.length).toBeGreaterThan(0);\n    const eventsValues = new Set(eventsTrace!.samples.map((s) => s.v));\n\n    // When the user selects Tokens per second (view re-projects)\n    const frameTokens = buildFrame(store, \"tokens\", NOW);\n\n    // Then the post-toggle frame uses the Tokens per second Y-axis scale, not\n    // the Events per second scale — proving prior-metric scale did not carry.\n    expect(frameTokens.metric).toBe(\"tokens\");\n    expect(frameTokens.yMax).toBe(METRICS.tokens.yMax);\n    expect(frameTokens.yMax).not.toBe(METRICS.events.yMax);\n    expect(frameTokens.unit).toBe(METRICS.tokens.unit);\n\n    // And session-1's trace in the post-toggle frame carries no sample values\n    // from the prior Events per second history.\n    const tokensTrace = frameTokens.traces.find(\n      (t) => t.sessionId === \"session-1\",\n    );\n    expect(tokensTrace).toBeDefined();\n    expect(tokensTrace!.samples).toHaveLength(0);\n    expect(tokensTrace!.latestValue).toBeNull();\n\n    // And no sample value from the events history appears anywhere in the\n    // post-toggle frame's traces (no afterglow carry-over across metrics).\n    for (const trace of frameTokens.traces) {\n      for (const sample of trace.samples) {\n        expect(eventsValues.has(sample.v)).toBe(false);\n      }\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S5: Toggling back to the original metric re-projects from its own history\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S5: Toggling back to the original metric re-projects from its own history\", () => {\n  it(\"events history is restored untouched after a round-trip through tokens\", () => {\n    // Given session-1 has arrived history for both events and tokens\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const eventHistory = synthesizeArrivedHistory(12, (i) => 4 + i * 0.2);\n    const tokenHistory = synthesizeArrivedHistory(12, (i) => 50 + i * 2);\n    for (const s of eventHistory) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    for (const s of tokenHistory) store.appendRateSample(\"session-1\", \"tokens\", s.t, s.v);\n\n    // Round-trip: events -> tokens -> events\n    buildFrame(store, \"tokens\", NOW);\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the frame uses events history and yMax 15\n    expect(frame.metric).toBe(\"events\");\n    expect(frame.yMax).toBe(METRICS.events.yMax);\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.latestValue).toBeCloseTo(\n      eventHistory[eventHistory.length - 1].v,\n      5,\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S6: A session with history for one metric but not another produces an\n//        empty trace after toggle\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S6: A session with history for one metric but not another projects an empty trace after toggle\", () => {\n  it(\"session appears but with empty samples and placeholder legend value\", () => {\n    // Given session-1 has events history but no tokens history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const eventHistory = synthesizeArrivedHistory(12, () => 5);\n    for (const s of eventHistory) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    // When the user toggles to tokens\n    const frame = buildFrame(store, \"tokens\", NOW);\n\n    // Then session-1 is present but the trace is empty\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.samples).toHaveLength(0);\n\n    // And the legend shows session-1 with a placeholder latest value (null)\n    const legendEntry = frame.legend.find((e) => e.sessionId === \"session-1\");\n    expect(legendEntry).toBeDefined();\n    expect(legendEntry!.latestValue).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M3-S7: Hover is cleared when the metric changes\n// Tag: @driving_port @US-PM-001\n//\n// A hover selection is stale the moment the metric toggles because the pointer\n// position was meaningful under the prior metric's Y-axis scale. Acceptance\n// tests observe this through the scope-level seam: the same pointer position\n// that produced a non-null hover on the events-scale frame must not produce a\n// hover on the tokens-scale frame when the tokens history is absent or\n// projected far from that pointer's Y-coordinate. The seam is buildFrame +\n// scopeHitTest, both listed in D7 / §Q7.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M3-S7: Hover is cleared when the metric changes\", () => {\n  it(\"the same pointer position yields a hover under the events scale but no hover under the tokens scale\", () => {\n    // Given session-1 has Events per second history at 12 evt/s and no tokens\n    // history, so the events-scale trace sits near the top of the scope but the\n    // tokens-scale projection for session-1 is empty.\n    const WIDTH = 1000;\n    const HEIGHT = 400;\n\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const s1History = synthesizeArrivedHistory(12, () => 12);\n    for (const s of s1History) {\n      store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    }\n\n    // And the user is hovering on session-1's trace on the Events per second\n    // scale: resolve the pointer coordinates from the events frame so the\n    // selection is definitely non-null before the toggle.\n    const frameEvents = buildFrame(store, \"events\", NOW);\n    const eventsTrace = frameEvents.traces.find(\n      (t) => t.sessionId === \"session-1\",\n    );\n    expect(eventsTrace).toBeDefined();\n    const targetSample = eventsTrace!.samples.reduce((best, s) =>\n      Math.abs(s.t - (NOW - 2000)) <"+" Math.abs(best.t - (NOW - 2000)) ? s : best,\n    );\n    const pointerX = WIDTH * (1 - (NOW - targetSample.t) / WINDOW_MS);\n    const pointerY =\n      HEIGHT - (targetSample.v / frameEvents.yMax) * HEIGHT;\n\n    const hoverBefore = scopeHitTest(\n      { x: pointerX, y: pointerY, width: WIDTH, height: HEIGHT },\n      frameEvents,\n    );\n    expect(hoverBefore).not.toBeNull();\n    expect(hoverBefore!.sessionId).toBe(\"session-1\");\n\n    // When the user selects Tokens per second (view re-projects)\n    const frameTokens = buildFrame(store, \"tokens\", NOW);\n\n    // Then the same pointer position no longer hits any trace, because the\n    // tokens-scale projection for session-1 is empty (no tokens history) — the\n    // prior hover is stale under the new metric's scale.\n    const hoverAfter = scopeHitTest(\n      { x: pointerX, y: pointerY, width: WIDTH, height: HEIGHT },\n      frameTokens,\n    );\n    expect(hoverAfter).toBeNull();\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/walking-skeleton.test.ts":{"tests":[{"id":"92","name":"WS-1: User glances at the scope and sees two sessions alive and churning projects one colored trace per active session with legend values"},{"id":"93","name":"WS-2: User sees a fresh hook event flare as a pulse on its session's trace projects a pulse entry with age-based decay factor at the event's arrival time"},{"id":"94","name":"WS-3: User switches the metric and the scope re-projects with the new scale the next frame uses tokens-per-second history and Y-axis maximum of 100"},{"id":"95","name":"WS-4: User hovers over a trace and a tooltip identifies the session, value, and age hit-test returns session-2, value 47, age near 1.5 seconds"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Walking Skeletons\n *\n * End-to-end walking skeletons for the ambient-aliveness anchor job:\n *   - Two sessions alive and churning produce two colored traces.\n *   - A hook event flare appears as a pulse on its session's trace.\n *   - Metric toggle re-projects at the new scale with persistence-buffer reset.\n *   - Hover snaps to a trace and identifies session, value, age.\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame\n *   - scopeHitTest(pointer, frame) -> HoverSelection | null\n *   - multiSessionStore.appendRateSample / appendPulse / getRateHistory / getPulses\n *\n * All tests start skipped. Enable one at a time, implement, commit, repeat.\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md D7, anchor job.\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  METRICS,\n  NOW,\n  PULSE_LIFETIME_MS,\n  SESSION_COLORS,\n  WINDOW_MS,\n  type Frame,\n  type HoverSelection,\n  type MultiSessionStoreSurface,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports (target modules — resolved once DELIVER implements them).\n// Uncomment as each module lands.\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { scopeHitTest } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeHitTest\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\n// ---------------------------------------------------------------------------\n// WALKING SKELETON WS-1: Two sessions alive and churning\n// Tag: @walking_skeleton @driving_port\n// ---------------------------------------------------------------------------\n\ndescribe(\"WS-1: User glances at the scope and sees two sessions alive and churning\", () => {\n  it(\"projects one colored trace per active session with legend values\", () => {\n    // Given two sessions are active with events-per-second history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n\n    const historyA = synthesizeArrivedHistory(12, (i) => 3 + i * 0.5); // oldest -> newest\n    const historyB = synthesizeArrivedHistory(12, (i) => 8 - i * 0.2);\n    for (const s of historyA) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    for (const s of historyB) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    // When the scope projects a frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the frame contains one trace per active session, colored by identity\n    expect(frame.traces).toHaveLength(2);\n    expect(frame.traces.map((t) => t.sessionId).sort()).toEqual([\"session-1\", \"session-2\"]);\n    expect(frame.traces[0].color).toBe(SESSION_COLORS[0]);\n    expect(frame.traces[1].color).toBe(SESSION_COLORS[1]);\n    expect(frame.traces[0].color).not.toBe(frame.traces[1].color);\n\n    // And each trace carries sample values from arrived history\n    expect(frame.traces[0].samples.length).toBeGreaterThan(0);\n    expect(frame.traces[1].samples.length).toBeGreaterThan(0);\n\n    // And the legend lists each session with latest arrived value\n    expect(frame.legend).toHaveLength(2);\n    const legend1 = frame.legend.find((e) => e.sessionId === \"session-1\");\n    const legend2 = frame.legend.find((e) => e.sessionId === \"session-2\");\n    expect(legend1?.latestValue).toBeCloseTo(historyA[historyA.length - 1].v, 5);\n    expect(legend2?.latestValue).toBeCloseTo(historyB[historyB.length - 1].v, 5);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// WALKING SKELETON WS-2: Hook event flare appears as a decaying pulse\n// Tag: @walking_skeleton @driving_port\n// ---------------------------------------------------------------------------\n\ndescribe(\"WS-2: User sees a fresh hook event flare as a pulse on its session's trace\", () => {\n  it(\"projects a pulse entry with age-based decay factor at the event's arrival time\", () => {\n    // Given a session with a steady events-per-second envelope\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, () => 6);\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    // And a tool-call hook event arrived 1.2 seconds ago\n    const pulseAgeMs = 1200;\n    store.appendPulse(\"session-1\", {\n      t: NOW - pulseAgeMs,\n      kind: \"tool\",\n      strength: 1.0,\n    });\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the frame contains a pulse entry on session-1's trace\n    const pulsesForS1 = frame.pulses.filter((p) => p.sessionId === \"session-1\");\n    expect(pulsesForS1).toHaveLength(1);\n    const pulse = pulsesForS1[0];\n\n    // And the pulse is positioned at the event's arrival time\n    expect(pulse.t).toBe(NOW - pulseAgeMs);\n\n    // And the pulse's decay factor reflects 1.2/2.5 of its lifetime consumed\n    const expectedDecay = 1 - pulseAgeMs / PULSE_LIFETIME_MS;\n    expect(pulse.decay).toBeCloseTo(expectedDecay, 3);\n\n    // And the pulse carries session-1's color\n    expect(pulse.color).toBe(SESSION_COLORS[0]);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// WALKING SKELETON WS-3: Metric toggle re-projects with new scale\n// Tag: @walking_skeleton @driving_port\n// ---------------------------------------------------------------------------\n\ndescribe(\"WS-3: User switches the metric and the scope re-projects with the new scale\", () => {\n  it(\"the next frame uses tokens-per-second history and Y-axis maximum of 100\", () => {\n    // Given session-1 has tokens-per-second history peaking near 80\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const tokenHistory = synthesizeArrivedHistory(12, (i) => 30 + i * 4); // peaks ~74\n    for (const s of tokenHistory) store.appendRateSample(\"session-1\", \"tokens\", s.t, s.v);\n\n    // And events history is also populated (so the first frame on events has content)\n    const eventHistory = synthesizeArrivedHistory(12, () => 5);\n    for (const s of eventHistory) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    // When the user selects Tokens per second (next frame projection uses it)\n    const frame = buildFrame(store, \"tokens\", NOW);\n\n    // Then the frame uses tokens-per-second history and the tokens Y-axis maximum\n    expect(frame.metric).toBe(\"tokens\");\n    expect(frame.yMax).toBe(METRICS.tokens.yMax);\n    expect(frame.unit).toBe(METRICS.tokens.unit);\n\n    // And session-1's trace samples come from the tokens history\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace?.samples[trace.samples.length - 1].v).toBeCloseTo(\n      tokenHistory[tokenHistory.length - 1].v,\n      5,\n    );\n  });\n});\n\n// ---------------------------------------------------------------------------\n// WALKING SKELETON WS-4: Hover produces a tooltip-ready selection\n// Tag: @walking_skeleton @driving_port\n// ---------------------------------------------------------------------------\n\ndescribe(\"WS-4: User hovers over a trace and a tooltip identifies the session, value, and age\", () => {\n  it(\"hit-test returns session-2, value 47, age near 1.5 seconds\", () => {\n    // Given session-2 has an arrived value of 47 events per second at 1.5 seconds ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n    const quietHistory = synthesizeArrivedHistory(12, () => 1);\n    for (const s of quietHistory) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const focusedHistoryS2 = synthesizeArrivedHistory(12, () => 47);\n    for (const s of focusedHistoryS2) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // And the pointer is positioned over session-2's trace at 1.5 seconds ago\n    const width = 1000;\n    const height = 400;\n    const windowFraction = 1 - 1500 / WINDOW_MS; // x = w * (1 - ageMs/windowMs)\n    const x = width * windowFraction;\n    // Vertical position for value 47 on the events yMax=15 scale would be above\n    // the chart; to avoid scale-clipping in this skeleton we target session-2's\n    // trace line directly using its frame-reported sample value.\n    const traceS2 = frame.traces.find((t) => t.sessionId === \"session-2\");\n    expect(traceS2).toBeDefined();\n    // Use the nearest sample's trace position — the hit-test must find it within snap.\n    // For the skeleton we simulate a pointer sitting at half-height; the hit-test\n    // logic snaps to whatever trace is closest within the snap threshold.\n    const y = height / 2;\n\n    // When the hover selection is computed\n    const selection = scopeHitTest({ x, y, width, height }, frame);\n\n    // Then the selection identifies session-2, value 47, age near 1.5 seconds\n    // (Note: session-2's trace is the only non-quiet trace; the nearest-snap\n    // logic will pick it within the snap threshold at this pointer position.)\n    expect(selection).not.toBeNull();\n    expect(selection?.sessionId).toBe(\"session-2\");\n    expect(selection?.value).toBeCloseTo(47, 1);\n    // Age is near 1.5 seconds (allowing for the fraction-to-time translation).\n    expect(selection?.ageMs).toBeGreaterThan(1000);\n    expect(selection?.ageMs).toBeLessThan(2000);\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/milestone-5-session-lifecycle.test.ts":{"tests":[{"id":"96","name":"M5-S1: Adding a session makes it appear on the scope in the next frame second trace appears after addSession is called"},{"id":"97","name":"M5-S2: Removing a session makes it disappear from the scope in the next frame middle session disappears from frame and legend after removeSession"},{"id":"98","name":"M5-S3: The legend reflects the latest arrived value for each session legend entries carry the most recent arrived value per session"},{"id":"99","name":"M5-S4: Ambient 60-second window excludes samples older than the window samples at 70s and 90s ago are not projected; 30s and 45s remain"},{"id":"100","name":"M5-S5: Pulses older than their retention are absent from the store 6s-old pulse is not retained; pulses within 5s remain"},{"id":"101","name":"M5-S6: Removing a session removes its associated rate buffers and pulses store holds no history or pulses for the removed session"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Milestone 5\n * Session Lifecycle and Ambient Window.\n *\n * Sessions are added and removed from the store as Claude Code sessions start\n * and end. The scope reflects lifecycle changes in the next projected frame.\n * The 60-second ambient window trims samples and pulses older than the window\n * so the scope always shows only the recent past.\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame\n *   - multiSessionStore.addSession / removeSession / appendRateSample /\n *     appendPulse / getRateHistory / getPulses / getSessionIds\n *\n * Feature file: milestone-5-session-lifecycle.feature\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md §4 Q1,\n * ADR-049 (per-session buffers + pulse retention), ADR-050 (fixed 60s window).\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  NOW,\n  PULSE_RETENTION_MS,\n  PULSE_STRENGTHS,\n  WINDOW_MS,\n  type Frame,\n  type MetricId,\n  type MultiSessionStoreSurface,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports (resolved as DELIVER wave lands modules).\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\n// ---------------------------------------------------------------------------\n// M5-S1: Adding a session makes it appear on the scope in the next frame\n// Tag: @driving_port @US-PM-001\n// First scenario of this file — must fail for a BUSINESS-logic reason.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S1: Adding a session makes it appear on the scope in the next frame\", () => {\n  it(\"second trace appears after addSession is called\", () => {\n    // Given one session is active with history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const h1 = synthesizeArrivedHistory(12, () => 5);\n    for (const s of h1) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    const firstFrame = buildFrame(store, \"events\", NOW);\n    expect(firstFrame.traces).toHaveLength(1);\n\n    // When a second session is added\n    store.addSession(\"session-2\");\n    const h2 = synthesizeArrivedHistory(12, () => 7);\n    for (const s of h2) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    const nextFrame = buildFrame(store, \"events\", NOW);\n\n    // Then the next frame contains two traces and the legend lists both\n    expect(nextFrame.traces).toHaveLength(2);\n    const sessionIds = nextFrame.traces.map((t) => t.sessionId).sort();\n    expect(sessionIds).toEqual([\"session-1\", \"session-2\"]);\n    expect(nextFrame.legend.map((e) => e.sessionId).sort()).toEqual([\n      \"session-1\",\n      \"session-2\",\n    ]);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M5-S2: Removing a session makes it disappear from the scope in the next frame\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S2: Removing a session makes it disappear from the scope in the next frame\", () => {\n  it(\"middle session disappears from frame and legend after removeSession\", () => {\n    // Given three sessions are active with history\n    const store = createMultiSessionStore();\n    const ids = [\"session-1\", \"session-2\", \"session-3\"];\n    for (const id of ids) {\n      store.addSession(id);\n      const h = synthesizeArrivedHistory(12, () => 5);\n      for (const s of h) store.appendRateSample(id, \"events\", s.t, s.v);\n    }\n\n    // When the middle session is removed\n    store.removeSession(\"session-2\");\n    const nextFrame = buildFrame(store, \"events\", NOW);\n\n    // Then the frame contains two traces and session-2 is absent from the legend\n    expect(nextFrame.traces).toHaveLength(2);\n    const remainingIds = nextFrame.traces.map((t) => t.sessionId).sort();\n    expect(remainingIds).toEqual([\"session-1\", \"session-3\"]);\n    const legendIds = nextFrame.legend.map((e) => e.sessionId);\n    expect(legendIds).not.toContain(\"session-2\");\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M5-S3: The legend reflects the latest arrived value for each session\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S3: The legend reflects the latest arrived value for each session\", () => {\n  it(\"legend entries carry the most recent arrived value per session\", () => {\n    // Given session-1 most recently arrived 7 evt/s and session-2 most recently arrived 22 evt/s\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n    // Build histories that end at 7 and 22 respectively.\n    const h1 = synthesizeArrivedHistory(12, (i) => (i === 11 ? 7 : 3 + i * 0.1));\n    const h2 = synthesizeArrivedHistory(12, (i) => (i === 11 ? 22 : 15 + i * 0.2));\n    for (const s of h1) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    for (const s of h2) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the legend carries the latest values\n    const l1 = frame.legend.find((e) => e.sessionId === \"session-1\");\n    const l2 = frame.legend.find((e) => e.sessionId === \"session-2\");\n    expect(l1?.latestValue).toBeCloseTo(7, 5);\n    expect(l2?.latestValue).toBeCloseTo(22, 5);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M5-S4: Ambient 60-second window excludes samples older than the window\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S4: Ambient 60-second window excludes samples older than the window\", () => {\n  it(\"samples at 70s and 90s ago are not projected; 30s and 45s remain\", () => {\n    // Given session-1 has samples at 30, 45, 70, and 90 seconds ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const ages = [30, 45, 70, 90];\n    for (const ageS of ages) {\n      store.appendRateSample(\"session-1\", \"events\", NOW - ageS * 1000, 4);\n    }\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n\n    // Then no trace sample is older than 60 seconds\n    const windowStart = NOW - WINDOW_MS;\n    for (const sample of trace!.samples) {\n      expect(sample.t).toBeGreaterThanOrEqual(windowStart);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M5-S5: Pulses older than their retention are absent from the store\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S5: Pulses older than their retention are absent from the store\", () => {\n  it(\"6s-old pulse is not retained; pulses within 5s remain\", () => {\n    // Given session-1 had a tool-call pulse 6 seconds ago and a recent one 2s ago\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.appendPulse(\"session-1\", {\n      t: NOW - 6000,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n    store.appendPulse(\"session-1\", {\n      t: NOW - 2000,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When the store is queried (NOW passed as the reference clock so\n    // retention trim aligns with the test's logical clock)\n    const pulses = store.getPulses(\"session-1\", NOW);\n\n    // Then the 6s-old pulse is absent; the 2s-old pulse remains\n    const stalePulse = pulses.find((p) => p.t === NOW - 6000);\n    const recentPulse = pulses.find((p) => p.t === NOW - 2000);\n    expect(stalePulse).toBeUndefined();\n    expect(recentPulse).toBeDefined();\n\n    // And all retained pulses are within the retention window\n    for (const pulse of pulses) {\n      expect(NOW - pulse.t).toBeLessThanOrEqual(PULSE_RETENTION_MS);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M5-S6: Removing a session removes its associated rate buffers and pulses\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M5-S6: Removing a session removes its associated rate buffers and pulses\", () => {\n  it(\"store holds no history or pulses for the removed session\", () => {\n    // Given session-1 has arrived rate history and pulses\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const h = synthesizeArrivedHistory(12, () => 5);\n    for (const s of h) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    store.appendPulse(\"session-1\", {\n      t: NOW - 1000,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n\n    // When session-1 is removed\n    store.removeSession(\"session-1\");\n\n    // Then no rate buffers or pulses remain for session-1\n    expect(store.getRateHistory(\"session-1\", \"events\")).toHaveLength(0);\n    expect(store.getPulses(\"session-1\")).toHaveLength(0);\n\n    // And subsequent frames do not project session-1\n    const nextFrame = buildFrame(store, \"events\", NOW);\n    const trace = nextFrame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeUndefined();\n    const legendEntry = nextFrame.legend.find((e) => e.sessionId === \"session-1\");\n    expect(legendEntry).toBeUndefined();\n  });\n});\n"},"tests/acceptance/norbert-performance-monitor-v2/steps/milestone-1-per-session-traces.test.ts":{"tests":[{"id":"102","name":"M1-S1: Each active session gets its own color identity on the scope produces three traces with three distinct, stable session colors"},{"id":"103","name":"M1-S2: A trace samples its session's arrived rate history across the window trace values stay bracketed by neighboring arrived samples (no sub-interval spikes)"},{"id":"104","name":"M1-S3: A stalled session shows a flatline from the last arrived value, not a drop to zero flatlines at the last arrived value of 8 up to the current-time edge"},{"id":"105","name":"M1-S4: A session with no arrived history yet produces an empty trace trace carries no samples and legend shows placeholder latest value"},{"id":"106","name":"M1-S5: Samples older than the 60-second window are excluded from the trace no trace point uses a sample timestamped more than 60 seconds ago"},{"id":"107","name":"M1-S6: Five concurrent sessions each receive a distinct color from the palette assigns each of the five palette colors exactly once across five sessions"},{"id":"108","name":"M1-S7: No active sessions yields an empty scope with a clear legend frame contains zero traces and an empty legend; yMax reflects current metric"}],"source":"/**\n * Acceptance tests: Performance Monitor v2 Phosphor Scope — Milestone 1\n * Per-Session Rate Envelope Traces.\n *\n * The scope renders one color trace per session, projected from that session's\n * EWMA-smoothed arrived rate history. Each trace preserves the session's color\n * identity. No sub-interval interpolation. No zero-fill between arrivals.\n *\n * Driving ports (DELIVER wave will implement):\n *   - buildFrame(store, metric, now) -> Frame\n *   - multiSessionStore.addSession / appendRateSample / getRateHistory\n *\n * Feature file: milestone-1-per-session-traces.feature\n *\n * One scenario enabled at a time. First scenario of this file fails for a\n * business-logic reason (trace count mismatch), not a setup or import error.\n *\n * Traces to: US-PM-001 (amended), v2-phosphor-architecture.md §4 Q1/Q4.\n */\n\nimport { describe, it, expect } from \"vitest\";\n\nimport {\n  METRICS,\n  NOW,\n  SESSION_COLORS,\n  WINDOW_MS,\n  synthesizeArrivedHistory,\n} from \"./fixtures\";\n\n// Driving ports (target modules — resolved by DELIVER wave).\nimport { buildFrame } from \"../../../../src/plugins/norbert-usage/domain/phosphor/scopeProjection\";\nimport { createMultiSessionStore } from \"../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\n\n// ---------------------------------------------------------------------------\n// M1-S1: Each active session gets its own color identity on the scope\n// Tag: @driving_port @US-PM-001\n// First scenario of this file — must fail for a BUSINESS-logic reason so the\n// DELIVER wave sees red on enabling it.\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S1: Each active session gets its own color identity on the scope\", () => {\n  it(\"produces three traces with three distinct, stable session colors\", () => {\n    // Given three sessions are active with arrived rate history\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.addSession(\"session-2\");\n    store.addSession(\"session-3\");\n\n    const historyA = synthesizeArrivedHistory(12, (i) => 3 + i * 0.5);\n    const historyB = synthesizeArrivedHistory(12, (i) => 5 + i * 0.3);\n    const historyC = synthesizeArrivedHistory(12, (i) => 7 - i * 0.2);\n    for (const s of historyA) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n    for (const s of historyB) store.appendRateSample(\"session-2\", \"events\", s.t, s.v);\n    for (const s of historyC) store.appendRateSample(\"session-3\", \"events\", s.t, s.v);\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n    const frameAgain = buildFrame(store, \"events\", NOW + 16); // ~1 frame later\n\n    // Then three traces appear\n    expect(frame.traces).toHaveLength(3);\n\n    // And each trace's session color is distinct from the others\n    const colors = frame.traces.map((t) => t.color);\n    const distinctColors = new Set(colors);\n    expect(distinctColors.size).toBe(3);\n\n    // And colors remain stable across consecutive frames\n    const firstColorsById = new Map(frame.traces.map((t) => [t.sessionId, t.color]));\n    for (const trace of frameAgain.traces) {\n      expect(trace.color).toBe(firstColorsById.get(trace.sessionId));\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S2: A trace samples its session's arrived rate history across the window\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S2: A trace samples its session's arrived rate history across the window\", () => {\n  it(\"trace values stay bracketed by neighboring arrived samples (no sub-interval spikes)\", () => {\n    // Given session-1 has arrived samples at 5s intervals across the 60s window\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    const history = synthesizeArrivedHistory(12, (i) => 4 + i); // 4..15, latest = 15 evt/s\n    for (const s of history) store.appendRateSample(\"session-1\", \"events\", s.t, s.v);\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n\n    // Then each trace value must be bounded by its two bracketing arrived samples\n    const arrived = [...history].sort((a, b) => a.t - b.t);\n    for (const sample of trace!.samples) {\n      // Find bracketing arrived samples\n      let left = arrived[0];\n      let right = arrived[arrived.length - 1];\n      for (let i = 0; i <"+" arrived.length - 1; i++) {\n        if (arrived[i].t <"+"= sample.t && sample.t <"+"= arrived[i + 1].t) {\n          left = arrived[i];\n          right = arrived[i + 1];\n          break;\n        }\n      }\n      const hi = Math.max(left.v, right.v);\n      const lo = Math.min(left.v, right.v);\n      expect(sample.v).toBeLessThanOrEqual(hi + 1e-9);\n      expect(sample.v).toBeGreaterThanOrEqual(lo - 1e-9);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S3: A stalled session shows a flatline from the last arrived value\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S3: A stalled session shows a flatline from the last arrived value, not a drop to zero\", () => {\n  it(\"flatlines at the last arrived value of 8 up to the current-time edge\", () => {\n    // Given session-1 had an arrived rate of 8 evt/s 20s ago and nothing since\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    store.appendRateSample(\"session-1\", \"events\", NOW - 20_000, 8);\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.samples.length).toBeGreaterThan(0);\n\n    // Then the trace carries the value 8 at the current-time edge\n    const latest = trace!.samples[trace!.samples.length - 1];\n    expect(latest.v).toBeCloseTo(8, 5);\n\n    // And no trace value is zero while the last arrived value is non-zero\n    for (const sample of trace!.samples) {\n      expect(sample.v).not.toBe(0);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S4: A session with no arrived history yet produces an empty trace\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S4: A session with no arrived history yet produces an empty trace\", () => {\n  it(\"trace carries no samples and legend shows placeholder latest value\", () => {\n    // Given session-1 has just been added with no rate samples\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then session-1's trace carries no sample values\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n    expect(trace!.samples).toHaveLength(0);\n\n    // And the legend shows session-1 with a placeholder latest value (null)\n    const legendEntry = frame.legend.find((e) => e.sessionId === \"session-1\");\n    expect(legendEntry).toBeDefined();\n    expect(legendEntry!.latestValue).toBeNull();\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S5: Samples older than the 60-second window are excluded from the trace\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S5: Samples older than the 60-second window are excluded from the trace\", () => {\n  it(\"no trace point uses a sample timestamped more than 60 seconds ago\", () => {\n    // Given session-1 has samples spanning the last 120 seconds\n    const store = createMultiSessionStore();\n    store.addSession(\"session-1\");\n    for (let ageS = 120; ageS >= 0; ageS -= 5) {\n      store.appendRateSample(\"session-1\", \"events\", NOW - ageS * 1000, 5);\n    }\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n    const trace = frame.traces.find((t) => t.sessionId === \"session-1\");\n    expect(trace).toBeDefined();\n\n    // Then no trace point is older than 60 seconds\n    const windowStart = NOW - WINDOW_MS;\n    for (const sample of trace!.samples) {\n      expect(sample.t).toBeGreaterThanOrEqual(windowStart);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S6: Five concurrent sessions each receive a distinct color from the palette\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S6: Five concurrent sessions each receive a distinct color from the palette\", () => {\n  it(\"assigns each of the five palette colors exactly once across five sessions\", () => {\n    // Given five sessions are active with history\n    const store = createMultiSessionStore();\n    const ids = [\"session-1\", \"session-2\", \"session-3\", \"session-4\", \"session-5\"];\n    for (const id of ids) {\n      store.addSession(id);\n      const history = synthesizeArrivedHistory(12, (i) => 2 + i * 0.3);\n      for (const s of history) store.appendRateSample(id, \"events\", s.t, s.v);\n    }\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then five traces appear with five distinct palette colors\n    expect(frame.traces).toHaveLength(5);\n    const colors = frame.traces.map((t) => t.color);\n    const distinct = new Set(colors);\n    expect(distinct.size).toBe(5);\n    for (const color of colors) {\n      expect(SESSION_COLORS).toContain(color);\n    }\n  });\n});\n\n// ---------------------------------------------------------------------------\n// M1-S7: No active sessions yields an empty scope with a clear legend\n// Tag: @driving_port @US-PM-001\n// ---------------------------------------------------------------------------\n\ndescribe(\"M1-S7: No active sessions yields an empty scope with a clear legend\", () => {\n  it(\"frame contains zero traces and an empty legend; yMax reflects current metric\", () => {\n    // Given no sessions are active\n    const store = createMultiSessionStore();\n\n    // When the scope projects the current frame\n    const frame = buildFrame(store, \"events\", NOW);\n\n    // Then the frame is empty but the Y-axis still carries the metric scale\n    expect(frame.traces).toHaveLength(0);\n    expect(frame.legend).toHaveLength(0);\n    expect(frame.yMax).toBe(METRICS.events.yMax);\n    expect(frame.metric).toBe(\"events\");\n  });\n});\n"},"tests/unit/plugins/norbert-usage/hookProcessor.test.ts":{"tests":[{"id":"109","name":"hookProcessor with token-bearing events hook prompt_submit with tokens does NOT credit totalTokens or sessionCost"},{"id":"110","name":"hookProcessor with token-bearing events hook tool_call_end with tokens does NOT credit totalTokens or sessionCost"},{"id":"111","name":"hookProcessor with token-bearing events OTel api_request with tokens is the only path that credits cost"},{"id":"112","name":"hookProcessor with token-bearing events agent_complete decrements activeAgentCount without crediting tokens/cost"},{"id":"113","name":"hookProcessor with non-token events tool_result increments toolCallCount without affecting tokens or cost"},{"id":"114","name":"hookProcessor with non-token events tool_call_start (hook PreToolUse) is an identity signal under the OTel-first policy"},{"id":"115","name":"hookProcessor with non-token events session_start increments activeAgentCount and sets sessionStartedAt"},{"id":"116","name":"hookProcessor with non-token events unknown event type still increments totalEventCount"},{"id":"117","name":"hookProcessor with DB event wrapper extracts usage from a nested api_request payload (production event format)"},{"id":"118","name":"hookProcessor with DB event wrapper session_start wrapped event increments activeAgentCount"},{"id":"119","name":"hookProcessor with malformed payloads null payload does not throw and increments totalEventCount"},{"id":"120","name":"hookProcessor with malformed payloads undefined payload does not throw and increments totalEventCount"},{"id":"121","name":"hookProcessor with malformed payloads payload missing event_type field treats as unknown event"},{"id":"122","name":"hookProcessor pipeline accumulation multiple api_request events accumulate tokens and cost monotonically"},{"id":"123","name":"hookProcessor pipeline accumulation hook and api_request events interleave: only api_request credits cost"},{"id":"124","name":"hookProcessor pipeline accumulation mixed api_request, tool_result, and session_start events all increment totalEventCount"},{"id":"125","name":"hookProcessor pipeline accumulation store updateMetrics is called once per processor invocation"},{"id":"126","name":"hookProcessor: hook events never credit cost (OTel-authoritative policy) hook prompt_submit never credits cost, even with getIsOtelActive=false"},{"id":"127","name":"hookProcessor: hook events never credit cost (OTel-authoritative policy) hook prompt_submit never credits cost, even with getIsOtelActive undefined"},{"id":"128","name":"hookProcessor: mixed hook + OTel stream never double-counts cost hook + OTel for the same request: only the OTel cost is credited"},{"id":"129","name":"hookProcessor: mixed hook + OTel stream never double-counts cost cost scaling is per api_request only, regardless of interleaved hooks"},{"id":"130","name":"emitPulse — derives pulse strength from kind builds a tool-kind pulse with strength = PULSE_STRENGTHS.tool (1.0)"},{"id":"131","name":"emitPulse — derives pulse strength from kind builds a subagent-kind pulse with strength = PULSE_STRENGTHS.subagent (0.75)"},{"id":"132","name":"emitPulse — derives pulse strength from kind builds a lifecycle-kind pulse with strength = PULSE_STRENGTHS.lifecycle (0.5)"},{"id":"133","name":"emitPulse — derives pulse strength from kind preserves the timestamp argument verbatim"}],"source":"/**\n * Unit tests: Hook Processor (Step 03-02)\n *\n * Factory function: createHookProcessor(deps) => (payload: unknown) => void\n *\n * Behaviors tested:\n * - Events with token data update metrics store with tokens and cost\n * - Events without token data update non-cost counters only (totalEventCount, toolCallCount, etc.)\n * - Pipeline: payload -> extract event_type -> build AggregatorEvent -> aggregateEvent -> update store\n * - Unknown/malformed payloads still increment totalEventCount\n * - No internal Norbert module imports (verified by import structure)\n */\n\nimport { describe, it, expect } from \"vitest\";\nimport { createHookProcessor, emitPulse } from \"../../../../src/plugins/norbert-usage/hookProcessor\";\nimport { createInitialMetrics } from \"../../../../src/plugins/norbert-usage/domain/metricsAggregator\";\nimport { DEFAULT_PRICING_TABLE } from \"../../../../src/plugins/norbert-usage/domain/pricingModel\";\nimport { PULSE_STRENGTHS } from \"../../../../src/plugins/norbert-usage/domain/phosphor/phosphorMetricConfig\";\nimport type { SessionMetrics, PricingTable } from \"../../../../src/plugins/norbert-usage/domain/types\";\n\n// ---------------------------------------------------------------------------\n// Test helpers — pure function stubs for the metrics store effect boundary\n// ---------------------------------------------------------------------------\n\n/**\n * Creates a spy store that captures metrics updates.\n * The updateMetrics function accepts a reducer (prev => next) and applies it\n * to the current metrics state.\n */\nconst createSpyStore = (\n  initialSessionId = \"test-session\",\n): {\n  getMetrics: () => SessionMetrics;\n  updateMetrics: (reducer: (prev: SessionMetrics) => SessionMetrics) => void;\n  updateCount: () => number;\n} => {\n  let metrics = createInitialMetrics(initialSessionId);\n  let count = 0;\n\n  return {\n    getMetrics: () => metrics,\n    updateMetrics: (reducer: (prev: SessionMetrics) => SessionMetrics) => {\n      metrics = reducer(metrics);\n      count += 1;\n    },\n    updateCount: () => count,\n  };\n};\n\n/** Build a payload that includes token usage data. */\nconst makeTokenPayload = (\n  eventType: string,\n  inputTokens: number,\n  outputTokens: number,\n  model = \"claude-sonnet-4-20250514\",\n): Record<"+"string, unknown> => ({\n  event_type: eventType,\n  usage: {\n    input_tokens: inputTokens,\n    output_tokens: outputTokens,\n    cache_read_input_tokens: 0,\n    cache_creation_input_tokens: 0,\n    model,\n  },\n});\n\n/** Build a payload without token usage data. */\nconst makeNonTokenPayload = (eventType: string): Record<"+"string, unknown> => ({\n  event_type: eventType,\n});\n\n// ---------------------------------------------------------------------------\n// Token-bearing events update metrics store with tokens and cost\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor with token-bearing events\", () => {\n  // Policy: cost and token counters are credited EXCLUSIVELY by OTel\n  // api_request events. Hook-path events (prompt_submit, tool_call_end,\n  // agent_complete) still carry a usage record -- it's used to refresh\n  // the context-window snapshot -- but they do not contribute to\n  // sessionCost / totalTokens.\n\n  it(\"hook prompt_submit with tokens does NOT credit totalTokens or sessionCost\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    const payload = makeTokenPayload(\"prompt_submit\", 1000, 500);\n    processor(payload);\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.inputTokens).toBe(0);\n    expect(metrics.outputTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.totalEventCount).toBe(1);\n    // Context window snapshot IS refreshed from hook usage.\n    expect(metrics.contextWindowTokens).toBe(1000);\n  });\n\n  it(\"hook tool_call_end with tokens does NOT credit totalTokens or sessionCost\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    const payload = makeTokenPayload(\"tool_call_end\", 200, 800);\n    processor(payload);\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.contextWindowTokens).toBe(200);\n  });\n\n  it(\"OTel api_request with tokens is the only path that credits cost\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeTokenPayload(\"api_request\", 1000, 500));\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalTokens).toBe(1500);\n    expect(metrics.inputTokens).toBe(1000);\n    expect(metrics.outputTokens).toBe(500);\n    expect(metrics.sessionCost).toBeGreaterThan(0);\n    expect(metrics.apiRequestCount).toBe(1);\n  });\n\n  it(\"agent_complete decrements activeAgentCount without crediting tokens/cost\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeNonTokenPayload(\"session_start\"));\n    expect(store.getMetrics().activeAgentCount).toBe(1);\n\n    processor(makeTokenPayload(\"agent_complete\", 500, 300));\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.activeAgentCount).toBe(0);\n    // Context window is still refreshed from the usage record.\n    expect(metrics.contextWindowTokens).toBe(500);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Events without token data update non-cost counters only\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor with non-token events\", () => {\n  it(\"tool_result increments toolCallCount without affecting tokens or cost\", () => {\n    // Tool counts are sourced from tool_result (OTel post-tool signal)\n    // under the OTel-authoritative policy so that sessions emitting\n    // both hook PreToolUse (tool_call_start) and OTel tool_result don't\n    // double-count a single tool invocation.\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeNonTokenPayload(\"tool_result\"));\n\n    const metrics = store.getMetrics();\n    expect(metrics.toolCallCount).toBe(1);\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.totalEventCount).toBe(1);\n  });\n\n  it(\"tool_call_start (hook PreToolUse) is an identity signal under the OTel-first policy\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeNonTokenPayload(\"tool_call_start\"));\n\n    const metrics = store.getMetrics();\n    expect(metrics.toolCallCount).toBe(0);\n    expect(metrics.totalEventCount).toBe(1);\n  });\n\n  it(\"session_start increments activeAgentCount and sets sessionStartedAt\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeNonTokenPayload(\"session_start\"));\n\n    const metrics = store.getMetrics();\n    expect(metrics.activeAgentCount).toBe(1);\n    expect(metrics.sessionStartedAt).not.toBe(\"\");\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.totalEventCount).toBe(1);\n  });\n\n  it(\"unknown event type still increments totalEventCount\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeNonTokenPayload(\"some_unknown_event\"));\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalEventCount).toBe(1);\n    expect(metrics.totalTokens).toBe(0);\n    expect(metrics.sessionCost).toBe(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Wrapped payload from get_session_events (production format)\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor with DB event wrapper\", () => {\n  it(\"extracts usage from a nested api_request payload (production event format)\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    // This matches the structure returned by Tauri IPC get_session_events:\n    // { session_id, event_type, payload: { ...raw claude code fields... }, received_at, provider }\n    // api_request is the only path that credits tokens/cost under the\n    // OTel-authoritative policy.\n    const wrappedEvent = {\n      session_id: \"sess-123\",\n      event_type: \"api_request\",\n      payload: {\n        session_id: \"sess-123\",\n        usage: {\n          input_tokens: 800,\n          output_tokens: 200,\n          cache_read_input_tokens: 0,\n          cache_creation_input_tokens: 0,\n          model: \"claude-sonnet-4-20250514\",\n        },\n      },\n      received_at: \"2026-03-13T22:00:00Z\",\n      provider: \"otel\",\n    };\n\n    processor(wrappedEvent);\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalTokens).toBe(1000);\n    expect(metrics.inputTokens).toBe(800);\n    expect(metrics.outputTokens).toBe(200);\n    expect(metrics.sessionCost).toBeGreaterThan(0);\n    expect(metrics.totalEventCount).toBe(1);\n  });\n\n  it(\"session_start wrapped event increments activeAgentCount\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    const wrappedEvent = {\n      session_id: \"sess-123\",\n      event_type: \"session_start\",\n      payload: { session_id: \"sess-123\" },\n      received_at: \"2026-03-13T22:00:00Z\",\n      provider: \"claude_code\",\n    };\n\n    processor(wrappedEvent);\n\n    const metrics = store.getMetrics();\n    expect(metrics.activeAgentCount).toBe(1);\n    expect(metrics.totalEventCount).toBe(1);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Edge cases: malformed and missing payloads\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor with malformed payloads\", () => {\n  it(\"null payload does not throw and increments totalEventCount\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    expect(() => processor(null)).not.toThrow();\n    expect(store.getMetrics().totalEventCount).toBe(1);\n  });\n\n  it(\"undefined payload does not throw and increments totalEventCount\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    expect(() => processor(undefined)).not.toThrow();\n    expect(store.getMetrics().totalEventCount).toBe(1);\n  });\n\n  it(\"payload missing event_type field treats as unknown event\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor({ some_field: \"value\" });\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalEventCount).toBe(1);\n    expect(metrics.totalTokens).toBe(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Pipeline composition: multiple events accumulate correctly\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor pipeline accumulation\", () => {\n  it(\"multiple api_request events accumulate tokens and cost monotonically\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeTokenPayload(\"api_request\", 1000, 500));\n    const afterFirst = store.getMetrics();\n\n    processor(makeTokenPayload(\"api_request\", 200, 100));\n    const afterSecond = store.getMetrics();\n\n    expect(afterSecond.totalTokens).toBe(1800);\n    expect(afterSecond.sessionCost).toBeGreaterThan(afterFirst.sessionCost);\n    expect(afterSecond.totalEventCount).toBe(2);\n    expect(afterSecond.apiRequestCount).toBe(2);\n  });\n\n  it(\"hook and api_request events interleave: only api_request credits cost\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    // A hook prompt_submit with usage should refresh context but not cost.\n    processor(makeTokenPayload(\"prompt_submit\", 100, 50));\n    const afterHook = store.getMetrics();\n    expect(afterHook.sessionCost).toBe(0);\n    expect(afterHook.totalTokens).toBe(0);\n\n    // Followed by the real OTel api_request for the same request: this\n    // is what should be credited.\n    processor(makeTokenPayload(\"api_request\", 100, 50));\n    const afterOtel = store.getMetrics();\n    expect(afterOtel.totalTokens).toBe(150);\n    expect(afterOtel.sessionCost).toBeGreaterThan(0);\n  });\n\n  it(\"mixed api_request, tool_result, and session_start events all increment totalEventCount\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeTokenPayload(\"api_request\", 100, 50));\n    processor(makeNonTokenPayload(\"tool_result\"));\n    processor(makeNonTokenPayload(\"session_start\"));\n\n    const metrics = store.getMetrics();\n    expect(metrics.totalEventCount).toBe(3);\n    expect(metrics.totalTokens).toBe(150);\n    expect(metrics.toolCallCount).toBe(1);\n    expect(metrics.activeAgentCount).toBe(1);\n  });\n\n  it(\"store updateMetrics is called once per processor invocation\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeTokenPayload(\"prompt_submit\", 100, 50));\n    processor(makeNonTokenPayload(\"tool_call_start\"));\n\n    expect(store.updateCount()).toBe(2);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// isOtelActive passthrough via getIsOtelActive dependency (D1)\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor: hook events never credit cost (OTel-authoritative policy)\", () => {\n  // Under the OTel-authoritative cost policy, the getIsOtelActive\n  // dependency and the provider=\"otel\" auto-detection are no longer\n  // load-bearing for cost -- the aggregator itself refuses to credit\n  // cost from hook-path event types regardless of mode. These tests\n  // pin that invariant so a future regression would fail loudly.\n\n  it(\"hook prompt_submit never credits cost, even with getIsOtelActive=false\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n      getIsOtelActive: () => false,\n    });\n\n    processor(makeTokenPayload(\"prompt_submit\", 1000, 500));\n\n    const metrics = store.getMetrics();\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.totalTokens).toBe(0);\n  });\n\n  it(\"hook prompt_submit never credits cost, even with getIsOtelActive undefined\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    processor(makeTokenPayload(\"prompt_submit\", 1000, 500));\n\n    const metrics = store.getMetrics();\n    expect(metrics.sessionCost).toBe(0);\n    expect(metrics.totalTokens).toBe(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// OTel detection via provider tag (auto-flips a session to OTel mode on\n// the first event marked provider=\"otel\", so subsequent hook-provider\n// events stop crediting cost and avoid double-counting)\n// ---------------------------------------------------------------------------\n\ndescribe(\"hookProcessor: mixed hook + OTel stream never double-counts cost\", () => {\n  // Regression guard for the double-counting bug: previously the\n  // aggregator credited cost from hook prompt_submit/tool_call_end AND\n  // from the subsequent OTel api_request reporting the same tokens. The\n  // new OTel-authoritative policy must keep cost scoped to api_request\n  // no matter how the two streams interleave.\n\n  const withProvider = (\n    payload: Record<"+"string, unknown>,\n    provider: string,\n    sessionId = \"sess-mixed\",\n  ): Record<"+"string, unknown> => ({\n    ...payload,\n    session_id: sessionId,\n    provider,\n  });\n\n  it(\"hook + OTel for the same request: only the OTel cost is credited\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    // Hook prompt_submit arrives first -- no cost should be credited.\n    processor(withProvider(makeTokenPayload(\"prompt_submit\", 1000, 500), \"hook\"));\n    expect(store.getMetrics().sessionCost).toBe(0);\n\n    // Then the OTel api_request for the same request -- THIS credits cost.\n    processor(withProvider(makeTokenPayload(\"api_request\", 1000, 500), \"otel\"));\n    const afterOtel = store.getMetrics();\n    expect(afterOtel.sessionCost).toBeGreaterThan(0);\n    expect(afterOtel.totalTokens).toBe(1500);\n\n    // A later hook tool_call_end reports the same usage again (Claude\n    // Code fires both). Cost must NOT increase -- only context refresh.\n    const costSnapshot = afterOtel.sessionCost;\n    processor(withProvider(makeTokenPayload(\"tool_call_end\", 1000, 500), \"hook\"));\n    expect(store.getMetrics().sessionCost).toBe(costSnapshot);\n  });\n\n  it(\"cost scaling is per api_request only, regardless of interleaved hooks\", () => {\n    const store = createSpyStore();\n    const processor = createHookProcessor({\n      updateMetrics: store.updateMetrics,\n      pricingTable: DEFAULT_PRICING_TABLE,\n    });\n\n    // Three hook events around one api_request should yield exactly one\n    // cost contribution.\n    processor(withProvider(makeTokenPayload(\"prompt_submit\", 100, 50), \"hook\"));\n    processor(withProvider(makeTokenPayload(\"tool_call_end\", 100, 50), \"hook\"));\n    processor(withProvider(makeTokenPayload(\"api_request\", 100, 50), \"otel\"));\n    processor(withProvider(makeTokenPayload(\"tool_call_end\", 100, 50), \"hook\"));\n    processor(withProvider(makeTokenPayload(\"agent_complete\", 100, 50), \"hook\"));\n\n    const metrics = store.getMetrics();\n    // totalTokens reflects exactly ONE api_request worth of tokens.\n    expect(metrics.totalTokens).toBe(150);\n    expect(metrics.apiRequestCount).toBe(1);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// emitPulse — pure helper that builds a Pulse from a kind and timestamp,\n// deriving strength from PULSE_STRENGTHS. Step 04-02.\n// ---------------------------------------------------------------------------\n\ndescribe(\"emitPulse — derives pulse strength from kind\", () => {\n  it(\"builds a tool-kind pulse with strength = PULSE_STRENGTHS.tool (1.0)\", () => {\n    const t = 1_000_000_000;\n    const pulse = emitPulse(\"tool\", t);\n    expect(pulse).toEqual({\n      t,\n      kind: \"tool\",\n      strength: PULSE_STRENGTHS.tool,\n    });\n    expect(pulse.strength).toBe(1.0);\n  }
