);\n\n  it(\"builds a subagent-kind pulse with strength = PULSE_STRENGTHS.subagent (0.75)\", () => {\n    const t = 1_000_000_000;\n    const pulse = emitPulse(\"subagent\", t);\n    expect(pulse).toEqual({\n      t,\n      kind: \"subagent\",\n      strength: PULSE_STRENGTHS.subagent,\n    });\n    expect(pulse.strength).toBe(0.75);\n  });\n\n  it(\"builds a lifecycle-kind pulse with strength = PULSE_STRENGTHS.lifecycle (0.5)\", () => {\n    const t = 1_000_000_000;\n    const pulse = emitPulse(\"lifecycle\", t);\n    expect(pulse).toEqual({\n      t,\n      kind: \"lifecycle\",\n      strength: PULSE_STRENGTHS.lifecycle,\n    });\n    expect(pulse.strength).toBe(0.5);\n  });\n\n  it(\"preserves the timestamp argument verbatim\", () => {\n    const pulse = emitPulse(\"tool\", 42);\n    expect(pulse.t).toBe(42);\n  });\n});\n"},"tests/unit/plugins/norbert-usage/adapters/multiSessionStore.test.ts":{"tests":[{"id":"134","name":"multiSessionStore initial state has no sessions initially"},{"id":"135","name":"multiSessionStore add and remove addSession registers a new session"},{"id":"136","name":"multiSessionStore add and remove addSession with duplicate ID is idempotent"},{"id":"137","name":"multiSessionStore add and remove removeSession removes tracked session"},{"id":"138","name":"multiSessionStore add and remove removeSession on non-existent session is a no-op"},{"id":"139","name":"multiSessionStore update and query updateSession replaces metrics for tracked session"},{"id":"140","name":"multiSessionStore update and query getSession returns undefined for unknown session"},{"id":"141","name":"multiSessionStore update and query tracks add and remove of sessions independently"},{"id":"142","name":"multiSessionStore update and query updateSession on unknown ID is a no-op"},{"id":"143","name":"multiSessionStore aggregate window buffer sums values across two sessions in the 1m window buffer"},{"id":"144","name":"multiSessionStore aggregate window buffer does not aggregate non-aggregatable categories (context)"},{"id":"145","name":"multiSessionStore buffer fallback paths getSessionWindowBuffer returns undefined for unknown session"},{"id":"146","name":"multiSessionStore buffer fallback paths getSessionWindowBuffer returns empty buffer for session with no samples"},{"id":"147","name":"multiSessionStore buffer fallback paths getAggregateWindowBuffer returns empty buffer for category with no samples"},{"id":"148","name":"multiSessionStore buffer fallback paths getSessionBuffer returns undefined for unknown session"},{"id":"149","name":"multiSessionStore buffer fallback paths appendSessionSample on unknown session is a no-op"}],"source":"/**\n * Unit tests: Multi-Session Store adapter (Step 01-01)\n *\n * Tracks SessionMetrics for all active sessions. Mutable adapter at the edge.\n *\n * Behaviors tested:\n * - Initial state has no sessions\n * - addSession registers a new session with initial metrics\n * - removeSession removes a tracked session\n * - updateSession replaces metrics for a tracked session\n * - getSessions returns all tracked session metrics\n * - getSession returns metrics for a specific session or undefined\n * - Adding duplicate session ID is idempotent (keeps existing)\n * - Removing non-existent session is a no-op\n */\n\nimport { describe, it, expect, vi, afterEach } from \"vitest\";\nimport { createMultiSessionStore } from \"../../../../../src/plugins/norbert-usage/adapters/multiSessionStore\";\nimport { createInitialMetrics } from \"../../../../../src/plugins/norbert-usage/domain/metricsAggregator\";\nimport type { SessionMetrics } from \"../../../../../src/plugins/norbert-usage/domain/types\";\n\n// ---------------------------------------------------------------------------\n// Helpers\n// ---------------------------------------------------------------------------\n\nconst makeMetrics = (\n  sessionId: string,\n  overrides: Partial<"+"SessionMetrics> = {},\n): SessionMetrics => ({\n  ...createInitialMetrics(sessionId),\n  ...overrides,\n});\n\n// ---------------------------------------------------------------------------\n// Initial state\n// ---------------------------------------------------------------------------\n\ndescribe(\"multiSessionStore initial state\", () => {\n  it(\"has no sessions initially\", () => {\n    const store = createMultiSessionStore();\n    expect(store.getSessions()).toHaveLength(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Add/remove sessions\n// ---------------------------------------------------------------------------\n\ndescribe(\"multiSessionStore add and remove\", () => {\n  it(\"addSession registers a new session\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n\n    const sessions = store.getSessions();\n    expect(sessions).toHaveLength(1);\n    expect(sessions[0].sessionId).toBe(\"session-a\");\n  });\n\n  it(\"addSession with duplicate ID is idempotent\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n    store.addSession(\"session-a\");\n\n    expect(store.getSessions()).toHaveLength(1);\n  });\n\n  it(\"removeSession removes tracked session\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n    store.addSession(\"session-b\");\n    store.removeSession(\"session-a\");\n\n    const sessions = store.getSessions();\n    expect(sessions).toHaveLength(1);\n    expect(sessions[0].sessionId).toBe(\"session-b\");\n  });\n\n  it(\"removeSession on non-existent session is a no-op\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n    store.removeSession(\"non-existent\");\n\n    expect(store.getSessions()).toHaveLength(1);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Update and query\n// ---------------------------------------------------------------------------\n\ndescribe(\"multiSessionStore update and query\", () => {\n  it(\"updateSession replaces metrics for tracked session\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n\n    const updated = makeMetrics(\"session-a\", { burnRate: 250, sessionCost: 3.5 });\n    store.updateSession(\"session-a\", updated);\n\n    const result = store.getSession(\"session-a\");\n    expect(result).toBeDefined();\n    expect(result!.burnRate).toBe(250);\n    expect(result!.sessionCost).toBe(3.5);\n  });\n\n  it(\"getSession returns undefined for unknown session\", () => {\n    const store = createMultiSessionStore();\n    expect(store.getSession(\"unknown\")).toBeUndefined();\n  });\n\n  it(\"tracks add and remove of sessions independently\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"alpha\");\n    store.addSession(\"beta\");\n    store.addSession(\"gamma\");\n\n    store.updateSession(\"beta\", makeMetrics(\"beta\", { burnRate: 100 }));\n    store.removeSession(\"alpha\");\n\n    const sessions = store.getSessions();\n    expect(sessions).toHaveLength(2);\n    expect(sessions.map(s => s.sessionId).sort()).toEqual([\"beta\", \"gamma\"]);\n\n    const beta = store.getSession(\"beta\");\n    expect(beta!.burnRate).toBe(100);\n  });\n\n  it(\"updateSession on unknown ID is a no-op\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n\n    const before = store.getSession(\"session-a\");\n    store.updateSession(\"unknown-id\", makeMetrics(\"unknown-id\", { burnRate: 999 }));\n\n    // Original session unchanged\n    const after = store.getSession(\"session-a\");\n    expect(after).toEqual(before);\n\n    // Unknown session was not created\n    expect(store.getSession(\"unknown-id\")).toBeUndefined();\n    expect(store.getSessions()).toHaveLength(1);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Aggregate window buffer -- cross-session sum\n// ---------------------------------------------------------------------------\n\ndescribe(\"multiSessionStore aggregate window buffer\", () => {\n  afterEach(() => {\n    vi.restoreAllMocks();\n  });\n\n  it(\"sums values across two sessions in the 1m window buffer\", () => {\n    // Control timestamps to ensure the aggregate multi-window buffer accepts both samples.\n    // The 1m window has a 2000ms sample interval (aligned with the 2s heartbeat\n    // poll), so timestamps must be >2000ms apart for the second append to pass\n    // the downsample gate in multiWindowSampler.appendToWindow.\n    let now = 1000;\n    vi.spyOn(Date, \"now\").mockImplementation(() => now);\n\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n    store.addSession(\"session-b\");\n\n    // First sample at t=1000\n    store.appendSessionSample(\"session-a\", { tokens: 100, cost: 0, agents: 0, context: 0 });\n\n    // Advance time past the 1m window's 2000ms sample interval\n    now = 3100;\n    store.appendSessionSample(\"session-b\", { tokens: 250, cost: 0, agents: 0, context: 0 });\n\n    // tokens is aggregateApplicable, so the aggregate window should sum both\n    const aggregateBuffer = store.getAggregateWindowBuffer(\"tokens\", \"1m\");\n    expect(aggregateBuffer.samples.length).toBeGreaterThan(0);\n\n    // The latest aggregate sample should reflect the sum of both sessions\n    const latestSample = aggregateBuffer.samples[aggregateBuffer.samples.length - 1];\n    expect(latestSample.tokenRate).toBe(350);\n  });\n\n  it(\"does not aggregate non-aggregatable categories (context)\", () => {\n    let now = 1000;\n    vi.spyOn(Date, \"now\").mockImplementation(() => now);\n\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n    store.addSession(\"session-b\");\n\n    store.appendSessionSample(\"session-a\", { tokens: 0, cost: 0, agents: 0, context: 60 });\n    now = 1200;\n    store.appendSessionSample(\"session-b\", { tokens: 0, cost: 0, agents: 0, context: 80 });\n\n    // context is not aggregateApplicable -- aggregate window buffer should be empty\n    const aggregateBuffer = store.getAggregateWindowBuffer(\"context\", \"1m\");\n    expect(aggregateBuffer.samples).toHaveLength(0);\n  });\n});\n\n// ---------------------------------------------------------------------------\n// Null-fallback paths in buffer retrieval\n// ---------------------------------------------------------------------------\n\ndescribe(\"multiSessionStore buffer fallback paths\", () => {\n  it(\"getSessionWindowBuffer returns undefined for unknown session\", () => {\n    const store = createMultiSessionStore();\n    const result = store.getSessionWindowBuffer(\"unknown-session\", \"tokens\", \"1m\");\n    expect(result).toBeUndefined();\n  });\n\n  it(\"getSessionWindowBuffer returns empty buffer for session with no samples\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n\n    // Session exists but no samples appended yet -- multi-window buffer exists with empty windows\n    const result = store.getSessionWindowBuffer(\"session-a\", \"tokens\", \"1m\");\n    expect(result).toBeDefined();\n    expect(result!.samples).toHaveLength(0);\n  });\n\n  it(\"getAggregateWindowBuffer returns empty buffer for category with no samples\", () => {\n    const store = createMultiSessionStore();\n\n    // No sessions added, no samples -- aggregate multi-window buffer should return empty\n    const result = store.getAggregateWindowBuffer(\"tokens\", \"1m\");\n    expect(result).toBeDefined();\n    expect(result.samples).toHaveLength(0);\n  });\n\n  it(\"getSessionBuffer returns undefined for unknown session\", () => {\n    const store = createMultiSessionStore();\n    const result = store.getSessionBuffer(\"unknown-session\", \"tokens\");\n    expect(result).toBeUndefined();\n  });\n\n  it(\"appendSessionSample on unknown session is a no-op\", () => {\n    const store = createMultiSessionStore();\n    store.addSession(\"session-a\");\n\n    // Append to unknown session -- should not throw, should not affect existing\n    store.appendSessionSample(\"unknown-session\", { tokens: 100, cost: 0, agents: 0, context: 0 });\n\n    const buffer = store.getSessionBuffer(\"session-a\", \"tokens\");\n    expect(buffer).toBeDefined();\n    expect(buffer!.samples).toHaveLength(0);\n  });\n});\n"},"tests/unit/plugins/norbert-usage/event-pipeline-integration.test.ts":{"tests":[{"id":"150","name":"Event pipeline integration: DB event → hookBridge → metricsStore OTel api_request with usage data produces non-zero tokens and cost in the store"},{"id":"151","name":"Event pipeline integration: DB event → hookBridge → metricsStore hook tool_call_end refreshes context window but does not credit cost"},{"id":"152","name":"Event pipeline integration: DB event → hookBridge → metricsStore session_start event increments activeAgentCount without adding tokens"},{"id":"153","name":"Event pipeline integration: DB event → hookBridge → metricsStore OTel tool_result increments toolCallCount without adding tokens"},{"id":"154","name":"Event pipeline integration: DB event → hookBridge → metricsStore hook prompt_submit with usage refreshes context without adding tokens/cost"},{"id":"155","name":"Event pipeline integration: DB event → hookBridge → metricsStore time series buffer receives samples when api_request events flow"}],"source":"/**\n * Integration test: Event Pipeline (DB event → hookProcessor → metricsStore)\n *\n * This test exercises the full frontend event pipeline using production-shaped\n * event payloads (as returned by Tauri IPC `get_session_events`).\n *\n * The bug this catches: hookProcessor received the full DB event wrapper\n * { session_id, event_type, payload: { usage: {...} }, ... } but passed it\n * as-is to the aggregator. The token extractor looked for `payload.usage`\n * at the wrong nesting level and always returned \"absent\".\n *\n * This test wires up the real plugin onLoad, feeds production-shaped events\n * through the registered hook processor, and asserts the metrics store\n * reflects extracted tokens and computed costs.\n *\n * NOTE: usageMetricsStore is a module-level singleton that accumulates state\n * across tests. Tests use delta assertions (before/after) instead of absolute\n * values.\n */\n\nimport { describe, it, expect, beforeAll } from \"vitest\";\nimport { usageMetricsStore } from \"../../../../src/plugins/norbert-usage/index\";\nimport { norbertUsagePlugin } from \"../../../../src/plugins/norbert-usage/index\";\nimport { resetHookBridge, deliverHookEvent } from \"../../../../src/plugins/hookBridge\";\nimport { createPluginRegistry } from \"../../../../src/plugins/pluginRegistry\";\nimport { createNorbertAPI } from \"../../../../src/plugins/apiFactory\";\nimport { loadPlugins } from \"../../../../src/plugins/lifecycleManager\";\nimport { norbertSessionPlugin } from \"../../../../src/plugins/norbert-session/index\";\n\n// ---------------------------------------------------------------------------\n// Production event shapes — exactly what get_session_events returns via IPC\n// ---------------------------------------------------------------------------\n\n/** An OTel api_request event WITH token usage -- the sole cost-bearing\n *  event type under the OTel-authoritative policy. */\nconst makeWrappedApiRequestWithUsage = (sessionId: string) => ({\n  session_id: sessionId,\n  event_type: \"api_request\",\n  payload: {\n    session_id: sessionId,\n    usage: {\n      input_tokens: 1200,\n      output_tokens: 400,\n      cache_read_input_tokens: 500,\n      cache_creation_input_tokens: 0,\n      model: \"claude-sonnet-4-20250514\",\n    },\n  },\n  received_at: \"2026-03-13T22:00:00Z\",\n  provider: \"otel\",\n});\n\n/** A hook tool_call_end with usage -- refreshes context window but must\n *  NOT credit tokens/cost. */\nconst makeWrappedHookToolCallEndWithUsage = (sessionId: string) => ({\n  session_id: sessionId,\n  event_type: \"tool_call_end\",\n  payload: {\n    session_id: sessionId,\n    tool: \"Read\",\n    input: { file_path: \"/tmp/test.ts\" },\n    usage: {\n      input_tokens: 1200,\n      output_tokens: 400,\n      cache_read_input_tokens: 500,\n      cache_creation_input_tokens: 0,\n      model: \"claude-sonnet-4-20250514\",\n    },\n  },\n  received_at: \"2026-03-13T22:00:00Z\",\n  provider: \"claude_code\",\n});\n\n/** A SessionStart event (no token data expected). */\nconst makeWrappedSessionStart = (sessionId: string) => ({\n  session_id: sessionId,\n  event_type: \"session_start\",\n  payload: {\n    session_id: sessionId,\n  },\n  received_at: \"2026-03-13T21:59:00Z\",\n  provider: \"claude_code\",\n});\n\n/** An OTel tool_result event -- drives toolCallCount under the\n *  OTel-authoritative policy. */\nconst makeWrappedToolResult = (sessionId: string) => ({\n  session_id: sessionId,\n  event_type: \"tool_result\",\n  payload: {\n    session_id: sessionId,\n    tool_name: \"Read\",\n    success: true,\n    duration_ms: 120,\n  },\n  received_at: \"2026-03-13T22:00:00Z\",\n  provider: \"otel\",\n});\n\n/** A hook prompt_submit with usage -- refreshes context window but\n *  must NOT credit tokens/cost under the OTel-authoritative policy. */\nconst makeWrappedHookPromptSubmit = (sessionId: string) => ({\n  session_id: sessionId,\n  event_type: \"prompt_submit\",\n  payload: {\n    session_id: sessionId,\n    usage: {\n      input_tokens: 3000,\n      output_tokens: 1500,\n      cache_read_input_tokens: 0,\n      cache_creation_input_tokens: 0,\n      model: \"claude-opus-4-20250514\",\n    },\n  },\n  received_at: \"2026-03-13T22:01:00Z\",\n  provider: \"claude_code\",\n});\n\n// ---------------------------------------------------------------------------\n// Integration tests\n// ---------------------------------------------------------------------------\n\ndescribe(\"Event pipeline integration: DB event → hookBridge → metricsStore\", () => {\n  beforeAll(() => {\n    // Initialize plugin system once (same as App.tsx does on mount)\n    resetHookBridge();\n    loadPlugins(\n      [norbertSessionPlugin, norbertUsagePlugin],\n      createPluginRegistry(),\n      createNorbertAPI,\n    );\n  });\n\n  it(\"OTel api_request with usage data produces non-zero tokens and cost in the store\", () => {\n    const before = usageMetricsStore.getMetrics();\n    const event = makeWrappedApiRequestWithUsage(\"sess-integration-1\");\n\n    deliverHookEvent(\"session-event\", event);\n\n    const after = usageMetricsStore.getMetrics();\n    const deltaTokens = after.totalTokens - before.totalTokens;\n    // 1200 input + 400 output + 500 cache_read = 2100 (cache tokens\n    // are billed and now counted in totalTokens so the displayed total\n    // matches what sessionCost was computed against).\n    expect(deltaTokens).toBe(2100);\n    expect(after.inputTokens - before.inputTokens).toBe(1200);\n    expect(after.outputTokens - before.outputTokens).toBe(400);\n    expect(after.cacheReadTokens - before.cacheReadTokens).toBe(500);\n    expect(after.sessionCost).toBeGreaterThan(before.sessionCost);\n    expect(after.totalEventCount).toBeGreaterThan(before.totalEventCount);\n  });\n\n  it(\"hook tool_call_end refreshes context window but does not credit cost\", () => {\n    const before = usageMetricsStore.getMetrics();\n    const event = makeWrappedHookToolCallEndWithUsage(\"sess-integration-ctx\");\n\n    deliverHookEvent(\"session-event\", event);\n\n    const after = usageMetricsStore.getMetrics();\n    expect(after.totalTokens).toBe(before.totalTokens);\n    expect(after.sessionCost).toBe(before.sessionCost);\n    expect(after.contextWindowTokens).toBe(1700); // 1200 input + 500 cache_read\n    expect(after.totalEventCount).toBe(before.totalEventCount + 1);\n  });\n\n  it(\"session_start event increments activeAgentCount without adding tokens\", () => {\n    const before = usageMetricsStore.getMetrics();\n    const event = makeWrappedSessionStart(\"sess-integration-2\");\n\n    deliverHookEvent(\"session-event\", event);\n\n    const after = usageMetricsStore.getMetrics();\n    expect(after.activeAgentCount).toBe(before.activeAgentCount + 1);\n    expect(after.totalTokens).toBe(before.totalTokens); // no change\n    expect(after.sessionCost).toBe(before.sessionCost); // no change\n    expect(after.totalEventCount).toBe(before.totalEventCount + 1);\n  });\n\n  it(\"OTel tool_result increments toolCallCount without adding tokens\", () => {\n    const before = usageMetricsStore.getMetrics();\n    const event = makeWrappedToolResult(\"sess-integration-3\");\n\n    deliverHookEvent(\"session-event\", event);\n\n    const after = usageMetricsStore.getMetrics();\n    expect(after.toolCallCount).toBe(before.toolCallCount + 1);\n    expect(after.totalTokens).toBe(before.totalTokens); // no change\n  });\n\n  it(\"hook prompt_submit with usage refreshes context without adding tokens/cost\", () => {\n    const before = usageMetricsStore.getMetrics();\n    const event = makeWrappedHookPromptSubmit(\"sess-integration-4\");\n\n    deliverHookEvent(\"session-event\", event);\n\n    const after = usageMetricsStore.getMetrics();\n    expect(after.totalTokens).toBe(before.totalTokens);\n    expect(after.sessionCost).toBe(before.sessionCost);\n    // 3000 input + 0 cache tokens for Opus (200k window) => 1.5%\n    expect(after.contextWindowTokens).toBe(3000);\n  });\n\n  it(\"time series buffer receives samples when api_request events flow\", () => {\n    const timeSeries = usageMetricsStore.getTimeSeries();\n    // Previous api_request events should have pushed samples\n    expect(timeSeries.samples.length).toBeGreaterThanOrEqual(1);\n    expect(timeSeries.samples[0].tokenRate).toBeGreaterThan(0);\n  });\n});\n"}},"projectRoot":"C:\\Users\\PhilVanEvery\\Git\\github\\pmvanev\\norbert","config":{"$schema":"https://raw.githubusercontent.com/stryker-mutator/stryker/master/packages/core/schema/stryker-schema.json","mutate":["src/plugins/norbert-usage/domain/phosphor/pulseTiming.ts","src/plugins/norbert-usage/domain/phosphor/rateDerivation.ts","src/plugins/norbert-usage/domain/phosphor/scopeHitTest.ts","src/plugins/norbert-usage/domain/phosphor/scopeProjection.ts","src/plugins/norbert-usage/hookProcessor.ts:138-142","src/plugins/norbert-usage/adapters/multiSessionStore.ts:220-230","src/plugins/norbert-usage/adapters/multiSessionStore.ts:285-295","src/plugins/norbert-usage/adapters/multiSessionStore.ts:396-445"],"testRunner":"vitest","reporters":["clear-text","json","html"],"jsonReporter":{"fileName":"docs/feature/norbert-performance-monitor/deliver/mutation/stryker-report.json"},"htmlReporter":{"fileName":"docs/feature/norbert-performance-monitor/deliver/mutation/stryker-report.html"},"vitest":{"configFile":"vitest.pm-v2.mutation.config.ts","related":true},"tempDirName":".stryker-tmp","configFile":"stryker.pm-v2.conf.json","allowConsoleColors":true,"checkers":[],"checkerNodeArgs":[],"commandRunner":{"command":"npm test"},"coverageAnalysis":"perTest","clearTextReporter":{"allowColor":true,"allowEmojis":false,"logTests":true,"maxTestsToLog":3,"reportTests":true,"reportMutants":true,"reportScoreTable":true,"skipFull":false},"dashboard":{"baseUrl":"https://dashboard.stryker-mutator.io/api/reports","reportType":"full"},"dryRunOnly":false,"eventReporter":{"baseDir":"reports/mutation/events"},"ignorePatterns":[],"ignoreStatic":false,"incremental":false,"incrementalFile":"reports/stryker-incremental.json","force":false,"fileLogLevel":"off","inPlace":false,"logLevel":"info","maxConcurrentTestRunners":9007199254740991,"maxTestRunnerReuse":0,"mutator":{"plugins":null,"excludedMutations":[]},"plugins":["@stryker-mutator/*"],"appendPlugins":[],"disableTypeChecks":true,"symlinkNodeModules":true,"cleanTempDir":true,"testRunnerNodeArgs":[],"thresholds":{"high":80,"low":60,"break":null},"timeoutFactor":1.5,"timeoutMS":5000,"dryRunTimeoutMinut
