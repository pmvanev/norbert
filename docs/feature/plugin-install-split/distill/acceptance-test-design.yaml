acceptance_test_design:
  feature: plugin-install-split
  date: 2026-03-09
  designer: acceptance-designer (DISTILL wave)

  summary:
    total_scenarios: 40
    walking_skeletons: 4
    focused_happy_path: 19
    error_edge_scenarios: 17
    error_path_ratio: "42.5%"
    property_tagged: 1

  feature_files:
    - path: tests/acceptance/plugin-install-split/features/plugin-directory-structure.feature
      scenarios: 11
      walking_skeletons: 1
      covers: [US-PIS-002]

    - path: tests/acceptance/plugin-install-split/features/app-standalone-mode.feature
      scenarios: 11
      walking_skeletons: 2
      covers: [US-PIS-001, US-PIS-006]

    - path: tests/acceptance/plugin-install-split/features/settings-merge-removal.feature
      scenarios: 10
      walking_skeletons: 1
      covers: [US-PIS-003]

    - path: tests/acceptance/plugin-install-split/features/install-terminal-output.feature
      scenarios: 3
      walking_skeletons: 0
      covers: [US-PIS-001]

    - path: tests/acceptance/plugin-install-split/features/plugin-lifecycle-validation.feature
      scenarios: 8
      walking_skeletons: 0
      covers: [US-PIS-004, US-PIS-005]

  test_implementations:
    - path: tests/acceptance/plugin-install-split/plugin-directory-structure.test.ts
      framework: vitest
      first_enabled_test: "Plugin package contains all required files for marketplace discovery"
      note: "Walking skeleton enabled; all other tests skipped"

    - path: tests/acceptance/plugin-install-split/app-standalone-mode.test.ts
      framework: vitest
      first_enabled_test: "User opens newly installed app and sees guidance to connect"
      note: "Walking skeleton enabled (uses existing functions); others skipped pending new status derivation"

    - path: tests/acceptance/plugin-install-split/settings-merge-removal.test.ts
      framework: vitest
      first_enabled_test: "App launches cleanly without settings merge behavior"
      note: "All tests skipped -- will pass only after code removal"

    - path: tests/acceptance/plugin-install-split/install-terminal-output.test.ts
      framework: vitest
      first_enabled_test: "Terminal output includes plugin install command"
      note: "All tests skipped -- requires postinstall function to be created"

  story_coverage:
    US-PIS-001:
      acceptance_criteria_covered:
        - "Install does not read, modify, or back up settings.json"
        - "Terminal output includes plugin install command"
        - "App shows 'No plugin connected' status"
        - "App displays plugin install command in empty state"
        - "No settings merge notification or restart banner"
      scenarios:
        - "App launches cleanly without settings merge behavior"
        - "User opens newly installed app and sees guidance to connect"
        - "Terminal output includes plugin install command after successful install"
        - "Terminal output does not mention settings merge or restart"

    US-PIS-002:
      acceptance_criteria_covered:
        - "plugin.json exists with valid metadata"
        - "hooks.json defines exactly 6 async HTTP hooks"
        - "mcp.json defines norbert MCP server"
        - "Hook URLs use port 3748"
        - "Hook event names match HOOK_EVENT_NAMES"
      scenarios:
        - "Plugin package contains all required files"
        - "Plugin manifest contains required metadata"
        - "Hook definitions specify exactly 6 event types"
        - "Each hook entry configured for non-blocking delivery"
        - "Hook URLs point to correct receiver port"
        - "Hook event names match app's recognized event types"
        - "Every hook URL parseable back to recognized event type (@property)"
        - "MCP configuration defines norbert server"
        - "Plugin files contain no dynamic values"

    US-PIS-003:
      acceptance_criteria_covered:
        - "SettingsMergeAdapter removed"
        - "run_settings_merge removed"
        - "SettingsManager port removed"
        - "Domain merge functions removed"
        - "ADR-006 superseded"
        - "Restart banner logic removed"
        - "App compiles and tests pass"
      scenarios:
        - "SettingsMergeAdapter no longer exists"
        - "run_settings_merge function no longer exists"
        - "SettingsManager port trait no longer exists"
        - "Settings merge domain functions removed"
        - "Domain constants used by receiver preserved"
        - "ADR-006 marked as superseded"
        - "No restart banner logic remains"
        - "App compiles and all remaining tests pass"
        - "Settings adapter module declaration removed"

    US-PIS-004:
      acceptance_criteria_covered:
        - "Plugin installs hooks and MCP server"
        - "App detects events and transitions status"
        - "Plugin installs regardless of app running state"
        - "Reinstall does not create duplicates"
      scenarios:
        - "Plugin files enable Claude to register 6 hooks"
        - "Plugin files enable Claude to register MCP server"
        - "App detects connection when first event arrives"
        - "Plugin install succeeds regardless of app state"
        - "Duplicate plugin install does not create duplicates"
      note: "US-PIS-004 requires no Norbert code changes -- Claude handles lifecycle"

    US-PIS-005:
      acceptance_criteria_covered:
        - "Uninstall removes hooks"
        - "Uninstall removes MCP server"
        - "App data unaffected by plugin removal"
        - "App status reverts appropriately"
        - "App handles event cessation gracefully"
      scenarios:
        - "App preserves all historical data when plugin removed"
        - "App does not crash when events stop mid-session"
        - "Plugin reinstall works after previous uninstall"
      note: "US-PIS-005 requires no Norbert code changes -- Claude handles lifecycle"

    US-PIS-006:
      acceptance_criteria_covered:
        - "App displays 'No plugin connected' status"
        - "Plugin install command displayed in empty state"
        - "Historical sessions browsable without plugin"
        - "Sidecar listens regardless of plugin state"
        - "App transitions to 'Listening' when events arrive"
      scenarios:
        - "User opens newly installed app and sees guidance"
        - "App transitions to active when first event arrives"
        - "Status derivation rules (4 scenarios)"
        - "Historical data accessible without plugin"
        - "Receiver stays ready when no plugin connected"
        - "Zero-to-one session transition"

  implementation_sequence:
    description: >
      One-at-a-time enablement order. Enable one test, implement to make it
      pass, commit, then enable the next. Walking skeletons first.
    order:
      - step: "01-01"
        test: "Plugin package contains all required files for marketplace discovery"
        file: plugin-directory-structure.test.ts
        note: "Create plugin/ directory with 3 JSON files. First walking skeleton."

      - step: "03-01"
        test: "User opens newly installed app and sees guidance to connect"
        file: app-standalone-mode.test.ts
        note: "Add 'No plugin connected' status derivation. Second walking skeleton."

      - step: "02-01"
        test: "App launches cleanly without settings merge behavior"
        file: settings-merge-removal.test.ts
        note: "Remove run_settings_merge from lib.rs setup. Third walking skeleton."

      - step: "03-01"
        test: "App transitions to active when plugin sends first event"
        file: app-standalone-mode.test.ts
        note: "Verify status transition logic. Fourth walking skeleton."

      - step: "01-01"
        test: "Plugin manifest contains required metadata"
        file: plugin-directory-structure.test.ts
        note: "Verify plugin.json content details."

      - step: "01-01"
        test: "Hook definitions specify exactly 6 event types"
        file: plugin-directory-structure.test.ts
        note: "Verify hooks.json structure."

      - step: "01-01"
        test: "Each hook entry configured for non-blocking delivery"
        file: plugin-directory-structure.test.ts

      - step: "01-01"
        test: "Hook URLs point to correct receiver port"
        file: plugin-directory-structure.test.ts

      - step: "01-01"
        test: "Hook event names match app's recognized event types"
        file: plugin-directory-structure.test.ts

      - step: "01-01"
        test: "MCP configuration defines norbert server"
        file: plugin-directory-structure.test.ts

      - step: "02-01"
        test: "SettingsMergeAdapter no longer exists"
        file: settings-merge-removal.test.ts

      - step: "02-01"
        test: "run_settings_merge function no longer exists"
        file: settings-merge-removal.test.ts

      - step: "02-01"
        test: "SettingsManager port trait no longer exists"
        file: settings-merge-removal.test.ts

      - step: "02-02"
        test: "Settings merge domain functions removed"
        file: settings-merge-removal.test.ts

      - step: "02-02"
        test: "ADR-006 marked as superseded"
        file: settings-merge-removal.test.ts

      - step: "03-01"
        test: "Status derivation rules (all 4)"
        file: app-standalone-mode.test.ts

      - step: "03-02"
        test: "Terminal output includes plugin install command"
        file: install-terminal-output.test.ts

  driving_ports:
    typescript:
      - module: "src/domain/status.ts"
        functions: ["deriveStatus", "isEmptyState", "formatField", "EMPTY_STATE_MESSAGE"]
        note: "deriveStatus will be extended to return 'No plugin connected' when session_count=0 AND event_count=0"
      - module: "scripts/postinstall-core.js"
        functions: ["to be added: buildInstallSuccessMessage or similar"]
    rust:
      - module: "src-tauri/src/domain/mod.rs"
        functions: ["build_status_with_session", "derive_status", "build_hook_url", "HOOK_EVENT_NAMES", "HOOK_PORT"]
        note: "derive_status or build_status_with_session will be extended for 'No plugin connected'"

  mandate_compliance:
    CM-A_hexagonal_boundary:
      status: pass
      evidence: >
        All test files import from domain layer (src/domain/status.ts, domain/mod.rs)
        or validate static plugin files. No test imports from adapters/settings,
        adapters/db, or internal components.

    CM-B_business_language:
      status: pass
      evidence: >
        Gherkin uses business terms only: "plugin manifest", "hook definitions",
        "MCP server", "No plugin connected", "sessions", "events".
        Zero technical terms in feature files: no HTTP status codes, no SQL,
        no JSON schema references, no Rust types in Gherkin steps.
        Step methods delegate to domain functions.

    CM-C_user_journey_completeness:
      status: pass
      evidence: >
        4 walking skeletons covering: (1) plugin package completeness,
        (2) first-time user empty state, (3) clean launch without merge,
        (4) transition from disconnected to active.
        36 focused scenarios covering boundary rules, code removal verification,
        historical data access, edge cases.
        Walking skeleton ratio: 4/40 = 10% (within 2-5 target).
        Error/edge ratio: 17/40 = 42.5% (above 40% target).
