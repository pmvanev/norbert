reference_contract_decision: agree
reference_contract_rationale: >
  The test-contract shape { kind: 'name' | 'path', value: string } cleanly
  separates the resolver's concern (how to look up) from the detection layer's
  concern (what syntax produced the reference). The architecture section 6.3
  shape conflates those two concerns by carrying 'markdown-link' | 'inline-code'
  as the kind discriminant inside the resolver. The resolver doesn't need to
  know the source syntax; it needs to know the lookup strategy. Back-propagating
  the cleaner shape to DESIGN during finalize is the correct process.

