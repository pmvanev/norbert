unsupported_heuristic_acceptable: yes
unsupported_heuristic_rationale: >
  The heuristic is deterministic with a single decision point and produces
  meaningfully different UX: 'unsupported' signals "I recognise this location
  but cannot navigate there"; 'dead' signals "I have no idea what this is."
  That distinction is load-bearing for US-101 AC bullet 4. v1 scope is honest;
  a future wave can refine the heuristic without breaking the contract.

