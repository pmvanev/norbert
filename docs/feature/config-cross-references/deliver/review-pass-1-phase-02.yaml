      Reverting the zero-match branch to return { tag: 'live', entry: undefined }
      causes result.tag to be 'live' not 'dead'. Minor under-specification on
      scope membership recorded as LOW issue D3.
  - step: 02-04 (unsupported + live-path regression guard)
    deletion_test: yes (both assertions independently verified)
    rationale: >
