api_ergonomics: >
  detectionRemarkPlugin(registry, ctx) returns (tree) => tree, exactly what
  react-markdown's remarkPlugins prop expects. Architecture §6.2 prescribes
  this integration; implementation matches without deviation. ConfigDetailPanel
  (step 11) will pass it as remarkPlugins={[detectionRemarkPlugin(registry, ctx)]}
  with no additional wrapping. Re-export of DetectionContext from remarkPlugin.ts
  is a clean ergonomic touch.

type_design: >
  DetectionContext (currentItemDir: string | null) is adequate for v1 and
  extension-ready. DetectionStrategy interface clean; void return appropriate
  for unified mutation contract. ReferenceTokenData is well-typed; index
  signature accommodates additive attributes (data-ref-candidate-count as
  number, data-ref-target-path as string). Mild concern: index signature
  admits any string key — typo like "data-reff-variant" not caught at compile
  time. Inherent index-signature trade-off; acceptable.

naming_discoverability: >
  All identifiers self-documenting. inlineCodeStrategy and markdownLinkStrategy
  name the syntax form. DETECTION_PIPELINE / composePipeline / detectionRemarkPlugin
  follow remark ecosystem conventions. isInlineCodeNode/isLinkNode use is*
  type-guard convention. MdastNode alias rationale documented (decouple from
  @types/mdast churn). NOTE: refactor-05 extracted applyAnnotation.ts as the
  shared helper — addressing the duplication concern proactively (see
  maintainability_under_change).

comment_quality_post_refactor: >
  refactor-05 landed (commit 52c5c42) with L1 docstring consolidation. Quality
  is high: every file-level JSDoc names architecture section + ADR. annotate()
  function explained with ecosystem reference. pipeline.ts comment explains
  prepend rationale and ADR-010 canonical order. Additive hProperties
  (data-ref-candidate-count, data-ref-target-path) carry inline NOTE comments
  pointing to finalize back-propagation. No why-gaps found.

edge_case_coverage: >
  (1) Empty registry: strategies call resolve() which returns dead/null;
  inlineCode early-returns on dead, markdownLink annotates as dead. Both
  correct. (2) Missing node.url: isLinkNode guard requires
  typeof node.url === "string"; malformed parse skipped without crash.
  (3) Whitespace in node.value (inlineCode): not trimmed before lookup; remark-
  parse trims by default but undocumented as precondition — see LOW issue 3.
  (4) Case sensitivity: lookupByName is case-sensitive (Map.get exact-match);
  undocumented design decision — see LOW issue 2.

maintainability_under_change: >
  Adding bareProseStrategy (R3, US-111): clean 3-step process (new strategy
  file + DETECTION_PIPELINE entry + optional DetectionContext field). Adding
  data-ref-* attribute: index signature escape hatch already in place. The
  annotate() duplication concern from initial assessment has been ADDRESSED by
  refactor-05 which extracted applyAnnotation.ts as the shared helper. Both
  strategies now delegate; future bareProseStrategy can use the same helper.

architecture_backprop_documented: yes
