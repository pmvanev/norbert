detection_strategies_isolated_rule_sanity: >
  Rule allowlist is correct and complete: detection/ siblings, registry,
  resolver, unist-util-visit + unist + @types/unist transitive surfaces.
  Architecture §4 wording listed only types + visit + registry; resolver
  addition is correct and documented. No false positives or negatives
  expected. Rule sanity: PASS.

refactor_quality: >
  refactor-05 landed with extracted applyAnnotation.ts shared helper (closes
  the duplication concern this review would otherwise have raised), L1
  docstring consolidation, L2 dead fixture removal. 5 files changed,
  +129/-150. Public surface byte-equivalent.

issues:
  - severity: LOW
    finding: >
      Case sensitivity of registry name lookup is unspecified in architecture
      and ADR documents. lookupByName performs exact Map.get(); NW-BDD-Requirements
      does not match nw-bdd-requirements. Defensible but undocumented.
    file_and_line: "architecture.md §6.1 (Registry); inlineCodeStrategy.ts:63"
    recommendation: >
      Add to architecture §6.1: "Name lookup is case-sensitive; key is the name
      exactly as ingested during buildRegistry." Documentation gap; finalize task.

  - severity: LOW
    finding: >
      Whitespace trimming of inline-code node.value is not performed before
      registry lookup. remark-parse trims by default but this is not documented
      as precondition.
    file_and_line: "inlineCodeStrategy.ts:62-63"
    recommendation: >
      Add a comment noting remark-parse guarantees trimmed inlineCode.value, OR
      add rawText = node.value.trim(). Comment form preferred to avoid masking
      legitimate whitespace mismatch signal.

summary: >
  Phase 05 Detection Pipeline is sound. Public API integrates cleanly with
  react-markdown's remarkPlugins prop per architecture §6.2. All four
  ResolvedRef variants mapped correctly. detection-strategies-isolated rule
  correctly specified and active. Additive hProperties consistently flagged for
  finalize back-propagation across three locations each. The annotate()
  duplication concern was proactively addressed by refactor-05 (52c5c42). Two
  LOW issues — both documentation gaps for finalize. Zero BLOCKER, zero HIGH.
  Approved.
