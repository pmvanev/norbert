  from: "acceptance-designer (DISTILL wave)"
  to: "software-crafter (DELIVER wave)"
  date: "2026-03-11"

summary: |
  27 acceptance scenarios covering 3 user stories for decoupling the hook
  receiver lifecycle from the GUI. Tests use Vitest with Given-When-Then
  structure. One scenario is enabled (passing); 26 are skipped for
  one-at-a-time implementation.

