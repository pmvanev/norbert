journey:
  name: "OTel Rich Dashboard"
  goal: "Understand the full story of a Claude Code session -- tools, errors, prompts, productivity, and cost -- from a single enriched dashboard"
  persona: "Phil Vargas (solo developer, daily Claude Code user, local-first)"

  emotional_arc:
    start: "Oriented (session list shows IDE badges and metadata)"
    middle: "Informed and diagnostic (scanning cards, investigating patterns)"
    end: "Satisfied and in control (complete understanding of session behavior and output)"

steps:
  - id: 1
    name: "Metrics Ingestion"
    action: "Claude Code sends POST /v1/metrics with ExportMetricsServiceRequest"

    shared_artifacts:
      - name: "session_id"
        source: "session.id attribute on metric data points"
        displayed_as: "${session.id}"
        consumers: ["metrics storage", "session routing", "frontend queries"]
      - name: "metric_data_points"
        source: "ExportMetricsServiceRequest payload"
        displayed_as: "N/A (backend)"
        consumers: ["Active Time card", "Productivity card", "Git Activity card", "Cost supplementation"]

    emotional_state:
      entry: "N/A (backend process)"
      exit: "N/A (backend process)"

    integration_checkpoint: |
      - Handler returns HTTP 200 with empty JSON body {}
      - All 8 metric types parsed without error
      - Delta values accumulated correctly per session
      - session.id extracted and matched to existing session

    gherkin: |
      Scenario: Metrics payload ingested successfully
        Given Claude Code session "6e2a8c02" is active
        And Claude Code sends a POST /v1/metrics with cost.usage delta of 0.144065 USD for model "claude-opus-4-6[1m]"
        When the metrics handler processes the payload
        Then the metric data point is persisted for session "6e2a8c02"
        And HTTP 200 with body {} is returned

  - id: 2
    name: "Session List with Enrichment"
    action: "Phil opens Norbert session list"

    tui_mockup: |
      +-- Sessions (3 active) ------------------------------------------+
      | [VS Code]  6e2a8c02 | 10:15 AM | Claude Code 2.1.81 | $2.47   |
      | [Cursor]   a1b2c3d4 | 09:30 AM | Claude Code 2.1.81 | $1.12   |
      | [iTerm]    f9e8d7c6 | Yesterday | Claude Code 2.1.80 | $0.89   |
      +------------------------------------------------------------------+

    shared_artifacts:
      - name: "terminal_type"
        source: "terminal.type standard attribute from OTLP log records"
        displayed_as: "${ide_badge}"
        consumers: ["session list IDE badge"]
      - name: "service_version"
        source: "service.version resource attribute from OTLP payload"
        displayed_as: "${claude_code_version}"
        consumers: ["session list version text", "session detail header"]
      - name: "platform_info"
        source: "os.type + host.arch resource attributes from OTLP payload"
        displayed_as: "${os_type} ${host_arch}"
        consumers: ["session list platform text", "session detail header"]

    emotional_state:
      entry: "Curious (which session do I want to review?)"
      exit: "Oriented (IDE badges and metadata provide instant context)"

    integration_checkpoint: |
      - terminal.type maps to correct IDE badge
      - service.version displayed accurately
      - Missing attributes do not cause errors (graceful degradation)

    gherkin: |
      Scenario: Session list shows IDE badge from terminal.type
        Given session "6e2a8c02" has received events with terminal.type "vscode"
        When Phil views the session list
        Then session "6e2a8c02" displays a "VS Code" badge
        And the Claude Code version "2.1.81" is shown
        And the platform "Windows amd64" is shown

  - id: 3
    name: "Session Dashboard Overview"
    action: "Phil selects a session to view the dashboard"

    tui_mockup: |
      +-- Session 6e2a8c02 (VS Code) -----------------------------------+
      | Active Time    | Cost & Tokens      | Tool Usage                 |
      | User: 12m 30s  | $2.47 total        | 6 types, 34 calls          |
      | CLI: 45m 15s   | 125K in / 8.2K out | 94% success rate           |
      |                |                    |                            |
      | Prompt Activity | API Health         | Permissions                |
      | 12 prompts      | 2.1% error rate    | 88% auto-approved          |
      | 0.2/min         | 1x 429 rate limit  | 1 rejected                 |
      |                |                    |                            |
      | Productivity   |                    |                            |
      | +247 / -89 LOC | 2 commits, 0 PRs   |                            |
      +------------------------------------------------------------------+

    shared_artifacts:
      - name: "active_time_user"
        source: "claude_code.active_time.total metric (type=user)"
        displayed_as: "${user_active_time}"
        consumers: ["Active Time card", "Productivity detail view"]
      - name: "active_time_cli"
        source: "claude_code.active_time.total metric (type=cli)"
        displayed_as: "${cli_active_time}"
        consumers: ["Active Time card", "Productivity detail view"]
      - name: "tool_success_rate"
        source: "Computed from tool_result events (success=true count / total count)"
        displayed_as: "${tool_success_pct}%"
        consumers: ["Tool Usage card"]
      - name: "prompt_count"
        source: "Count of user_prompt events for session"
        displayed_as: "${prompt_count}"
        consumers: ["Prompt Activity card"]
      - name: "api_error_rate"
        source: "Computed from api_error events / api_request events"
        displayed_as: "${error_rate}%"
        consumers: ["API Health card"]
      - name: "lines_added"
        source: "claude_code.lines_of_code.count metric (type=added)"
        displayed_as: "+${lines_added}"
        consumers: ["Productivity card"]
      - name: "lines_removed"
        source: "claude_code.lines_of_code.count metric (type=removed)"
        displayed_as: "-${lines_removed}"
        consumers: ["Productivity card"]
      - name: "commit_count"
        source: "claude_code.commit.count metric"
        displayed_as: "${commits}"
        consumers: ["Productivity card", "Git Activity card"]
      - name: "pr_count"
        source: "claude_code.pull_request.count metric"
        displayed_as: "${prs}"
        consumers: ["Productivity card", "Git Activity card"]

    emotional_state:
      entry: "Curious (what happened in this session?)"
      exit: "Informed (six cards provide complete at-a-glance picture)"

    integration_checkpoint: |
      - All cards populate from correct data sources
      - Cards with no data show appropriate empty state
      - Cost from metrics supplements (not replaces) cost from events
      - Model name normalized across events and metrics

    gherkin: |
      Scenario: Dashboard shows all six metric cards
        Given session "6e2a8c02" has 47 api_request events, 12 user_prompt events, 34 tool_result events, 1 api_error event, and 34 tool_decision events
        And session "6e2a8c02" has metric data for active_time, lines_of_code, and commit.count
        When Phil opens the session dashboard
        Then the Tool Usage card shows "34 calls" with success rate
        And the Prompt Activity card shows "12 prompts"
        And the API Health card shows error rate based on 1 error / 47 API calls
        And the Active Time card shows user and CLI time split
        And the Productivity card shows lines added, removed, and commit count

  - id: 4
    name: "Tool Usage Investigation"
    action: "Phil drills into the Tool Usage card for details"

    shared_artifacts:
      - name: "tool_result_events"
        source: "tool_result events for session, grouped by tool_name"
        displayed_as: "Tool name, call count, avg duration, success/fail status"
        consumers: ["Tool Usage card summary", "Tool Usage detail table"]

    emotional_state:
      entry: "Curious (which tools were slow or failing?)"
      exit: "Diagnostic (pinpointed specific tool issue)"

    gherkin: |
      Scenario: Tool usage breakdown shows per-tool statistics
        Given session "6e2a8c02" has tool_result events for Bash (15 calls, 13 success, avg 2.1s), Read (8 calls, 8 success, avg 0.1s), and Write (5 calls, 5 success, avg 0.3s)
        When Phil views the Tool Usage detail
        Then Bash shows 15 calls with 87% success rate and 2.1s average duration
        And Read shows 8 calls with 100% success rate and 0.1s average duration
        And failed Bash calls display the error message

  - id: 5
    name: "API Health Investigation"
    action: "Phil checks API error details"

    shared_artifacts:
      - name: "api_error_events"
        source: "api_error events for session"
        displayed_as: "Error type, status code, model, attempt number"
        consumers: ["API Health card summary", "API Health detail table"]

    emotional_state:
      entry: "Concerned (is the API having issues?)"
      exit: "Confident (understood the error pattern, not concerning)"

    gherkin: |
      Scenario: API health shows error breakdown by type
        Given session "6e2a8c02" has 1 api_error event with status_code 429 and error "rate_limit_exceeded" for model "claude-opus-4-6"
        And session "6e2a8c02" has 47 api_request events
        When Phil views the API Health detail
        Then the error rate shows "2.1%"
        And the error breakdown shows "429 (rate limit): 1"
        And no server errors (500) are listed

  - id: 6
    name: "Productivity Review"
    action: "Phil reviews active time and code output"

    shared_artifacts:
      - name: "session_value_summary"
        source: "Computed from cost (events), lines (metrics), commits (metrics), active time (metrics)"
        displayed_as: "Cost: $X | Output: +Y lines, Z commits | Time: Wm"
        consumers: ["Productivity detail view"]

    emotional_state:
      entry: "Reflective (was this session productive?)"
      exit: "Satisfied (tangible output visible alongside cost)"

    gherkin: |
      Scenario: Productivity view shows active time split and code changes
        Given session "6e2a8c02" has active_time.total metrics showing 750s user and 2715s cli
        And session "6e2a8c02" has lines_of_code.count metrics showing 247 added and 89 removed
        And session "6e2a8c02" has commit.count metric showing 2
        When Phil views the Productivity detail
        Then the active time shows "12m 30s user" and "45m 15s CLI"
        And the code changes show "+247 / -89 (net +158)"
        And the git activity shows "2 commits, 0 PRs"

integration_validation:
  shared_artifact_consistency:
    - artifact: "session_id"
      must_match_across: [1, 2, 3, 4, 5, 6]
      failure_message: "Session ID must be consistent between metrics ingestion, session list, and all dashboard cards"
    - artifact: "model_name"
      must_match_across: [1, 3]
      failure_message: "Model name from metrics (claude-opus-4-6[1m]) must be normalized to match events (claude-opus-4-6) before display"
    - artifact: "cost_total"
      must_match_across: [2, 3]
      failure_message: "Cost shown in session list must match cost shown in session dashboard"
