<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Norbert Observatory</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
    h1 { font-size: 24px; font-weight: 600; color: #f8fafc; }
    .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.connected { background: #22c55e; }
    .status-dot.disconnected { background: #ef4444; }
    .status-dot.connecting { background: #eab308; }
    .event-list { background: #1e293b; border-radius: 8px; overflow: hidden; }
    .event-header { display: grid; grid-template-columns: 180px 120px 1fr 100px; padding: 12px 16px; background: #334155; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    .event-row { display: grid; grid-template-columns: 180px 120px 1fr 100px; padding: 10px 16px; border-bottom: 1px solid #334155; font-size: 14px; }
    .event-row:last-child { border-bottom: none; }
    .event-type { color: #38bdf8; font-weight: 500; }
    .tool-name { color: #a78bfa; }
    .session-id { color: #94a3b8; font-family: monospace; font-size: 12px; }
    .empty-state { padding: 48px; text-align: center; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Norbert Observatory</h1>
      <div class="status-indicator">
        <div class="status-dot disconnected" id="ws-status-dot"></div>
        <span id="ws-status-text">Disconnected</span>
      </div>
    </header>

    <div class="event-list">
      <div class="event-header">
        <span>Timestamp</span>
        <span>Type</span>
        <span>Tool / Details</span>
        <span>Session</span>
      </div>
      <div id="event-container">
        <div class="empty-state">No events captured yet. Run Claude Code with Norbert hooks installed.</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const WS_URL = `ws://${window.location.host}/ws`;

    // Format timestamp for display
    function formatTimestamp(ts) {
      const d = new Date(ts);
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    // Create event row HTML
    function createEventRow(event) {
      const toolName = event.toolName || '-';
      const sessionShort = event.sessionId ? event.sessionId.substring(0, 12) : '-';
      return `<div class="event-row">
        <span>${formatTimestamp(event.timestamp)}</span>
        <span class="event-type">${event.eventType}</span>
        <span class="tool-name">${toolName}</span>
        <span class="session-id" title="${event.sessionId || ''}">${sessionShort}</span>
      </div>`;
    }

    // Load initial events
    async function loadEvents() {
      try {
        const response = await fetch(`${API_BASE}/api/events?limit=100`);
        const data = await response.json();
        const container = document.getElementById('event-container');
        if (data.events && data.events.length > 0) {
          container.innerHTML = data.events.map(createEventRow).join('');
        }
      } catch (e) {
        console.error('Failed to load events:', e);
      }
    }

    // WebSocket connection
    function connectWebSocket() {
      const dot = document.getElementById('ws-status-dot');
      const text = document.getElementById('ws-status-text');

      dot.className = 'status-dot connecting';
      text.textContent = 'Connecting...';

      const ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        dot.className = 'status-dot connected';
        text.textContent = 'Connected';
      };

      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);
          if (message.type === 'new_event') {
            const container = document.getElementById('event-container');
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) container.innerHTML = '';
            container.innerHTML += createEventRow(message.event);
          }
        } catch (e) {
          console.error('Failed to parse WebSocket message:', e);
        }
      };

      ws.onclose = () => {
        dot.className = 'status-dot disconnected';
        text.textContent = 'Disconnected';
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = () => {
        dot.className = 'status-dot disconnected';
        text.textContent = 'Error';
      };
    }

    // Initialize
    loadEvents();
    connectWebSocket();
  </script>
</body>
</html>
