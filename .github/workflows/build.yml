name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Stage sidecar for Tauri build
        shell: bash
        run: |
          # Tauri's build script validates externalBin paths at compile time.
          # The real sidecar is compiled during `tauri build` (same Cargo workspace),
          # but we need a placeholder so the validation passes first.
          # tauri-action's build will produce the real binary.
          touch src-tauri/norbert-hook-receiver-x86_64-pc-windows-msvc.exe

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate binary size
        shell: bash
        env:
          MAX_SIZE_BYTES: "15728640"
        run: |
          binary="src-tauri/target/release/norbert.exe"
          size=$(stat -c%s "$binary" 2>/dev/null || stat -f%z "$binary" 2>/dev/null)
          size_mb=$(awk "BEGIN {printf \"%.2f\", $size / 1048576}")
          echo "Binary: ${size_mb} MB ($size bytes), limit: 15 MB"
          if [ "$size" -gt "$MAX_SIZE_BYTES" ]; then
            echo "::error::Binary exceeds 15 MB size limit: ${size_mb} MB"
            exit 1
          fi

      - name: Package binary as tar.gz
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING_DIR="$(mktemp -d)"
          cp src-tauri/target/release/norbert.exe "$STAGING_DIR/norbert.exe"
          cp src-tauri/target/release/norbert-hook-receiver.exe "$STAGING_DIR/norbert-hook-receiver.exe"
          ASSET_NAME="norbert-v${VERSION}-win32-x64.tar.gz"
          tar -czf "$ASSET_NAME" -C "$STAGING_DIR" .
          echo "Packaged: $ASSET_NAME"
          ls -lh "$ASSET_NAME"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: "Norbert ${{ github.ref_name }}"
          body: "See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          draft: false
          prerelease: false
          files: norbert-v*-win32-x64.tar.gz
