name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate binary size
        shell: bash
        env:
          MAX_SIZE_BYTES: "15728640"
          ARTIFACT_PATHS: ${{ steps.tauri-build.outputs.artifactPaths }}
        run: |
          echo "Binary size limit: 15 MB ($MAX_SIZE_BYTES bytes)"
          echo "Artifact paths: $ARTIFACT_PATHS"
          oversized=false
          for artifact in $(echo "$ARTIFACT_PATHS" | tr -d '[]"' | tr ',' ' '); do
            if [ -f "$artifact" ]; then
              size=$(stat -c%s "$artifact" 2>/dev/null || stat -f%z "$artifact" 2>/dev/null || wc -c < "$artifact" | tr -d ' ')
              size_mb=$(awk "BEGIN {printf \"%.2f\", $size / 1048576}")
              echo "  $artifact: ${size_mb} MB ($size bytes)"
              if [ "$size" -gt "$MAX_SIZE_BYTES" ]; then
                echo "::error::Binary exceeds size limit: $artifact is ${size_mb} MB (limit: 15 MB)"
                oversized=true
              fi
            fi
          done
          if [ "$oversized" = true ]; then
            echo "::error::One or more binaries exceed the 15 MB size limit. Build failed."
            exit 1
          fi
          echo "All binaries are within the 15 MB size limit."

      - name: Create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Norbert ${{ github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details."
          releaseDraft: false
          prerelease: false
